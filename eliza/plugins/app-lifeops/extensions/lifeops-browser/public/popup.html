<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LifeOps Browser</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <p class="eyebrow">LifeOps Browser</p>
        <h1>Personal Browser Relay</h1>
        <p class="lede">Pair this browser profile with Milady and keep your active tab context available to LifeOps.</p>
      </header>

      <section class="status-card">
        <p id="status" class="status">Loading extension state…</p>
        <p id="meta" class="meta"></p>
      </section>

      <section class="form-grid">
        <label>
          <span>API Base URL</span>
          <input id="apiBaseUrl" type="url" placeholder="http://127.0.0.1:31337" />
        </label>
        <label>
          <span>Browser</span>
          <select id="browser" disabled>
            <option value="chrome">Chrome</option>
            <option value="safari">Safari</option>
          </select>
        </label>
        <label>
          <span>Companion ID</span>
          <input id="companionId" type="text" placeholder="UUID from LifeOps pairing" />
        </label>
        <label>
          <span>Pairing Token</span>
          <input id="pairingToken" type="password" placeholder="lobr_…" />
        </label>
        <label>
          <span>Profile ID</span>
          <input id="profileId" type="text" placeholder="default" />
        </label>
        <label>
          <span>Profile Label</span>
          <input id="profileLabel" type="text" placeholder="Default" />
        </label>
        <label>
          <span>Companion Label</span>
          <input id="label" type="text" placeholder="LifeOps Browser chrome Default" />
        </label>
      </section>

      <section class="import-card">
        <div class="import-copy">
          <h2>Pairing JSON</h2>
          <p>Paste the JSON copied from LifeOps, then import it to fill and save this browser profile.</p>
        </div>
        <textarea
          id="pairingJson"
          rows="7"
          placeholder='{"apiBaseUrl":"http://127.0.0.1:31337","companionId":"...","pairingToken":"...","browser":"chrome"}'
        ></textarea>
        <button id="import" class="secondary" type="button">Import Pairing JSON</button>
      </section>

      <footer class="actions">
        <button id="save" class="primary" type="button">Save Pairing</button>
        <button id="sync" type="button">Sync Now</button>
        <button id="clear" class="danger" type="button">Clear</button>
      </footer>
    </main>
    <script src="./popup.js"></script>
  </body>
  </html>
