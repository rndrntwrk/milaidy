# Depot CI Migration
# Source: .github/workflows/update-homebrew.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

# Add this workflow to the main milady repo at:
#   .github/workflows/update-homebrew.yml
#
# Triggers the homebrew tap repo to update formula + cask
# when a new GitHub release is published.
#
# Required secret: HOMEBREW_TAP_TOKEN
#   A GitHub PAT with repo scope for milady-ai/homebrew-tap

name: Update Homebrew Tap
on:
  workflow_call:
    inputs:
      version:
        description: "Version to update to (e.g. 2.0.0-alpha.84)"
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. 2.0.0-alpha.84)"
        required: true
        type: string
concurrency:
  group: update-homebrew-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update-tap:
    name: Trigger Homebrew tap update
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - name: Determine version
        id: meta
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Triggering Homebrew update for version: $VERSION"
      - name: Dispatch to homebrew-tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: milady-ai/homebrew-tap
          event-type: update-homebrew
          client-payload: '{"version": "${{ steps.meta.outputs.version }}"}'
