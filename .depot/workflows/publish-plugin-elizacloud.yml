# Depot CI Migration
# Source: .github/workflows/publish-plugin-elizacloud.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

# Publishes @elizaos/plugin-elizacloud (npm), PyPI, and crates.io when the
# version in packages/plugin-elizacloud/typescript/package.json changes.
name: Publish @elizaos/plugin-elizacloud
on:
  push:
    branches: [main, develop]
    paths:
      - "packages/plugin-elizacloud/**"
      - ".depot/workflows/publish-plugin-elizacloud.yml"
  workflow_dispatch:
concurrency:
  group: publish-plugin-elizacloud-${{ github.ref }}
  cancel-in-progress: false
jobs:
  verify_version:
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check typescript package version
        id: check
        run: |
          set -euo pipefail
          PKG_JSON="packages/plugin-elizacloud/typescript/package.json"
          CURRENT_VERSION=$(jq -r .version "$PKG_JSON")
          echo "Current version: $CURRENT_VERSION"
          PREV_COMMIT=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          if git diff --name-only HEAD~1 HEAD | grep -q "$PKG_JSON"; then
            if git show "$PREV_COMMIT:$PKG_JSON" 2>/dev/null; then
              PREV_VERSION=$(git show "$PREV_COMMIT:$PKG_JSON" | jq -r .version)
              echo "Previous version: $PREV_VERSION"
              if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
                echo "should_publish=true" >> "$GITHUB_OUTPUT"
              else
                echo "should_publish=false" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
  publish_npm:
    needs: verify_version
    if: needs.verify_version.outputs.should_publish == 'true'
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "plugin-elizacloud-v${{ needs.verify_version.outputs.version }}" -m "plugin-elizacloud v${{ needs.verify_version.outputs.version }}" || true
          git push origin "plugin-elizacloud-v${{ needs.verify_version.outputs.version }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install and build
        working-directory: packages/plugin-elizacloud
        run: |
          bun install
          bun run build:ts
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        working-directory: packages/plugin-elizacloud/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  publish_pypi:
    needs: verify_version
    if: needs.verify_version.outputs.should_publish == 'true'
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build Python package
        working-directory: packages/plugin-elizacloud/python
        run: python -m build
      - name: Publish to PyPI
        working-directory: packages/plugin-elizacloud/python
        run: twine upload dist/* --username __token__ --password ${{ secrets.PYPI_TOKEN }}
  publish_crates:
    needs: verify_version
    if: needs.verify_version.outputs.should_publish == 'true'
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check and test Rust crate
        working-directory: packages/plugin-elizacloud/rust
        run: |
          cargo check --all-features
          cargo test --all-features
      - name: Publish to crates.io
        working-directory: packages/plugin-elizacloud/rust
        run: cargo publish --token "${CRATES_IO_TOKEN}"
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
