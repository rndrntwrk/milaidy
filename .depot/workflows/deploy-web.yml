# Depot CI Migration
# Source: .github/workflows/deploy-web.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: Deploy Web
on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".depot/workflows/deploy-web.yml"
      - "apps/homepage/**"
      - "scripts/write-homepage-release-data.mjs"
      - "install.sh"
      - "install.ps1"
      - "package.json"
      - "bun.lock"
  workflow_call:
    inputs:
      release_version:
        description: "Release tag override for homepage metadata (e.g. v2.0.0-alpha.87)"
        required: false
        type: string
  workflow_dispatch:
concurrency:
  group: homepage-pages
  cancel-in-progress: true
permissions:
  contents: write
env:
  BUN_VERSION: "1.3.10"
  CI: "true"
jobs:
  deploy:
    name: Build and Publish Homepage
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-homepage-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-homepage-${{ runner.os }}-
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Generate release metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MILADY_RELEASE_TAG: ${{ inputs.release_version }}
        run: node scripts/write-homepage-release-data.mjs
      - name: Build homepage
        run: bun run build:web
      - name: Stage GitHub Pages files
        run: |
          cp install.sh apps/homepage/dist/install.sh
          cp install.ps1 apps/homepage/dist/install.ps1
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./apps/homepage/dist
