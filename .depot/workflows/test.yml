# Depot CI Migration
# Source: .github/workflows/test.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed runs-on from "ubuntu-24.04" to "depot-ubuntu-24.04" throughout
# - Changed runs-on from "macos-latest" to "depot-ubuntu-latest" throughout
# - Changed runs-on from "ubuntu-latest" to "depot-ubuntu-latest" in job "website-blocker-mobile-android"

name: Tests
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
env:
  CI: "true"
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"
  NODE_NO_WARNINGS: "1"
  NODE_OPTIONS: "--max-old-space-size=4096"
jobs:
  regression-matrix:
    name: Regression Matrix Contract
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false
          fetch-depth: 0
      - name: Validate CI bootstrap contract
        run: node scripts/validate-ci-bootstrap-contract.mjs
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Setup workspace dependencies
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
      - name: Restore eliza workspace paths for repo scripts
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Validate regression matrix contract
        run: bun run test:regression-matrix:pr
  unit-tests:
    name: Real tests (Vitest, no mocks)
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup workspace dependencies
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-avatar-clone: "true"
          no-vision-deps: "true"
      - name: Restore eliza workspace paths for repo scripts
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi
      - name: Build
        run: bun run build
      - name: Run real integration tests (live/real suite)
        run: bun run test:ci:real
      - name: Run startup script drift guard
        run: bun run test:startup:contract
  db-check:
    name: Database Security Check
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup workspace dependencies
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-avatar-clone: "true"
          no-vision-deps: "true"
      - name: Restore eliza workspace paths for repo scripts
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi
      - name: Run database security and query-guard tests
        run: bun run db:check
  website-blocker-cross-platform:
    name: Website Blocker Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Enable Git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install Linux desktop runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          APT_ARGS=(-o Acquire::ForceIPv4=true -o Acquire::Retries=5 -o Acquire::http::Timeout=30)
          sudo apt-get "${APT_ARGS[@]}" update
          sudo apt-get "${APT_ARGS[@]}" install -y libwebkit2gtk-4.1-0 libayatana-appindicator3-1
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            bun install --ignore-scripts && exit 0
            rm -rf node_modules
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          exit 1
      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
      - name: Run website blocker unit suites
        run: bun run test:selfcontrol:unit
      # These Vitest live E2E suites exercise the dev/desktop control paths and
      # hosts-file mutations only; they do not launch a native browser, so xvfb
      # is unnecessary here.
      - name: Run website blocker E2E suites
        run: bun run test:selfcontrol:e2e
  website-blocker-startup-smoke:
    name: Website Blocker Startup Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Enable Git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
      - name: Run website blocker startup smokes
        run: bun run test:selfcontrol:startup
  website-blocker-desktop-smoke:
    name: Website Blocker Desktop Smoke (macOS)
    runs-on: depot-ubuntu-latest # was: macos-latest. Nonstandard GitHub runner label detected, changed to default Depot runner.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
      - name: Build
        run: bun run build
      - name: Run website blocker desktop smokes
        run: bun run test:live:selfcontrol:desktop
  website-blocker-mobile-android:
    name: Website Blocker Android Build
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/app/android/**/*.gradle*', 'apps/app/android/**/gradle-wrapper.properties', 'eliza/packages/native-plugins/websiteblocker/android/**/*.kt') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
      - name: Build Android website blocker app
        run: bun run test:selfcontrol:mobile:android
  website-blocker-mobile-ios:
    name: Website Blocker iOS Build
    runs-on: depot-ubuntu-latest # was: macos-latest. Nonstandard GitHub runner label detected, changed to default Depot runner.
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
      - name: Build iOS website blocker app
        run: bun run test:selfcontrol:mobile:ios
  desktop-contract:
    name: Electrobun Desktop Contract
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools
      - name: Install canvas native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3
      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
      - name: Run Electrobun contract tests
        run: bun run test:desktop:contract
  # Pull requests only validate the release-workflow contract in
  # test-electrobun-release.yml. The full Electrobun packaging/signing matrix
  # runs from release-electrobun.yml for tagged or manually dispatched releases.
  # The old electron-ui-e2e and electron-packaged-dmg-e2e jobs remain removed
  # after the Electrobun migration.
  cloud-live-e2e:
    name: Cloud Live E2E (Eliza Cloud)
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 20
    steps:
      - name: Check cloud secrets
        id: cloud
        run: |
          if [ -z "${{ secrets.ELIZAOS_CLOUD_API_KEY }}" ]; then
            echo "::warning::ELIZAOS_CLOUD_API_KEY not configured — skipping cloud E2E."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.cloud.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup workspace dependencies
        if: steps.cloud.outputs.skip != 'true'
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          prepare-local-eliza-runtime: "true"
      - name: Restore eliza workspace paths for repo scripts
        if: steps.cloud.outputs.skip != 'true'
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Run Cloud Live E2E
        if: steps.cloud.outputs.skip != 'true'
        run: bun run test:live:cloud
        env:
          MILADY_LIVE_TEST: "1"
          ELIZA_LIVE_TEST: "1"
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}
  validation-e2e:
    name: End-to-End Validation (Issue
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup workspace dependencies
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          skip-avatar-clone: "true"
          no-vision-deps: "true"
          prepare-local-eliza-runtime: "true"
      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi
      - name: Build
        run: bun run build
      - name: Run E2E validation suite
        run: bun run test:e2e:validation
        env:
          MILADY_LIVE_TEST: "1"
          ELIZA_LIVE_TEST: "1"
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}
  live-surface-audit:
    name: Live Surface Audit
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup workspace dependencies
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          prepare-local-eliza-runtime: "true"
      - name: Restore eliza workspace paths for repo scripts
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Run live surface audit
        run: bun run test:audit:live:strict
  ui-playwright-smoke:
    name: UI Playwright Smoke
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    timeout-minutes: 30
    steps:
      - name: Check live provider secrets
        id: provider-check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ] && \
             [ -z "${GROQ_API_KEY}" ] && \
             [ -z "${ANTHROPIC_API_KEY}" ] && \
             [ -z "${GOOGLE_GENERATIVE_AI_API_KEY}" ] && \
             [ -z "${OPENROUTER_API_KEY}" ] && \
             [ -z "${ELIZAOS_CLOUD_API_KEY}" ]; then
            echo "::warning::No live provider secret configured — skipping UI Playwright smoke."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.provider-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Setup workspace dependencies
        if: steps.provider-check.outputs.skip != 'true'
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-avatar-clone: "true"
          no-vision-deps: "true"
      - name: Restore eliza workspace paths for repo scripts
        if: steps.provider-check.outputs.skip != 'true'
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Install Electrobun runtime dependencies
        if: steps.provider-check.outputs.skip != 'true'
        run: |
          APT_ARGS=(-o Acquire::ForceIPv4=true -o Acquire::Retries=5 -o Acquire::http::Timeout=30)
          sudo apt-get "${APT_ARGS[@]}" update
          sudo apt-get "${APT_ARGS[@]}" install -y libwebkit2gtk-4.1-0 libayatana-appindicator3-1
      - name: Install Playwright browser
        if: steps.provider-check.outputs.skip != 'true'
        run: bunx playwright install --with-deps chromium
      - name: Run UI Playwright smoke tests
        if: steps.provider-check.outputs.skip != 'true'
        run: bun run test:ui:playwright
        env:
          MILADY_LIVE_TEST: "1"
          ELIZA_LIVE_TEST: "1"
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}
  test-status:
    name: All Tests Passed
    if: always()
    needs: [regression-matrix, unit-tests, db-check, website-blocker-cross-platform, website-blocker-startup-smoke, website-blocker-desktop-smoke, website-blocker-mobile-android, website-blocker-mobile-ios, desktop-contract, cloud-live-e2e, validation-e2e, live-surface-audit, ui-playwright-smoke]
    runs-on: depot-ubuntu-24.04 # was: ubuntu-24.04. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - name: Check test results
        shell: bash
        run: |
          set -u
          # Gate job: surface which dependency failed (logs are easy to miss otherwise).
          echo "=== Required test job results ==="
          echo "regression-matrix:  ${{ needs.regression-matrix.result }}"
          echo "unit-tests:         ${{ needs.unit-tests.result }}"
          echo "db-check:           ${{ needs.db-check.result }}"
          echo "website-blocker-cross-platform: ${{ needs.website-blocker-cross-platform.result }}"
          echo "website-blocker-startup-smoke:  ${{ needs.website-blocker-startup-smoke.result }}"
          echo "website-blocker-desktop-smoke:  ${{ needs.website-blocker-desktop-smoke.result }}"
          echo "website-blocker-mobile-android: ${{ needs.website-blocker-mobile-android.result }}"
          echo "website-blocker-mobile-ios:     ${{ needs.website-blocker-mobile-ios.result }}"
          echo "desktop-contract:   ${{ needs.desktop-contract.result }}"
          echo "cloud-live-e2e:     ${{ needs.cloud-live-e2e.result }}"
          echo "validation-e2e:     ${{ needs.validation-e2e.result }}"
          echo "live-surface-audit: ${{ needs.live-surface-audit.result }}"
          echo "ui-playwright-smoke:${{ needs.ui-playwright-smoke.result }}"
          echo "==================================="
          bad=0
          for pair in \
            "regression-matrix:${{ needs.regression-matrix.result }}" \
            "unit-tests:${{ needs.unit-tests.result }}" \
            "db-check:${{ needs.db-check.result }}" \
            "website-blocker-cross-platform:${{ needs.website-blocker-cross-platform.result }}" \
            "website-blocker-startup-smoke:${{ needs.website-blocker-startup-smoke.result }}" \
            "website-blocker-desktop-smoke:${{ needs.website-blocker-desktop-smoke.result }}" \
            "website-blocker-mobile-android:${{ needs.website-blocker-mobile-android.result }}" \
            "website-blocker-mobile-ios:${{ needs.website-blocker-mobile-ios.result }}" \
            "desktop-contract:${{ needs.desktop-contract.result }}" \
            "cloud-live-e2e:${{ needs.cloud-live-e2e.result }}" \
            "validation-e2e:${{ needs.validation-e2e.result }}" \
            "live-surface-audit:${{ needs.live-surface-audit.result }}" \
            "ui-playwright-smoke:${{ needs.ui-playwright-smoke.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error title=Test gate::Required job '${name}' finished with '${result}' (expected success)"
              bad=1
            fi
          done
          if [ "$bad" -ne 0 ]; then
            exit 1
          fi
          echo "All required test jobs passed."
