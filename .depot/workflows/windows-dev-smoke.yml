# Depot CI Migration
# Source: .github/workflows/windows-dev-smoke.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed runs-on from "windows-latest" to "depot-ubuntu-latest" in job "dev-smoke"

name: Windows Dev Smoke
on:
  pull_request:
    branches: [develop]
    paths:
      - "eliza/packages/app-core/scripts/**"
      - "apps/app/electrobun/**"
      - "eliza/packages/app-core/platforms/electrobun/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:
concurrency:
  group: windows-dev-smoke-${{ github.ref }}
  cancel-in-progress: true
jobs:
  dev-smoke:
    name: Windows smoke (${{ matrix.bun-version }})
    runs-on: depot-ubuntu-latest # was: windows-latest. Nonstandard GitHub runner label detected, changed to default Depot runner.
    strategy:
      fail-fast: false
      matrix:
        bun-version: ["1.3.10", "canary"]
    steps:
      - name: Enable long paths (Windows)
        run: git config --system core.longpaths true
      - uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            /.gitmodules
            /package.json
            /bun.lock
            /bunfig.toml
            /tsconfig.json
            /.depot/actions/setup-bun-workspace/**
            apps/
            packages/
            scripts/
            eliza/apps/
            eliza/packages/app-core/
            eliza/packages/native-plugins/
            eliza/packages/typescript/
            eliza/packages/shared/
            eliza/packages/agent/
            eliza/packages/server/
            eliza/plugins/
          sparse-checkout-cone-mode: false
      - name: Initialize workspace submodules
        run: node scripts/init-submodules.mjs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Bun workspace
        uses: ./.depot/actions/setup-bun-workspace
        with:
          bun-version: ${{ matrix.bun-version }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
          disable-local-eliza-workspace: "true"
      - name: Restore eliza workspace paths for script checks
        run: node scripts/restore-local-eliza-workspace.mjs
      - name: Verify json5 interop
        run: >
          bun -e "import * as JSON5Module from 'json5'; const JSON5 = JSON5Module.default ?? JSON5Module; if (typeof JSON5.parse !== 'function') throw new Error('JSON5.parse missing'); console.log('json5 interop ok');"

      - name: Verify bun-version-guard
        run: >
          bun -e "import { getBunVersionAdvisory } from './eliza/packages/app-core/scripts/lib/bun-version-guard.mjs'; const result = getBunVersionAdvisory(); console.log('bun-version-guard:', result ?? 'OK (no advisory)');"

