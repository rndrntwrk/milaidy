version: 2.1
orbs:
  node: circleci/node@5
jobs:
  test-node:
    executor:
      name: node/default
      tag: '22'
    steps:
      - checkout
      - run:
          name: Initialize submodules
          command: node scripts/init-submodules.mjs
      - run:
          name: Install Bun
          command: curl -fsSL https://bun.sh/install | bash && echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Install dependencies
          command: bun install
      - run:
          name: Run tests
          command: bun run verify
  build-node:
    executor:
      name: node/default
      tag: '22'
    steps:
      - checkout
      - run:
          name: Initialize submodules
          command: node scripts/init-submodules.mjs
      - run:
          name: Install Bun
          command: curl -fsSL https://bun.sh/install | bash && echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Install dependencies
          command: bun install
      - run:
          name: Build
          command: bun run build
      - run:
          name: Create the ~/artifacts directory if it doesn't exist
          command: mkdir -p ~/artifacts
      - run:
          name: Copy artifacts
          command: cp -R build dist public .output .next .docusaurus ~/artifacts 2>/dev/null || true
      - store_artifacts:
          path: ~/artifacts
          destination: node-build
workflows:
  build-and-test:
    jobs:
      - test-node
      - build-node:
          requires:
            - test-node
