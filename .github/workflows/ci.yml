name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, "codex/**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"

jobs:
  pre-review:
    name: Pre-Review
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Fetch upstream develop for pre-review base
        run: |
          git remote add upstream https://github.com/milady-ai/milady.git || true
          git fetch --no-tags upstream develop

      - name: Run local pre-review gate
        run: bun run pre-review:local
        env:
          MILADY_PRE_REVIEW_BASE: upstream/develop

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Strip missing optional plugin workspaces from eliza
        run: node -e "const fs=require('fs'),p=require('path'),f=p.join('eliza','package.json');if(!fs.existsSync(f))process.exit(0);const pkg=JSON.parse(fs.readFileSync(f,'utf8'));if(!Array.isArray(pkg.workspaces))process.exit(0);const before=pkg.workspaces.length;pkg.workspaces=pkg.workspaces.filter(w=>{const d=p.join('eliza',w);return fs.existsSync(d)});if(pkg.workspaces.length<before){fs.writeFileSync(f,JSON.stringify(pkg,null,2)+'\n');console.log('Stripped '+(before-pkg.workspaces.length)+' missing workspace(s)')}"

      - name: Install submodule verification dependencies
        run: |
          bun install --cwd eliza --no-frozen-lockfile --ignore-scripts
          bun install --cwd eliza/cloud --frozen-lockfile
          bun install --cwd eliza/steward-fi --frozen-lockfile

      - name: Biome lint
        run: bun run verify:lint

      - name: Biome format check
        run: bun run format

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Strip missing optional plugin workspaces from eliza
        run: node -e "const fs=require('fs'),p=require('path'),f=p.join('eliza','package.json');if(!fs.existsSync(f))process.exit(0);const pkg=JSON.parse(fs.readFileSync(f,'utf8'));if(!Array.isArray(pkg.workspaces))process.exit(0);const before=pkg.workspaces.length;pkg.workspaces=pkg.workspaces.filter(w=>{const d=p.join('eliza',w);return fs.existsSync(d)});if(pkg.workspaces.length<before){fs.writeFileSync(f,JSON.stringify(pkg,null,2)+'\n');console.log('Stripped '+(before-pkg.workspaces.length)+' missing workspace(s)')}"

      - name: Install submodule verification dependencies
        run: |
          bun install --cwd eliza --no-frozen-lockfile --ignore-scripts
          bun install --cwd eliza/cloud --frozen-lockfile
          bun install --cwd eliza/steward-fi --frozen-lockfile

      - name: Run type checker
        run: bun run verify:typecheck

  test:
    name: Real tests (Vitest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Build
        run: bun run build

      - name: Run real integration tests (live/real suite)
        run: bun run test:ci:real
        env:
          NODE_NO_WARNINGS: "1"

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Build project
        run: bun run build

      - name: Build homepage
        run: bun run build:web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
