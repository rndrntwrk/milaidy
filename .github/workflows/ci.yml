name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.10"

jobs:
  pre-review:
    name: Pre-Review
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run local pre-review gate
        run: bun run pre-review:local

  lint:
    name: Lint & Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Biome lint
        run: bun run lint

      - name: Biome format check
        run: bun run format

  typecheck:
    name: Type Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Run type checker
        run: bun run typecheck

  test:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Run unit tests
        run: bunx vitest run --config vitest.unit.config.ts

  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Build project
        run: bun run build

      - name: Build homepage
        run: bun run build:homepage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
