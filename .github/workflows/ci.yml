name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, "codex/**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"

jobs:
  pre-review:
    name: Pre-Review
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          prepare-local-eliza-runtime: "true"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Fetch upstream develop for pre-review base
        run: |
          git remote add upstream https://github.com/milady-ai/milady.git || true
          git fetch --no-tags upstream develop

      - name: Run local pre-review gate
        run: bun run pre-review:local
        env:
          MILADY_PRE_REVIEW_BASE: upstream/develop

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          prepare-local-eliza-runtime: "true"

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Install submodule verification dependencies
        run: |
          bun install --cwd eliza --no-frozen-lockfile --ignore-scripts
          bun install --cwd eliza/cloud --no-frozen-lockfile --ignore-scripts
          bun install --cwd eliza/steward-fi --no-frozen-lockfile --ignore-scripts

      - name: Ensure biome uses correct architecture
        run: |
          # bunx resolves the @biomejs/biome package first, so replacing only the
          # biome binary is not enough when eliza/node_modules contains a cached
          # wrong-arch install. Point the whole @biomejs scope at the root install.
          mkdir -p eliza/node_modules
          rm -rf eliza/node_modules/@biomejs
          ln -s "${{ github.workspace }}/node_modules/@biomejs" eliza/node_modules/@biomejs

      - name: Biome lint
        run: bun run verify:lint

      - name: Biome format check
        run: bunx @biomejs/biome format scripts/validate-ci-bootstrap-contract.mjs

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Install submodule verification dependencies
        run: |
          bun install --cwd eliza --no-frozen-lockfile --ignore-scripts
          bun install --cwd eliza/cloud --no-frozen-lockfile --ignore-scripts
          bun install --cwd eliza/steward-fi --no-frozen-lockfile --ignore-scripts

      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi

      - name: Generate i18n keyword data
        run: node packages/shared/scripts/generate-keywords.mjs --target ts
        working-directory: eliza

      - name: Run type checker
        run: bun run verify:typecheck

  test:
    name: Real tests (Vitest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Build
        run: bun run build

      - name: Run real integration tests (live/real suite)
        run: bun run test:ci:real
        env:
          NODE_NO_WARNINGS: "1"

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for repo scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Build project
        run: bun run build

      - name: Build homepage
        run: bun run build:web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
