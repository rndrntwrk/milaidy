name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, "codex/**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"

jobs:
  pre-review:
    name: Pre-Review
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --frozen-lockfile --ignore-scripts
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Fetch upstream develop for pre-review base
        run: |
          git remote add upstream https://github.com/milady-ai/milady.git || true
          git fetch --no-tags upstream develop

      - name: Run local pre-review gate
        run: bun run pre-review:local
        env:
          MILADY_PRE_REVIEW_BASE: upstream/develop

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --frozen-lockfile --ignore-scripts

      - name: Biome lint
        run: bun run verify:lint

      - name: Biome format check
        run: bun run format

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --frozen-lockfile --ignore-scripts

      - name: Run type checker
        run: bun run verify:typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --frozen-lockfile --ignore-scripts

      - name: Run unit tests
        run: bunx vitest run --config vitest.unit.config.ts
        env:
          NODE_NO_WARNINGS: "1"

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --frozen-lockfile --ignore-scripts

      - name: Build project
        run: bun run build

      - name: Build homepage
        run: bun run build:web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
