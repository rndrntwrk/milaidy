name: CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "eliza/docs/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  push:
    branches: [main, develop, "codex/**"]
    paths-ignore:
      - "**/*.md"
      - "eliza/docs/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  NODE_VERSION: "22.20.0"

jobs:
  pre-review:
    name: Pre-Review
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          prepare-local-eliza-runtime: "true"
          run-postinstall: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"
          skip-cloud-submodule: "true"

      - name: Ensure biome uses correct architecture
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/core/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi

      - name: Generate i18n keyword data
        if: ${{ hashFiles('eliza/package.json') != '' }}
        run: node packages/shared/scripts/generate-keywords.mjs --target ts
        working-directory: eliza

      - name: Build eliza packages required for typecheck
        if: ${{ hashFiles('eliza/package.json') != '' }}
        run: |
          if [ ! -f eliza/packages/core/dist/index.node.js ] || [ ! -f eliza/packages/core/dist/index.d.ts ]; then
            (cd eliza/packages/core && bun run build)
          fi
          if [ ! -f eliza/packages/skills/dist/index.js ]; then
            (cd eliza/packages/skills && bun run build)
          fi
          if [ ! -f eliza/packages/cloud-routing/dist/index.js ]; then
            (cd eliza/packages/cloud-routing && bun run build)
          fi
          if [ -f eliza/plugins/plugin-agent-skills/package.json ] && [ ! -f eliza/plugins/plugin-agent-skills/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-agent-skills && bun run build)
          fi
          if [ -f eliza/plugins/plugin-pdf/package.json ] && [ ! -f eliza/plugins/plugin-pdf/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-pdf && bun run build)
          fi
          if [ -f eliza/plugins/plugin-sql/package.json ] && [ ! -f eliza/plugins/plugin-sql/typescript/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-sql && bun run build)
          fi
          if [ ! -f eliza/plugins/plugin-streaming/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-streaming && bun run build)
          fi

      - name: Fetch upstream develop for pre-review base
        run: |
          git remote add upstream https://github.com/milady-ai/milady.git || true
          git fetch --no-tags upstream develop

      - name: Run local pre-review gate
        run: bun run pre-review:local
        env:
          MILADY_PRE_REVIEW_BASE: upstream/develop

  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          prepare-local-eliza-runtime: "true"
          skip-cloud-submodule: "true"
          skip-local-upstreams-postinstall: "true"

      - name: Ensure biome uses correct architecture
        run: |
          # bunx resolves the @biomejs/biome package first, so replacing only the
          # biome binary is not enough when eliza/node_modules contains a cached
          # wrong-arch install. Point the whole @biomejs scope at the root install.
          mkdir -p eliza/node_modules
          rm -rf eliza/node_modules/@biomejs
          ln -s "${{ github.workspace }}/node_modules/@biomejs" eliza/node_modules/@biomejs

      - name: Biome lint
        run: bun run verify:lint

      - name: Biome format check
        run: bunx @biomejs/biome format scripts/validate-ci-bootstrap-contract.mjs

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-cloud-submodule: "true"
          skip-local-upstreams-postinstall: "true"

      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/core/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi

      - name: Generate i18n keyword data
        if: ${{ hashFiles('eliza/package.json') != '' }}
        run: node packages/shared/scripts/generate-keywords.mjs --target ts
        working-directory: eliza

      - name: Build eliza packages required for typecheck
        if: ${{ hashFiles('eliza/package.json') != '' }}
        run: |
          if [ ! -f eliza/packages/core/dist/index.node.js ] || [ ! -f eliza/packages/core/dist/index.d.ts ]; then
            (cd eliza/packages/core && bun run build)
          fi
          if [ ! -f eliza/packages/skills/dist/index.js ]; then
            (cd eliza/packages/skills && bun run build)
          fi
          if [ ! -f eliza/packages/cloud-routing/dist/index.js ]; then
            (cd eliza/packages/cloud-routing && bun run build)
          fi
          if [ -f eliza/plugins/plugin-agent-skills/package.json ] && [ ! -f eliza/plugins/plugin-agent-skills/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-agent-skills && bun run build)
          fi
          if [ -f eliza/plugins/plugin-pdf/package.json ] && [ ! -f eliza/plugins/plugin-pdf/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-pdf && bun run build)
          fi
          if [ -f eliza/plugins/plugin-sql/package.json ] && [ ! -f eliza/plugins/plugin-sql/typescript/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-sql && bun run build)
          fi
          if [ ! -f eliza/plugins/plugin-streaming/dist/index.d.ts ]; then
            (cd eliza/plugins/plugin-streaming && bun run build)
          fi

      - name: Run type checker
        run: bun run verify:typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-cloud-submodule: "true"
          skip-local-upstreams-postinstall: "true"

      - name: Restore eliza workspace paths for repo scripts
        run: node scripts/restore-local-eliza-workspace.mjs

      - name: Align nested eliza package resolution
        run: node scripts/align-eliza-ci-node-modules.mjs

      - name: Run auth gate regression test
        run: bun run test:auth

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          skip-cloud-submodule: "true"
          skip-local-upstreams-postinstall: "true"

      - name: Build project
        run: bun run build

      - name: Build homepage
        run: bun run build:web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  all-tests-passed:
    name: All Tests Passed
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    needs:
      - pre-review
      - lint
      - typecheck
      - unit-tests
      - build
    steps:
      - name: Require all CI gates to pass
        env:
          PRE_REVIEW: ${{ needs.pre-review.result }}
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          UNIT_TESTS: ${{ needs.unit-tests.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          set -euo pipefail
          for result in "$PRE_REVIEW" "$LINT" "$TYPECHECK" "$UNIT_TESTS" "$BUILD"; do
            if [ "$result" != "success" ]; then
              echo "Required CI gate did not pass: $result"
              exit 1
            fi
          done
