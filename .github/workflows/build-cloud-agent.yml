# =============================================================================
# build-cloud-agent.yml — Build cloud agent image with Blacksmith Docker cache
# =============================================================================
#
# Triggers:
#   - Push to cloud/main or cloud/staging branch
#   - Manual dispatch with version override
#
# Published to: ghcr.io/milady-ai/agent
#   Tags (production): :cloud-v{version}         and :cloud-latest
#   Tags (staging):    :cloud-staging-v{version} and :cloud-staging-latest
#
# Uses Blacksmith's persistent Docker layer cache for fast rebuilds.
# Typical warm build: ~2-4 min vs ~8-10 min without cache.
# =============================================================================

name: Build Cloud Agent

on:
  push:
    branches:
      - cloud/main
      - cloud/staging
  workflow_dispatch:
    inputs:
      version:
        description: "Cloud version tag (e.g. 2.0.3). Defaults to auto-increment."
        required: false
        type: string
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true
      skip_rollout:
        description: "Skip auto-rollout to nodes (build + push only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-cloud-agent-${{ github.event_name == 'push' && github.ref_name || (github.ref_name == 'cloud/staging' && 'cloud/staging' || 'cloud/main') }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: milady-ai/agent
  SOURCE_REF: ${{ github.event_name == 'push' && github.ref_name || (github.ref_name == 'cloud/staging' && 'cloud/staging' || 'cloud/main') }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build cloud agent image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0

      # ── 2. Set up Node + Bun ────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # ── 3. Cache bun store ──────────────────────────────────────────────────
      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-cloud-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-cloud-${{ runner.os }}-

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --ignore-scripts

      # ── 5. Build Capacitor plugins ──────────────────────────────────────────
      - name: Build Capacitor plugins
        run: |
          cd apps/app
          bun scripts/plugin-build.mjs

      # ── 6. Build runtime (tsdown) ───────────────────────────────────────────
      - name: Build runtime (tsdown)
        run: |
          npx tsdown
          echo '{"type":"module"}' > dist/package.json
          node --import tsx scripts/write-build-info.ts 2>/dev/null || true

      # ── 7. Determine version ────────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [ "${SOURCE_REF}" = "cloud/staging" ]; then
            VERSION_PREFIX="cloud-staging-v"
            LATEST_TAG="cloud-staging-latest"
            BUILD_ENVIRONMENT="staging"
          else
            VERSION_PREFIX="cloud-v"
            LATEST_TAG="cloud-latest"
            BUILD_ENVIRONMENT="production"
          fi

          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${VERSION_PREFIX}${{ inputs.version }}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            VERSION="${VERSION_PREFIX}${BASE_VERSION}-build.${{ github.run_number }}"
          fi

          if [ "${BUILD_ENVIRONMENT}" = "staging" ]; then
            VERSION_CLEAN="${VERSION#cloud-staging-v}"
          else
            VERSION_CLEAN="${VERSION#cloud-v}"
          fi

          echo "version=${VERSION}"             >> $GITHUB_OUTPUT
          echo "version_clean=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}"       >> $GITHUB_OUTPUT
          echo "build_environment=${BUILD_ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "Cloud version: ${VERSION}"
          echo "Build environment: ${BUILD_ENVIRONMENT}"
          echo "Source branch: ${SOURCE_REF}"
          echo "Source SHA: $(git rev-parse --short HEAD)"

      # ── 8. Build UI (vite) ──────────────────────────────────────────────────
      - name: Build UI (vite)
        run: |
          cd apps/app
          npx vite build
        env:
          NODE_ENV: production

      # ── 9. Set up CI dockerignore ───────────────────────────────────────────
      - name: Set up CI dockerignore
        run: cp .dockerignore.ci .dockerignore

      # ── 10. Set up Blacksmith Docker builder ────────────────────────────────
      - name: Set up Blacksmith Docker
        uses: useblacksmith/setup-docker-builder@v1

      # ── 11. Login to GHCR ──────────────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Build and push with Blacksmith cache ────────────────────────────
      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64
          push: ${{ inputs.push_image != false }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.latest_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            VERSION_CLEAN=${{ steps.version.outputs.version_clean }}
          provenance: false

      # ── 13. Build summary ──────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          if [ "${{ steps.version.outputs.build_environment }}" = "staging" ]; then
            BUILD_LABEL="Staging"
          else
            BUILD_LABEL="Production"
          fi

          echo "## ☁️ Cloud Agent Image (${BUILD_LABEL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ${BUILD_LABEL} build for branch \`${SOURCE_REF}\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ steps.version.outputs.build_environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${SOURCE_REF}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
