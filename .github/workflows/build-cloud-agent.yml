# =============================================================================
# build-cloud-agent.yml — Build cloud agent image with GitHub Actions Docker cache
# =============================================================================
#
# Triggers:
#   - Push to cloud/main or cloud/staging branch
#   - Manual dispatch with version override
#
# Published to: ghcr.io/milady-ai/agent
#   Tags (production): :cloud-v{version}         and :cloud-latest
#   Tags (staging):    :cloud-staging-v{version} and :cloud-staging-latest
#
# Uses docker/build-push-action's GHA cache for fast rebuilds.
# Typical warm build: ~2-4 min vs ~8-10 min without cache.
# =============================================================================

name: Build Cloud Agent

on:
  push:
    branches:
      - cloud/main
      - cloud/staging
  workflow_dispatch:
    inputs:
      version:
        description: "Cloud version tag (e.g. 2.0.3). Defaults to auto-increment."
        required: false
        type: string
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true
      skip_rollout:
        description: "Skip auto-rollout to nodes (build + push only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: build-cloud-agent-${{ github.event_name == 'push' && github.ref_name || (github.ref_name == 'cloud/staging' && 'cloud/staging' || 'cloud/main') }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: milady-ai/agent
  SOURCE_REF: ${{ github.event_name == 'push' && github.ref_name || (github.ref_name == 'cloud/staging' && 'cloud/staging' || 'cloud/main') }}
  CLOUD_DEPLOY_WEBHOOK_URL: http://89.167.63.246:9876/deploy

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build cloud agent image
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0
          submodules: false

      # ── 2. Set up Node + Bun ────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # ── 3. Cache bun store ──────────────────────────────────────────────────
      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-cloud-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-cloud-${{ runner.os }}-

      # ── 3.5. Init submodules + patch workspace for CI ──────────────
      - name: Init submodules
        run: |
          # Init eliza submodule first (needed for workspace resolution)
          # Full clone (not shallow) because eliza commit may not be in shallow history
          git submodule update --init eliza || echo "eliza submodule init failed, continuing"
          # Apply cloud runtime patches to eliza submodule
          if [ -f cloud/patches/cloud-runtime-patches.patch ]; then
            echo "Applying cloud runtime patches to eliza submodule..."
            cd eliza && git apply ../cloud/patches/cloud-runtime-patches.patch && cd ..
            echo "Cloud patches applied successfully"
          fi
          # AppBlockerSettingsCard alias — not in upstream eliza yet, add inline
          # milady develop main.tsx imports it; alias to WebsiteBlockerSettingsCard until merged upstream
          LIFEOPS_UI=eliza/apps/app-lifeops/src/ui.ts
          if [ -f "$LIFEOPS_UI" ] && ! grep -q 'AppBlockerSettingsCard' "$LIFEOPS_UI"; then
            if grep -q 'WebsiteBlockerSettingsCard' "$LIFEOPS_UI"; then
              WBSC_PATH=$(grep 'WebsiteBlockerSettingsCard' "$LIFEOPS_UI" | grep 'export \*' | sed 's/export \* from "//;s/";$//')
              echo "export { WebsiteBlockerSettingsCard as AppBlockerSettingsCard } from \"${WBSC_PATH:-./components/WebsiteBlockerSettingsCard.tsx}\";" >> "$LIFEOPS_UI"
              echo "AppBlockerSettingsCard alias added to $LIFEOPS_UI"
            fi
          fi
          ls eliza/package.json && echo "eliza submodule OK" || echo "WARN: eliza submodule missing"
          # Init other submodules (skip local upstreams to avoid nested plugin submodules)
          MILADY_SKIP_LOCAL_UPSTREAMS=1 node scripts/init-submodules.mjs || echo "Some submodules failed, continuing"
          # Disable workspace entries for missing plugin submodules
          MILADY_SKIP_LOCAL_UPSTREAMS=1 node scripts/disable-local-eliza-workspace.mjs || echo "Disable script failed, continuing"

      # The disable script removes all eliza/* workspace entries and rewrites
      # workspace:* overrides, but the vite build needs app-core, ui, shared,
      # agent, and app packages that exist on disk. Re-add them.
      - name: Restore build-critical workspaces
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));

            // Scan for eliza packages that exist on disk with a package.json
            const dirs = [
              ...fs.readdirSync("eliza/packages").map(d => "eliza/packages/" + d),
              ...fs.readdirSync("eliza/apps").map(d => "eliza/apps/" + d),
            ];
            const restored = [];
            for (const d of dirs) {
              const p = d + "/package.json";
              if (fs.existsSync(p)) {
                if (!pkg.workspaces.includes(d)) {
                  pkg.workspaces.push(d);
                  restored.push(d);
                }
              }
            }
            // Also collect names of restored packages to fix overrides
            const restoredNames = new Set();
            for (const d of [...restored, ...pkg.workspaces.filter(w => !w.includes("*"))]) {
              const p = d + "/package.json";
              if (fs.existsSync(p)) {
                try { restoredNames.add(JSON.parse(fs.readFileSync(p, "utf8")).name); } catch {}
              }
            }

            // Restore workspace:* overrides for re-added packages
            if (pkg.overrides) {
              for (const name of restoredNames) {
                if (pkg.overrides[name] && pkg.overrides[name] !== "workspace:*") {
                  console.log("[restore-workspaces] Override", name, ":", pkg.overrides[name], "-> workspace:*");
                  pkg.overrides[name] = "workspace:*";
                }
              }
            }

            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            console.log("[restore-workspaces] Re-added", restored.length, "workspace entries");
            if (restored.length > 0) console.log(restored.join("\n"));

            // Rewrite workspace:* deps in restored packages that reference
            // packages NOT in the workspace (missing plugin submodules etc.)
            const allWsDirs = pkg.workspaces.filter(w => !w.includes("*"));
            for (const d of allWsDirs) {
              const p = d + "/package.json";
              if (!fs.existsSync(p)) continue;
              const raw = fs.readFileSync(p, "utf8");
              const wpkg = JSON.parse(raw);
              let changed = false;
              for (const field of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
                if (!wpkg[field]) continue;
                const toDelete = [];
                for (const [dep, ver] of Object.entries(wpkg[field])) {
                  if (typeof ver !== "string" || !ver.startsWith("workspace:")) continue;
                  if (restoredNames.has(dep)) continue; // local workspace, keep
                  // Not a workspace member, delete to prevent resolve failure
                  toDelete.push(dep);
                  changed = true;
                }
                for (const dep of toDelete) {
                  delete wpkg[field][dep];
                  console.log("[restore-workspaces] Removed", dep, "from", d);
                }
              }
              if (changed) {
                fs.writeFileSync(p, JSON.stringify(wpkg, null, 2) + "\n");
              }
            }
          '

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Hoist missing runtime deps
        run: |
          # tsx resolves @elizaos/core src/ at runtime, hitting imports that aren't
          # hoisted by bun workspace install (workspace entries get disabled for CI).
          # Check which deps are missing and install them individually via tarball.
          node -e '
            const fs = require("fs");
            const path = require("path");
            const { execSync } = require("child_process");
            const pkgPaths = [
              "eliza/packages/typescript/package.json",
              "eliza/packages/agent/package.json",
            ];
            const missing = new Set();
            for (const p of pkgPaths) {
              if (!fs.existsSync(p)) continue;
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              for (const dep of Object.keys(pkg.dependencies || {})) {
                if (!fs.existsSync("node_modules/" + dep)) missing.add(dep);
              }
            }
            if (missing.size === 0) { console.log("All deps present"); process.exit(0); }
            console.log(`Installing ${missing.size} missing deps: ${[...missing].join(", ")}`);
            for (const dep of missing) {
              try {
                const url = execSync(`npm view ${dep} dist.tarball 2>/dev/null`, {encoding: "utf8"}).trim();
                if (!url) { console.log(`  skip ${dep} (no tarball)`); continue; }
                const dir = `/tmp/pkg-${dep.replace(/[\/\/@]/g, "_")}`;
                fs.mkdirSync(dir, {recursive: true});
                execSync(`curl -sL "${url}" | tar xz -C "${dir}"`, {stdio: "inherit"});
                const target = path.join("node_modules", dep);
                fs.mkdirSync(path.dirname(target), {recursive: true});
                fs.renameSync(path.join(dir, "package"), target);
                console.log(`  + ${dep}`);
              } catch (e) { console.log(`  WARN: ${dep}: ${e.message}`); }
            }
          '

      - name: Run postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
          MILADY_SKIP_LOCAL_UPSTREAMS: "1"

      # ── 5. Build Capacitor plugins ──────────────────────────────────────────
      - name: Build Capacitor plugins
        run: |
          cd apps/app
          bun scripts/plugin-build.mjs

      # ── 5.5. Build @elizaos/core + agent (needed for tsx runtime) ───────
      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.50.0"

      - name: Build @elizaos/core
        run: |
          # Proto generation
          cd eliza/packages/schemas
          buf dep update && buf generate
          # i18n keyword generation (needs @elizaos/shared scripts)
          cd ../typescript
          node ../shared/scripts/generate-keywords.mjs --target ts 2>/dev/null || echo "keyword gen skipped"
          # Build core
          bun run build.ts 2>&1 || echo "core build had errors"
          ls dist/node/index.node.js && echo "core dist OK" || echo "WARN: core dist missing"

      - name: Build @elizaos/agent
        run: |
          cd eliza/packages/agent
          bun run build:docker-dist 2>&1 || bun run build 2>&1 || echo "agent build had errors"

      - name: Build @elizaos/shared
        run: |
          cd eliza/packages/shared
          bun run build 2>&1 || echo "shared build had errors"

      # ── 6. Build runtime (tsdown) ───────────────────────────────────────────
      - name: Build runtime (tsdown)
        run: |
          npx tsdown
          echo '{"type":"module"}' > dist/package.json
          node --import tsx eliza/packages/app-core/scripts/write-build-info.ts 2>/dev/null || true

      # ── 7. Determine version ────────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [ "${SOURCE_REF}" = "cloud/staging" ]; then
            VERSION_PREFIX="cloud-staging-v"
            LATEST_TAG="cloud-staging-latest"
            BUILD_ENVIRONMENT="staging"
          else
            VERSION_PREFIX="cloud-v"
            LATEST_TAG="cloud-latest"
            BUILD_ENVIRONMENT="production"
          fi

          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${VERSION_PREFIX}${{ inputs.version }}"
          else
            VERSION="${VERSION_PREFIX}2.0.${{ github.run_number }}"
          fi

          if [ "${BUILD_ENVIRONMENT}" = "staging" ]; then
            VERSION_CLEAN="${VERSION#cloud-staging-v}"
          else
            VERSION_CLEAN="${VERSION#cloud-v}"
          fi

          echo "version=${VERSION}"             >> $GITHUB_OUTPUT
          echo "version_clean=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
          echo "latest_tag=${LATEST_TAG}"       >> $GITHUB_OUTPUT
          echo "build_environment=${BUILD_ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "Cloud version: ${VERSION}"
          echo "Build environment: ${BUILD_ENVIRONMENT}"
          echo "Source branch: ${SOURCE_REF}"
          echo "Source SHA: $(git rev-parse --short HEAD)"

      - name: Load deploy config
        run: |
          set -a
          source eliza/packages/app-core/deploy/deploy.defaults.env
          source deploy/deploy.env
          set +a
          {
            echo "APP_ENTRYPOINT=${APP_ENTRYPOINT}"
            echo "APP_PORT=${APP_PORT}"
            echo "APP_API_BIND=${APP_API_BIND}"
            echo "OCI_SOURCE=${OCI_SOURCE}"
            echo "OCI_LICENSES=${OCI_LICENSES}"
            echo "APP_CMD_START<<EOF"
            echo "${APP_CMD_START}"
            echo "EOF"
            echo "OCI_TITLE<<EOF"
            echo "${OCI_TITLE}"
            echo "EOF"
            echo "OCI_DESCRIPTION<<EOF"
            echo "${OCI_DESCRIPTION}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # ── 8. Build UI (vite) ──────────────────────────────────────────────────
      - name: Build UI (vite)
        run: |
          cd apps/app
          npx vite build
        env:
          NODE_ENV: production

      # ── 9. Docker ignore (context root must have .dockerignore; source: deploy/)
      - name: Set up CI dockerignore
        run: |
          cp eliza/packages/app-core/deploy/.dockerignore.ci .dockerignore
          # Whitelist runtime-required app packages (agent imports these at boot)
          echo '!eliza/apps/app-companion' >> .dockerignore
          echo '!eliza/apps/app-lifeops' >> .dockerignore

      # ── 10. Set up Docker builder ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 11. Login to GHCR ──────────────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Build and push with Docker layer cache ────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ci
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push_image != false }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.latest_tag }}
          build-args: |
            APP_ENTRYPOINT=${{ env.APP_ENTRYPOINT }}
            APP_CMD_START=${{ env.APP_CMD_START }}
            APP_PORT=${{ env.APP_PORT }}
            APP_API_BIND=${{ env.APP_API_BIND }}
            OCI_SOURCE=${{ env.OCI_SOURCE }}
            OCI_TITLE=${{ env.OCI_TITLE }}
            OCI_DESCRIPTION=${{ env.OCI_DESCRIPTION }}
            OCI_LICENSES=${{ env.OCI_LICENSES }}
            VERSION=${{ steps.version.outputs.version }}
            VERSION_CLEAN=${{ steps.version.outputs.version_clean }}
            REVISION=${{ github.sha }}
          provenance: false

      # ── 13. Trigger production deploy webhook ──────────────────────────────
      - name: Trigger cloud fleet deploy webhook
        if: success() && steps.version.outputs.build_environment == 'production' && (github.event_name == 'push' || inputs.push_image != false) && (github.event_name == 'push' || inputs.skip_rollout != true)
        env:
          WEBHOOK_SECRET: ${{ secrets.CLOUD_DEPLOY_WEBHOOK_SECRET }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
          DELIVERY_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "CLOUD_DEPLOY_WEBHOOK_SECRET is required" >&2
            exit 1
          fi

          PAYLOAD=$(python3 -c 'import json, os; print(json.dumps({"image": os.environ["IMAGE"], "tag": os.environ["IMAGE_TAG"], "sha": os.environ["GIT_SHA"], "ref": os.environ["GIT_REF"], "run_id": os.environ["DELIVERY_ID"], "skip_rollout": False}, separators=(",", ":")))')
          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          curl --fail --show-error --silent \
            -X POST "${{ env.CLOUD_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: cloud_deploy" \
            -H "X-GitHub-Delivery: ${DELIVERY_ID}" \
            -H "X-Hub-Signature-256: ${SIGNATURE}" \
            --data "$PAYLOAD"

      # ── 13. Build summary ──────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          if [ "${{ steps.version.outputs.build_environment }}" = "staging" ]; then
            BUILD_LABEL="Staging"
          else
            BUILD_LABEL="Production"
          fi

          if [ "${SOURCE_REF}" = "cloud/main" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_rollout }}" = "true" ]; then
              ROLLOUT_STATUS="skipped (workflow_dispatch skip_rollout=true)"
            else
              ROLLOUT_STATUS="enabled via webhook"
            fi
          else
            ROLLOUT_STATUS="not applicable (staging)"
          fi

          echo "## ☁️ Cloud Agent Image (${BUILD_LABEL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ${BUILD_LABEL} build for branch \`${SOURCE_REF}\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ steps.version.outputs.build_environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${SOURCE_REF}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-deploy | ${ROLLOUT_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.latest_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
