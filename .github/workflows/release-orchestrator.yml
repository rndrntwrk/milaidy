name: Release Orchestrator

on:
  release:
    types: [published]

permissions:
  contents: read
  issues: write

jobs:
  orchestrate:
    name: Create Release Status Tracker
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout .github directory
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Determine release info
        id: info
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            RELEASE_TYPE="prerelease"
          else
            RELEASE_TYPE="stable"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "Release: $VERSION ($RELEASE_TYPE)"

      - name: Check trust gate
        id: trust
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;

            // Check org membership first
            try {
              const membership = await github.rest.orgs.checkMembershipForUser({
                org: 'milady-ai',
                username: actor,
              });
              if (membership.status === 204 || membership.status === 302) {
                core.info(`${actor} is a milady-ai org member — trust gate passed`);
                core.setOutput('allowed', 'true');
                return;
              }
            } catch (e) {
              core.info(`${actor} is not a milady-ai org member (${e.status}) — checking trust score`);
            }

            // Fall back to trust scoring
            try {
              const { data: fileData } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/contributor-trust.json',
                ref: context.ref,
              });
              const allStates = JSON.parse(Buffer.from(fileData.content, 'base64').toString());
              if (allStates[actor]) {
                const { computeTrustScore, DEFAULT_CONFIG, expandState } = require('./.github/trust-scoring.cjs');
                const state = expandState(allStates[actor]);
                const result = computeTrustScore(state, DEFAULT_CONFIG);
                core.info(`Trust score for ${actor}: ${result.score}/100 (${result.tier})`);
                if (result.tier === 'legendary' || result.score >= 75) {
                  core.setOutput('allowed', 'true');
                  return;
                }
              }
            } catch (e) {
              core.warning(`Could not evaluate trust score: ${e.message}`);
            }

            core.setOutput('allowed', 'false');
            core.warning(`Actor ${actor} did not pass trust gate — skipping tracker issue creation`);

      - name: Create release tracker issue
        if: steps.trust.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.info.outputs.version }}';
            const releaseType = '${{ steps.info.outputs.release_type }}';
            const tag = '${{ steps.info.outputs.tag }}';

            const body = [
              `## Release ${version} (${releaseType})`,
              '',
              `**Tag:** \`${tag}\``,
              `**Published by:** @${context.actor}`,
              `**Release URL:** ${context.payload.release.html_url}`,
              '',
              '### Artifact Checklist',
              '',
              '- [ ] npm publish',
              '- [ ] Docker image',
              '- [ ] Electrobun — macOS ARM',
              '- [ ] Electrobun — macOS Intel',
              '- [ ] Electrobun — Windows',
              '- [ ] Electrobun — Linux',
              '- [ ] Android AAB',
              '- [ ] iOS App Store',
              '- [ ] macOS App Store',
              '- [ ] Snap',
              '- [ ] Flatpak',
              '- [ ] Debian',
              '- [ ] Homebrew',
              '- [ ] Homepage',
              '',
              '---',
              `Opened automatically by the [release orchestrator](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${version} — Status Tracker`,
              body: body,
              labels: ['release-tracker'],
            });

            core.info(`Created tracker issue: ${issue.data.html_url}`);

      - name: Summary
        if: always()
        run: |
          echo "## Release Orchestrator" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ steps.info.outputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trust gate:** ${{ steps.trust.outputs.allowed }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Individual release workflows (Electrobun, Android, publish-packages, etc.) trigger independently on \`release: [published]\`." >> $GITHUB_STEP_SUMMARY
