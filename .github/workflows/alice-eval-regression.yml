name: Alice Eval Regression

on:
  workflow_dispatch:
    inputs:
      candidate_path:
        description: Optional path to a scored candidate bundle JSON
        required: false
        default: ""
  schedule:
    - cron: "0 15 * * 1"

concurrency:
  group: alice-eval-regression-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.10"

jobs:
  alice-eval-pack:
    name: Alice Eval Pack
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Validate eval fixtures
        run: bunx vitest run src/benchmark/evals.test.ts

      - name: Emit baseline summary
        run: bun run evals:alice:baseline -- --output artifacts/alice-evals/baseline-summary.json

      - name: Compare candidate bundle when provided
        if: ${{ github.event.inputs.candidate_path != '' }}
        run: bun run evals:alice:compare -- --candidate "${{ github.event.inputs.candidate_path }}" --output artifacts/alice-evals/compare.json

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alice-eval-artifacts
          path: artifacts/alice-evals
          if-no-files-found: warn
