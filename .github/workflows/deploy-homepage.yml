name: Deploy Homepage

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/deploy-homepage.yml"
      - "apps/homepage/**"
      - "scripts/write-homepage-release-data.mjs"
      - "install.sh"
      - "install.ps1"
      - "package.json"
      - "bun.lock"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: homepage-pages
  cancel-in-progress: true

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.10"
  CI: "true"

jobs:
  deploy:
    name: Build and Publish Homepage
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-homepage-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-homepage-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate release metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/write-homepage-release-data.mjs

      - name: Build homepage
        run: bun run build:homepage

      - name: Stage GitHub Pages files
        run: |
          cp install.sh apps/homepage/dist/install.sh
          cp install.ps1 apps/homepage/dist/install.ps1

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./apps/homepage/dist
