name: Windows Desktop Preload Smoke

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "eliza/packages/app-core/scripts/**"
      - "apps/app/electrobun/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: windows-desktop-preload-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preload-smoke:
    name: desktop preload preflight (windows)
    runs-on: windows-latest
    steps:
      - name: Enable long paths (Windows)
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            /.gitmodules
            /package.json
            /bun.lock
            /bunfig.toml
            /tsconfig.json
            apps/
            packages/
            scripts/
            eliza/apps/
            eliza/packages/app-core/
            eliza/packages/native-plugins/
            eliza/packages/typescript/
            eliza/packages/shared/
            eliza/packages/agent/
            eliza/packages/server/
            eliza/plugins/
          sparse-checkout-cone-mode: false

      - name: Initialize workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths for build scripts
        run: |
          if ((Test-Path ".eliza.ci-disabled") -and -not (Test-Path "eliza")) {
            Move-Item -LiteralPath ".eliza.ci-disabled" -Destination "eliza"
          }

      - name: Install desktop package dependencies
        run: |
          bun install --cwd eliza/packages/app-core --ignore-scripts
          bun install --cwd apps/app/electrobun --ignore-scripts

      - name: Run repository postinstall patches
        run: node eliza/packages/app-core/scripts/run-repo-setup.mjs
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Desktop preflight
        run: bun eliza/packages/app-core/scripts/desktop-build.mjs preflight --variant=base

      - name: Build preload bridge
        working-directory: apps/app/electrobun
        run: bun run build:preload
