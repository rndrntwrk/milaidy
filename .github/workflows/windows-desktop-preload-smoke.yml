name: Windows Desktop Preload Smoke

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "eliza/packages/app-core/scripts/**"
      - "apps/app/electrobun/**"
      - "eliza/packages/app-core/platforms/electrobun/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: windows-desktop-preload-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preload-smoke:
    name: desktop preload preflight (windows)
    runs-on: windows-latest
    steps:
      - name: Enable long paths (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Set-GitLongPaths([string]$Scope) {
            & git config $Scope core.longpaths true
            if ($LASTEXITCODE -ne 0) {
              throw "git config $Scope core.longpaths true failed with exit code $LASTEXITCODE"
            }
          }

          try {
            Set-GitLongPaths "--system"
            Write-Host "Enabled Git long paths in system config."
          } catch {
            Write-Warning "System git config failed; falling back to --global. $($_.Exception.Message)"
            Set-GitLongPaths "--global"
            Write-Host "Enabled Git long paths in global config."
          }

      - uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            /.gitmodules
            /package.json
            /bun.lock
            /bunfig.toml
            /tsconfig.json
            /.github/actions/setup-bun-workspace/**
            apps/
            apps/app/electrobun/**
            packages/
            scripts/
            eliza/apps/
            eliza/packages/app-core/
            eliza/packages/native-plugins/
            eliza/packages/typescript/
            eliza/packages/shared/
            eliza/packages/agent/
            eliza/packages/server/
            eliza/plugins/
          sparse-checkout-cone-mode: false

      - name: Initialize workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "1.3.11"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
          disable-local-eliza-workspace: "true"
          prepare-local-eliza-runtime: "true"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for build scripts
        run: node scripts/restore-local-eliza-workspace.mjs

      - name: Restore legacy electrobun compatibility path
        run: node scripts/ensure-legacy-electrobun-compat.mjs

      - name: Run lightweight desktop bootstrap patches
        run: |
          # prepare-local-eliza-runtime already installs the repo-local eliza
          # workspace needed by this published-only lane. Desktop preflight only
          # needs dependency/workspace patching, not the full repo setup flow
          # that rebuilds upstream packages like @elizaos/core on Windows.
          bun install --cwd eliza/packages/app-core/platforms/electrobun --ignore-scripts
          node eliza/packages/app-core/scripts/patch-workspace-plugins.mjs
          node eliza/packages/app-core/scripts/patch-deps.mjs
          node eliza/packages/app-core/scripts/ensure-type-package-aliases.mjs

      - name: Desktop preflight
        run: bun eliza/packages/app-core/scripts/desktop-build.mjs preflight --variant=base

      - name: Build preload bridge
        working-directory: eliza/packages/app-core/platforms/electrobun
        run: bun run build:preload
