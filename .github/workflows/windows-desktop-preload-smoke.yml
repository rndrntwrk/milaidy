name: Windows Desktop Preload Smoke

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  preload-smoke:
    name: desktop preload preflight (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Desktop preflight
        run: node scripts/desktop-build.mjs preflight --variant=base

      - name: Build preload bridge
        working-directory: apps/app/electrobun
        run: bun run build:preload
