name: CI (Fork)

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-fork-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.10"
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"

jobs:
  lint:
    name: Lint & Format
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --no-frozen-lockfile --ignore-scripts

      - name: Biome lint
        run: bun run verify:lint

      - name: Biome format check
        run: bun run format

  typecheck:
    name: Type Check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --no-frozen-lockfile --ignore-scripts

      - name: Run type checker
        run: bun run verify:typecheck

  test:
    name: Targeted Tests
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --no-frozen-lockfile --ignore-scripts

      - name: Run onboarding voice regression tests
        run: bunx vitest run packages/app-core/src/components/onboarding/identity-preview-tts.test.ts
        env:
          NODE_NO_WARNINGS: "1"

  build:
    name: Build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --no-frozen-lockfile --ignore-scripts

      - name: Build project
        run: bun run build

      - name: Build homepage
        run: bun run build:web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
