name: Scenario Matrix (develop)

# Runs the full scenario matrix against real sandboxed external services.
# - Triggered on every push to `develop` (post-merge) and manually via workflow_dispatch.
# - NOT run on PRs — PRs run the smaller `scenario-critical-subset` job defined in
#   `.github/workflows/test.yml` once that job is added.
# - All credentials are MILADY_E2E_* GitHub Actions secrets populated by
#   `.github/workflows/rotate-e2e-secrets.yml` from the `milady-e2e` 1Password vault.
#
# Sharding: 8 shards total. Apple-ecosystem shards (iMessage, BlueBubbles) run on a
# self-hosted macOS runner tagged `milady-e2e-macos`; everything else runs on
# GitHub-hosted `ubuntu-24.04`.
#
# This workflow is INACTIVE until `@elizaos/scenario-runner` publishes the
# `milady-scenarios` CLI and the catalog at `test/scenarios/` is populated. Until
# then it is gated on `workflow_dispatch` with the `enabled` input defaulting to
# `false` — remove that gate once the runner lands.

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      enabled:
        description: "Enable the scenario matrix run (false = no-op)"
        required: false
        default: "false"
      shards:
        description: "Comma-separated shard names to run (empty = all)"
        required: false
        default: ""

concurrency:
  group: scenario-matrix-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"
  NODE_OPTIONS: "--max-old-space-size=8192"
  MILADY_LIVE_TEST: "1"
  ELIZA_LIVE_TEST: "1"
  MILADY_LIVE_SCENARIO_TEST: "1"

jobs:
  matrix:
    name: "scenario-matrix: ${{ matrix.shard.name }}"
    # Gate: workflow must be explicitly enabled or running on develop.
    if: github.event_name == 'push' || inputs.enabled == 'true'
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        shard:
          - name: messaging
            runs-on: ubuntu-24.04
            globs: "test/scenarios/messaging.*/**/*.scenario.ts"
          - name: messaging-apple
            runs-on: [self-hosted, milady-e2e-macos]
            globs: "test/scenarios/messaging.imessage/**/*.scenario.ts test/scenarios/messaging.signal/**/*.scenario.ts"
          - name: todos-reminders
            runs-on: ubuntu-24.04
            globs: "test/scenarios/todos.**/*.scenario.ts test/scenarios/reminders.**/*.scenario.ts"
          - name: calendar
            runs-on: ubuntu-24.04
            globs: "test/scenarios/calendar.**/*.scenario.ts"
          - name: relationships
            runs-on: ubuntu-24.04
            globs: "test/scenarios/relationships.**/*.scenario.ts"
          - name: selfcontrol-activity
            runs-on: [self-hosted, milady-e2e-macos]
            globs: "test/scenarios/selfcontrol.**/*.scenario.ts test/scenarios/activity.**/*.scenario.ts"
          - name: browser-social
            runs-on: ubuntu-24.04
            globs: "test/scenarios/browser.**/*.scenario.ts test/scenarios/social.**/*.scenario.ts"
          - name: cross-cutting-gateway
            runs-on: ubuntu-24.04
            globs: "test/scenarios/cross-cutting.**/*.scenario.ts test/scenarios/gateway.**/*.scenario.ts test/scenarios/remote.**/*.scenario.ts test/scenarios/lifeops.**/*.scenario.ts test/scenarios/goals.**/*.scenario.ts test/scenarios/convo/**/*.scenario.ts"
    runs-on: ${{ matrix.shard.runs-on }}
    timeout-minutes: 60

    env:
      # LLM providers
      MILADY_E2E_GROQ_API_KEY: ${{ secrets.MILADY_E2E_GROQ_API_KEY }}
      MILADY_E2E_OPENAI_API_KEY: ${{ secrets.MILADY_E2E_OPENAI_API_KEY }}
      MILADY_E2E_ANTHROPIC_API_KEY: ${{ secrets.MILADY_E2E_ANTHROPIC_API_KEY }}

      # Gmail / Google Workspace
      MILADY_E2E_GMAIL_TESTOWNER_CLIENT_ID: ${{ secrets.MILADY_E2E_GMAIL_TESTOWNER_CLIENT_ID }}
      MILADY_E2E_GMAIL_TESTOWNER_CLIENT_SECRET: ${{ secrets.MILADY_E2E_GMAIL_TESTOWNER_CLIENT_SECRET }}
      MILADY_E2E_GMAIL_TESTOWNER_REFRESH_TOKEN: ${{ secrets.MILADY_E2E_GMAIL_TESTOWNER_REFRESH_TOKEN }}
      MILADY_E2E_GMAIL_TESTOWNER_ADDRESS: ${{ secrets.MILADY_E2E_GMAIL_TESTOWNER_ADDRESS }}
      MILADY_E2E_GMAIL_TESTAGENT_CLIENT_ID: ${{ secrets.MILADY_E2E_GMAIL_TESTAGENT_CLIENT_ID }}
      MILADY_E2E_GMAIL_TESTAGENT_CLIENT_SECRET: ${{ secrets.MILADY_E2E_GMAIL_TESTAGENT_CLIENT_SECRET }}
      MILADY_E2E_GMAIL_TESTAGENT_REFRESH_TOKEN: ${{ secrets.MILADY_E2E_GMAIL_TESTAGENT_REFRESH_TOKEN }}
      MILADY_E2E_GMAIL_TESTAGENT_ADDRESS: ${{ secrets.MILADY_E2E_GMAIL_TESTAGENT_ADDRESS }}

      # Calendly
      MILADY_E2E_CALENDLY_ACCESS_TOKEN: ${{ secrets.MILADY_E2E_CALENDLY_ACCESS_TOKEN }}
      MILADY_E2E_CALENDLY_HOST_URI: ${{ secrets.MILADY_E2E_CALENDLY_HOST_URI }}
      MILADY_E2E_CALENDLY_EVENT_TYPE_URI: ${{ secrets.MILADY_E2E_CALENDLY_EVENT_TYPE_URI }}

      # Discord
      MILADY_E2E_DISCORD_BOT_TOKEN: ${{ secrets.MILADY_E2E_DISCORD_BOT_TOKEN }}
      MILADY_E2E_DISCORD_CLIENT_ID: ${{ secrets.MILADY_E2E_DISCORD_CLIENT_ID }}
      MILADY_E2E_DISCORD_CLIENT_SECRET: ${{ secrets.MILADY_E2E_DISCORD_CLIENT_SECRET }}
      MILADY_E2E_DISCORD_QA_GUILD_ID: ${{ secrets.MILADY_E2E_DISCORD_QA_GUILD_ID }}
      MILADY_E2E_DISCORD_QA_CHANNEL_ID: ${{ secrets.MILADY_E2E_DISCORD_QA_CHANNEL_ID }}
      MILADY_E2E_DISCORD_USER_RELAY_TOKEN: ${{ secrets.MILADY_E2E_DISCORD_USER_RELAY_TOKEN }}

      # Telegram
      MILADY_E2E_TELEGRAM_BOT_TOKEN: ${{ secrets.MILADY_E2E_TELEGRAM_BOT_TOKEN }}
      MILADY_E2E_TELEGRAM_APP_ID: ${{ secrets.MILADY_E2E_TELEGRAM_APP_ID }}
      MILADY_E2E_TELEGRAM_APP_HASH: ${{ secrets.MILADY_E2E_TELEGRAM_APP_HASH }}
      MILADY_E2E_TELEGRAM_USERBOT_PHONE_NUMBER: ${{ secrets.MILADY_E2E_TELEGRAM_USERBOT_PHONE_NUMBER }}
      MILADY_E2E_TELEGRAM_USERBOT_SESSION_STRING: ${{ secrets.MILADY_E2E_TELEGRAM_USERBOT_SESSION_STRING }}
      MILADY_E2E_TELEGRAM_CHAT_ID: ${{ secrets.MILADY_E2E_TELEGRAM_CHAT_ID }}

      # Twitter / X
      MILADY_E2E_TWITTER_CLIENT_ID: ${{ secrets.MILADY_E2E_TWITTER_CLIENT_ID }}
      MILADY_E2E_TWITTER_CLIENT_SECRET: ${{ secrets.MILADY_E2E_TWITTER_CLIENT_SECRET }}
      MILADY_E2E_TWITTER_USER_REFRESH_TOKEN: ${{ secrets.MILADY_E2E_TWITTER_USER_REFRESH_TOKEN }}
      MILADY_E2E_TWITTER_FRIEND_REFRESH_TOKEN: ${{ secrets.MILADY_E2E_TWITTER_FRIEND_REFRESH_TOKEN }}
      MILADY_E2E_TWITTER_USER_HANDLE: ${{ secrets.MILADY_E2E_TWITTER_USER_HANDLE }}
      MILADY_E2E_TWITTER_FRIEND_HANDLE: ${{ secrets.MILADY_E2E_TWITTER_FRIEND_HANDLE }}

      # Signal
      MILADY_E2E_SIGNAL_PHONE_NUMBER: ${{ secrets.MILADY_E2E_SIGNAL_PHONE_NUMBER }}
      MILADY_E2E_SIGNAL_RECIPIENT_PHONE_NUMBER: ${{ secrets.MILADY_E2E_SIGNAL_RECIPIENT_PHONE_NUMBER }}
      MILADY_E2E_SIGNAL_DATA_DIR: ${{ secrets.MILADY_E2E_SIGNAL_DATA_DIR }}

      # WhatsApp
      MILADY_E2E_WHATSAPP_ACCESS_TOKEN: ${{ secrets.MILADY_E2E_WHATSAPP_ACCESS_TOKEN }}
      MILADY_E2E_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.MILADY_E2E_WHATSAPP_PHONE_NUMBER_ID }}
      MILADY_E2E_WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.MILADY_E2E_WHATSAPP_BUSINESS_ACCOUNT_ID }}
      MILADY_E2E_WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${{ secrets.MILADY_E2E_WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
      MILADY_E2E_WHATSAPP_RECIPIENT_PHONE_NUMBER: ${{ secrets.MILADY_E2E_WHATSAPP_RECIPIENT_PHONE_NUMBER }}

      # Twilio
      MILADY_E2E_TWILIO_ACCOUNT_SID: ${{ secrets.MILADY_E2E_TWILIO_ACCOUNT_SID }}
      MILADY_E2E_TWILIO_API_KEY_SID: ${{ secrets.MILADY_E2E_TWILIO_API_KEY_SID }}
      MILADY_E2E_TWILIO_API_KEY_SECRET: ${{ secrets.MILADY_E2E_TWILIO_API_KEY_SECRET }}
      MILADY_E2E_TWILIO_SMS_FROM: ${{ secrets.MILADY_E2E_TWILIO_SMS_FROM }}
      MILADY_E2E_TWILIO_VOICE_FROM: ${{ secrets.MILADY_E2E_TWILIO_VOICE_FROM }}
      MILADY_E2E_TWILIO_MESSAGING_SERVICE_SID: ${{ secrets.MILADY_E2E_TWILIO_MESSAGING_SERVICE_SID }}
      MILADY_E2E_TWILIO_RECIPIENT: ${{ secrets.MILADY_E2E_TWILIO_RECIPIENT }}

      # BlueBubbles
      MILADY_E2E_BLUEBUBBLES_SERVER_URL: ${{ secrets.MILADY_E2E_BLUEBUBBLES_SERVER_URL }}
      MILADY_E2E_BLUEBUBBLES_PASSWORD: ${{ secrets.MILADY_E2E_BLUEBUBBLES_PASSWORD }}
      MILADY_E2E_BLUEBUBBLES_RECIPIENT_HANDLE: ${{ secrets.MILADY_E2E_BLUEBUBBLES_RECIPIENT_HANDLE }}

      # GitHub
      MILADY_E2E_GITHUB_USER_PAT: ${{ secrets.MILADY_E2E_GITHUB_USER_PAT }}
      MILADY_E2E_GITHUB_AGENT_PAT: ${{ secrets.MILADY_E2E_GITHUB_AGENT_PAT }}
      MILADY_E2E_GITHUB_ORG: ${{ secrets.MILADY_E2E_GITHUB_ORG }}
      MILADY_E2E_GITHUB_TEMPLATE_REPO: ${{ secrets.MILADY_E2E_GITHUB_TEMPLATE_REPO }}

      # 1Password autofill vault
      MILADY_E2E_ONEPASS_SA_TOKEN: ${{ secrets.MILADY_E2E_ONEPASS_SA_TOKEN }}
      MILADY_E2E_ONEPASS_VAULT_ID: ${{ secrets.MILADY_E2E_ONEPASS_VAULT_ID }}

      # Eliza Cloud
      MILADY_E2E_ELIZACLOUD_API_KEY: ${{ secrets.MILADY_E2E_ELIZACLOUD_API_KEY }}
      MILADY_E2E_ELIZACLOUD_BASE_URL: ${{ secrets.MILADY_E2E_ELIZACLOUD_BASE_URL }}

      # Apple
      MILADY_E2E_APPLE_TEAM_ID: ${{ secrets.MILADY_E2E_APPLE_TEAM_ID }}
      MILADY_E2E_APPLE_APNS_KEY_ID: ${{ secrets.MILADY_E2E_APPLE_APNS_KEY_ID }}
      MILADY_E2E_APPLE_APNS_KEY_P8: ${{ secrets.MILADY_E2E_APPLE_APNS_KEY_P8 }}
      MILADY_E2E_APPLE_APNS_TOPIC: ${{ secrets.MILADY_E2E_APPLE_APNS_TOPIC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile

      - name: Restore eliza workspace paths
        run: node scripts/restore-local-eliza-workspace.mjs

      - name: Run scenario shard
        id: run
        run: |
          bun run milady-scenarios run \
            --report-dir reports/scenarios/${{ github.run_id }}-${{ matrix.shard.name }} \
            --runId "${{ github.run_id }}-${{ matrix.shard.name }}" \
            ${{ matrix.shard.globs }}
        continue-on-error: false

      - name: Upload shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-report-${{ matrix.shard.name }}
          path: reports/scenarios/${{ github.run_id }}-${{ matrix.shard.name }}/

  summary:
    name: Matrix summary
    needs: [matrix]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: scenario-report-*
          path: reports/scenarios/all
          merge-multiple: true

      - name: Aggregate
        run: bun run scripts/aggregate-scenario-reports.mjs reports/scenarios/all >> "$GITHUB_STEP_SUMMARY"
