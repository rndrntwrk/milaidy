name: Rotate E2E Secrets (milady-e2e vault → GitHub Actions)

# Syncs all MILADY_E2E_* / ELIZA_E2E_* values from the `milady-e2e` 1Password vault into
# GitHub Actions repository secrets. Runs monthly on the 1st at 04:00 UTC,
# whenever the `.github/workflows/rotate-e2e-secrets.yml` file is updated on
# `develop`, or manually via workflow_dispatch.
#
# Requires repository secrets:
#   - OP_SERVICE_ACCOUNT_TOKEN: token for the `milady-e2e-ci` 1Password service
#     account with read access to the `milady-e2e` vault.
#   - MILADY_E2E_GH_ADMIN_TOKEN: a fine-grained PAT scoped to this repo with
#     `Actions: secrets: write` permission.

on:
  schedule:
    - cron: "0 4 1 * *"
  push:
    branches: [develop]
    paths:
      - ".github/workflows/rotate-e2e-secrets.yml"
      - "scripts/rotate-e2e-secrets.mjs"
  workflow_dispatch:

concurrency:
  group: rotate-e2e-secrets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rotate:
    name: Sync 1Password → GitHub Actions secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check rotation credentials
        id: credentials
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: ${{ secrets.MILADY_E2E_GH_ADMIN_TOKEN }}
        run: |
          if [[ -z "$OP_SERVICE_ACCOUNT_TOKEN" || -z "$GH_TOKEN" ]]; then
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "::error::OP_SERVICE_ACCOUNT_TOKEN and MILADY_E2E_GH_ADMIN_TOKEN are required for manual secret rotation."
              exit 1
            fi
            echo "available=false" >> "$GITHUB_OUTPUT"
            {
              echo "## E2E secret rotation skipped"
              echo ""
              echo "OP_SERVICE_ACCOUNT_TOKEN and MILADY_E2E_GH_ADMIN_TOKEN must both be configured before automatic rotation can run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install 1Password CLI
        if: steps.credentials.outputs.available == 'true'
        uses: 1password/install-cli-action@v1

      - name: Install GitHub CLI
        if: steps.credentials.outputs.available == 'true'
        run: |
          type -p gh >/dev/null 2>&1 || (
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
          )

      - name: Setup Bun
        if: steps.credentials.outputs.available == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Sync secrets
        if: steps.credentials.outputs.available == 'true'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: ${{ secrets.MILADY_E2E_GH_ADMIN_TOKEN }}
        run: node scripts/rotate-e2e-secrets.mjs --repo "${{ github.repository }}"

      - name: Check for impending expirations
        if: steps.credentials.outputs.available == 'true'
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: node scripts/check-e2e-secrets-expiry.mjs --warn-days 7 >> "$GITHUB_STEP_SUMMARY"
