name: Task Agent Cross-Platform Review

on:
  workflow_dispatch:

env:
  CI: "true"
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"
  NODE_NO_WARNINGS: "1"
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"

jobs:
  coordinator-platform-review:
    name: Coordinator Platform Review (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        shell: bash
        run: bun install --ignore-scripts

      - name: Run repository postinstall
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run coordinator platform review
        run: node scripts/coordinator-cross-platform-review.mjs

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task-agent-cross-platform-review-${{ matrix.os }}
          path: .tmp/qa/
          retention-days: 14
