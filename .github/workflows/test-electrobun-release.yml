name: Validate Electrobun Release Workflow

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-electrobun-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.9"
  NODE_NO_WARNINGS: "1"

jobs:
  validate-release-workflow:
    name: Release Workflow Contract
    runs-on: ${{ vars.RUNNER_UBUNTU || (github.repository_owner == 'milady-ai' && 'blacksmith-4vcpu-ubuntu-2404' || 'ubuntu-latest') }}
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Run regression matrix contract
        run: bun run test:regression-matrix:release-contract

      - name: Run release contract suite
        run: bun run test:release:contract
