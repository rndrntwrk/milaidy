name: Validate Electrobun Release Workflow

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-electrobun-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.9"

jobs:
  validate-release-workflow:
    name: Release Workflow Contract
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Run release workflow drift tests
        run: >
          bunx vitest run
          scripts/electrobun-release-workflow-drift.test.ts
          scripts/electrobun-test-workflow-drift.test.ts
          scripts/whisper-build-script-drift.test.ts
          scripts/release-check.test.ts

      - name: Build release-check dist prerequisites
        run: |
          bunx tsdown
          printf '{"type":"module"}\n' > dist/package.json
          node --import tsx scripts/write-build-info.ts

      - name: Run release contract checks
        run: bun run release:check
