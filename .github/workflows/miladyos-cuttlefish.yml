name: MiladyOS Cuttlefish

# MiladyOS is a whitelabel of the elizaOS distro-android toolchain.
# This workflow drives the brand-aware build pipeline in eliza
# (`scripts/distro-android/`) with the milady brand config + vendor
# tree, and is otherwise functionally identical to running
# `bun run miladyos:*` locally.

on:
  workflow_dispatch:
    inputs:
      aosp-root:
        description: "Existing AOSP checkout root on the Linux/KVM runner"
        required: true
        type: string
      jobs:
        description: "AOSP build parallelism"
        required: false
        default: "8"
        type: string
      launch:
        description: "Launch Cuttlefish and run adb boot validation"
        required: false
        default: true
        type: boolean

jobs:
  build-and-validate:
    name: Build and validate MiladyOS
    runs-on: [self-hosted, linux, x64, kvm]
    timeout-minutes: 720
    env:
      DISTRO_ANDROID_BRAND_CONFIG: os/android/brand.milady.json
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # The validator shells out to `aapt` to inspect the staged APK,
      # and `build:android:system` runs Gradle which needs a full SDK.
      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;36.0.0 platforms;android-36"

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build privileged Milady APK
        run: bun run build:android:system

      - name: Static MiladyOS validation
        run: |
          node eliza/scripts/distro-android/validate.mjs \
            --brand-config os/android/brand.milady.json

      - name: Sync, build, and optionally boot MiladyOS
        run: |
          ARGS=(
            --brand-config os/android/brand.milady.json
            --source-vendor os/android/vendor/milady
            --aosp-root "${{ inputs.aosp-root }}"
            --jobs "${{ inputs.jobs }}"
          )
          if [ "${{ inputs.launch }}" = "true" ]; then
            ARGS+=(--launch --boot-validate)
          fi
          node eliza/scripts/distro-android/build-aosp.mjs "${ARGS[@]}"
