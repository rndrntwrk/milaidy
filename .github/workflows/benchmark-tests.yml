name: Benchmark Bridge Tests

concurrency:
  group: benchmark-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    paths:
      - "eliza/packages/app-core/src/benchmark/**"
      - ".github/workflows/benchmark-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "eliza/packages/app-core/src/benchmark/**"
      - ".github/workflows/benchmark-tests.yml"
  workflow_dispatch:

env:
  NODE_NO_WARNINGS: "1"

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: benchmark-tests
            command: cd eliza && bunx vitest run packages/app-core/src/benchmark/*.test.ts --passWithNoTests
          - lane: benchmark-lint
            command: cd eliza && bunx @biomejs/biome check packages/app-core/src/benchmark

    env:
      MILADY_SKIP_LOCAL_UPSTREAMS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      # Use the shared workspace setup action so submodule init,
      # eliza workspace disable, Bun install, and postinstall patches
      # happen in the same deterministic order as the rest of CI.
      # Without this the benchmark job was hitting
      # "Workspace dependency @elizaos/agent-orchestrator not found"
      # because nothing had initialized the `eliza` submodule (including nested
      # `eliza/plugins/*` checkouts).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          check-latest: false

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: "1.3.11"
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"

      - name: Restore eliza workspace paths for benchmark scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Run ${{ matrix.lane }} lane
        env:
          CI: "true"
        run: ${{ matrix.command }}
