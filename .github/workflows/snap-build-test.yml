name: Snap Build & Test

on:
  push:
    paths:
      - 'eliza/packages/app-core/packaging/snap/**'
      - '.github/workflows/snap-build-test.yml'
  pull_request:
    paths:
      - 'eliza/packages/app-core/packaging/snap/**'
      - '.github/workflows/snap-build-test.yml'
  workflow_dispatch:

concurrency:
  group: snap-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-snap:
    name: Build Snap (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          # arm64 builds can be enabled when arm runners are available
          # - arch: arm64
          #   runner: ubuntu-24.04-arm

    steps:
      - name: Free disk space on runner
        run: |
          set -euo pipefail
          echo "=== before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          echo "=== after ==="
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Snap build runs `bun install` inside the snapcraft
          # sandbox, which requires every `workspace:*` dependency
          # under `eliza/plugins/plugin-*/typescript` to be present. Without
          # submodules, those directories are empty and `bun install`
          # fails with "Workspace dependency @elizaos/plugin-... not
          # found" for every plugin submodule.
          submodules: false

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            bun install --ignore-scripts
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi

      - name: Mirror milady.mjs → elizaos-app.mjs for snapcraft entry
        run: |
          if [ -f milady.mjs ] && [ ! -f elizaos-app.mjs ]; then
            cp milady.mjs elizaos-app.mjs
            echo "Mirrored milady.mjs → elizaos-app.mjs so the elizaos-app snap entry file is present in the snapcraft source."
          fi

      - name: Prepare snapcraft.yaml
        run: |
          mkdir -p snap
          cp eliza/packages/app-core/packaging/snap/snapcraft.yaml snap/snapcraft.yaml

          # Use package.json version
          VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0-dev")
          sed -i "s/^version: .*/version: '${VERSION}'/" snap/snapcraft.yaml
          echo "Building snap version: $VERSION"

      - name: Normalize runner root ownership for snapd
        run: |
          set -euo pipefail
          ROOT_OWNER="$(stat -c '%u:%g' /)"
          echo "Runner root owner: ${ROOT_OWNER}"
          if [ "${ROOT_OWNER}" = "0:0" ]; then
            echo "Root is already 0:0 — snapd canonicalization OK"
            exit 0
          fi
          echo "Attempting to repair / ownership so snapd/systemd path canonicalization accepts this runner"
          if sudo -n chown root:root / 2>/dev/null; then
            echo "Chown succeeded; new owner: $(stat -c '%u:%g' /)"
          else
            echo "::warning::Unable to chown / to root:root (sudo unavailable or passwordless sudo disabled). snapd may fail downstream. Remediation: run this job on a standard ubuntu-latest / ubuntu-24.04 GitHub-hosted runner, or configure the container image so / is owned by 0:0."
          fi

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Verify snap contents
        run: |
          echo "=== Snap file ==="
          ls -lh ${{ steps.snapcraft.outputs.snap }}

          echo "=== Snap info ==="
          snap info ${{ steps.snapcraft.outputs.snap }} 2>/dev/null || unsquashfs -l ${{ steps.snapcraft.outputs.snap }} | head -50

      - name: Install and test snap
        run: |
          sudo snap install ${{ steps.snapcraft.outputs.snap }} --dangerous
          echo "=== Installed snap ==="
          snap list milady

          echo "=== Version check ==="
          milady --version || echo "Version check completed (exit $?)"

          echo "=== Help check ==="
          milady --help 2>&1 | head -20 || echo "Help check completed (exit $?)"

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}
          retention-days: 30
