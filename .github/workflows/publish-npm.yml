name: Publish npm

# Publishes milady to npm with the correct dist-tag based on the version.
#
# Channel mapping:
#   - Stable releases (v2.0.0)           → dist-tag "latest"
#   - Canary releases (v2.0.0-alpha.1)   → dist-tag "canary"
#   - Beta releases (v2.0.0-beta.1)      → dist-tag "beta"
#   - RC releases (v2.0.0-rc.1)          → dist-tag "rc"
#   - Nightly builds are handled by nightly.yml
#
# Triggers:
#   - After a GitHub Release is published (from release.yml)
#   - Manual dispatch for ad-hoc publishes

on:
  workflow_call:
    inputs:
      version:
        description: "Version to publish (e.g. 2.0.0, 2.0.0-beta.1)"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag override"
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.0.0, 2.0.0-beta.1)"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag override (leave empty for auto-detection)"
        required: false
        type: string

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: "true"

jobs:
  detect-meta:
    name: Determine version and dist-tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version and dist-tag
        id: meta
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          DIST_TAG="${{ inputs.dist_tag }}"
          if [[ -z "$DIST_TAG" ]] && echo "$VERSION" | grep -qE 'nightly'; then
            DIST_TAG="nightly"
          elif [[ -z "$DIST_TAG" ]] && echo "$VERSION" | grep -qE 'beta'; then
            DIST_TAG="beta"
          elif [[ -z "$DIST_TAG" ]] && echo "$VERSION" | grep -qE 'alpha'; then
            DIST_TAG="canary"
          elif [[ -z "$DIST_TAG" ]] && echo "$VERSION" | grep -qE 'rc'; then
            DIST_TAG="rc"
          elif [[ -z "$DIST_TAG" ]]; then
            DIST_TAG="latest"
          fi
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Dist-tag: $DIST_TAG"

  publish:
    name: Publish
    needs: detect-meta
    uses: ./.github/workflows/reusable-npm-publish.yml
    with:
      version: ${{ needs.detect-meta.outputs.version }}
      dist_tag: ${{ needs.detect-meta.outputs.dist_tag }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  verify:
    name: Verify publish
    needs: [detect-meta, publish]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify publish
        run: |
          EXPECTED="${{ needs.detect-meta.outputs.version }}"
          DIST_TAG="${{ needs.detect-meta.outputs.dist_tag }}"

          for attempt in {1..12}; do
            PUBLISHED_VERSION="$(npm view "miladyai@$EXPECTED" version 2>/dev/null || true)"
            DIST_TAG_VERSION="$(npm view "miladyai@$DIST_TAG" version 2>/dev/null || true)"
            if [[ "$PUBLISHED_VERSION" == "$EXPECTED" && "$DIST_TAG_VERSION" == "$EXPECTED" ]]; then
              echo "Verified: miladyai@$EXPECTED and miladyai@$DIST_TAG both resolve to $EXPECTED"
              exit 0
            fi
            echo "Publish not visible yet (attempt $attempt/12): version='$PUBLISHED_VERSION' dist-tag='$DIST_TAG_VERSION'"
            sleep 10
          done

          echo "::error::npm registry verification failed for miladyai@$EXPECTED with dist-tag $DIST_TAG"
          exit 1

      - name: Summary
        run: |
          {
            echo "## npm Publish Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Package | miladyai |"
            echo "| Version | \`${{ needs.detect-meta.outputs.version }}\` |"
            echo "| Dist-tag | \`${{ needs.detect-meta.outputs.dist_tag }}\` |"
            echo ""
            echo "### Install"
            echo '```bash'
            echo "npm install -g miladyai@${{ needs.detect-meta.outputs.dist_tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
