# =============================================================================
# build-docker.yml — Build the canonical Milady agent image and push to GHCR
# =============================================================================
#
# Triggers:
#   - Push of release tags: v2.0.0-alpha.*, v2.0.*
#   - GitHub Release published (covers tags created via API/UI)
#   - Reusable workflow call from agent-release.yml for validated releases
#   - Manual dispatch (workflow_dispatch) with optional override
#   - Push to develop branch (produces :dev tag, no :latest)
#
# Published to: ghcr.io/milady-ai/agent
#   Tags: :v{version}  (e.g. :v2.0.0-alpha.91)
#         :latest      (when tag_latest is enabled)
#         :dev         (on develop pushes / manual non-release builds)
#
# Build strategy: GHA pre-builds the app (bun install + tsdown + vite build),
# then Dockerfile.ci copies the pre-built artifacts and applies size pruning.
# This produces a ~1.8GB image (vs 4GB baseline) via TIER 1+2 pruning.
# =============================================================================

name: Build Agent Image

on:
  push:
    tags:
      - "v2.0.0-alpha.*"
      - "v2.0.*"
    branches:
      - develop
  release:
    types: [published]
  workflow_call:
    inputs:
      version:
        description: "Version tag to publish (e.g. v2.0.0-alpha.91)"
        required: true
        type: string
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true
      tag_latest:
        description: "Also tag as :latest"
        required: false
        type: boolean
        default: true
      source_sha:
        description: "Exact git commit to build"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (e.g. v2.0.0-alpha.91). Defaults to package.json version."
        required: false
        type: string
      push_image:
        description: "Push image to GHCR (uncheck for dry-run)"
        required: false
        type: boolean
        default: true
      tag_latest:
        description: "Also tag as :latest"
        required: false
        type: boolean
        default: true
      source_sha:
        description: "Optional exact git commit to build instead of the dispatched ref"
        required: false
        type: string

concurrency:
  group: build-docker-${{ inputs.version || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: milady-ai/agent
  DEPOT_PROJECT_ID: m89t0f0p08

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build agent image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_sha || github.event.release.tag_name || github.sha }}
          submodules: false

      # ── 2. Set up Node 22 ───────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── 3. Set up Bun ───────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      # ── 4. Restore cached bun store ─────────────────────────────────────────
      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      # ── 4.5. Init eliza source checkout ───────────────────────────────────
      # The Milady repo now defaults to published @elizaos packages and no
      # longer tracks eliza/ as a gitlink. The image build still needs source
      # artifacts, so hydrate the canonical eliza repo explicitly.
      - name: Initialize eliza source checkout
        run: |
          if [ ! -f eliza/package.json ]; then
            git clone --depth=1 --branch "${MILADY_ELIZA_BRANCH:-develop}" https://github.com/milady-ai/eliza.git eliza
          fi

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs
        env:
          MILADY_SKIP_CLOUD_SUBMODULE: "1"

      - name: Prepare eliza source workspace
        run: |
          if [ -f eliza/.gitmodules ]; then
            git -C eliza submodule sync --recursive
            git -C eliza \
              -c submodule.cloud.update=none \
              -c submodule.plugins/plugin-elizacloud.update=none \
              submodule update --init --recursive --depth=1
          fi
          node --input-type=module <<'NODE'
          import {
            pruneDuplicateLegacyElizaPluginWorkspaces,
            pruneSkippedCloudWorkspace,
          } from "./scripts/init-submodules.mjs";

          pruneSkippedCloudWorkspace({ rootDir: process.cwd() });
          pruneDuplicateLegacyElizaPluginWorkspaces({ rootDir: process.cwd() });
          NODE
        env:
          MILADY_SKIP_CLOUD_SUBMODULE: "1"

      - name: Repair known eliza patch files
        run: |
          node --input-type=module <<'NODE'
          import { repairKnownElizaPatchFiles } from "./scripts/disable-local-eliza-workspace.mjs";

          repairKnownElizaPatchFiles();
          NODE

      # ── 5. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --ignore-scripts --no-frozen-lockfile

      - name: Install eliza source dependencies
        run: bun install --cwd eliza --no-frozen-lockfile

      # ── 5b. Install build fallback dependencies ────────────────────────────
      # Hydrate published-only dependency fallbacks first so package-local builds
      # can resolve @noble/*, @types/*, and other third-party deps while
      # postinstall skips the expensive repo-local upstream setup.
      - name: Install published-workspace fallback dependencies
        run: bash scripts/install-published-workspace-fallback-deps.sh

      # ── 5c. Run postinstall patches ────────────────────────────────────────
      - name: Run postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"
          MILADY_SKIP_LOCAL_UPSTREAMS: "1"

      # ── 6. Build Capacitor plugins ──────────────────────────────────────────
      # The Vite UI imports @elizaos/capacitor-* workspace packages which need
      # their dist/ built before vite can resolve them.
      - name: Build Capacitor plugins
        run: |
          node eliza/packages/app-core/scripts/build-native-plugins.mjs

      # ── 6.5. Build eliza runtime packages needed by the agent image ─────────
      - name: Build @elizaos/core
        run: |
          cd eliza/packages/core
          bun run build

      # ── 7. Build runtime workspace packages with source exports ─────────────
      - name: Build agent workspace
        run: |
          cd eliza/packages/agent
          bun run build:docker-dist

      - name: Build @elizaos/shared
        run: |
          cd eliza/packages/shared
          bun run build

      # ── 9. Build runtime (tsdown) ───────────────────────────────────────────
      - name: Build runtime (tsdown)
        run: |
          # bun npm package ships a postinstall (install.js) that sets up
          # the runtime-embedded build plugins. --ignore-scripts in step 5
          # skipped it; run it manually so rolldown/tsdown can use Bun APIs.
          if [ -d node_modules/bun ] && [ -f node_modules/bun/install.js ]; then
            (cd node_modules/bun && node install.js) || true
          fi
          npx tsdown
          echo '{"type":"module"}' > dist/package.json
          # write-build-info.ts may not exist on all branches — soft fail
          node --import tsx eliza/packages/app-core/scripts/write-build-info.ts 2>/dev/null || true

      # ── 10. Determine version ───────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            # Triggered by release event — use the release tag
            VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Branch push (develop) — use package.json version with dev suffix
            VERSION="v$(node -p "require('./package.json').version")-dev"
          fi

          VERSION_CLEAN="${VERSION#v}"

          # Only treat explicit versioned builds as releases.
          IS_RELEASE="false"
          TAG_LATEST="false"
          if [[ -n "${{ inputs.version }}" ]] || [[ -n "${{ github.event.release.tag_name }}" ]] || [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IS_RELEASE="true"
            if [[ "${{ inputs.tag_latest }}" != "false" ]]; then
              TAG_LATEST="true"
            fi
          fi

          {
            echo "version=${VERSION}"
            echo "version_clean=${VERSION_CLEAN}"
            echo "is_release=${IS_RELEASE}"
            echo "tag_latest=${TAG_LATEST}"
          } >> "$GITHUB_OUTPUT"

          echo "Version:    ${VERSION}"
          echo "Clean:      ${VERSION_CLEAN}"
          echo "Is release: ${IS_RELEASE}"
          echo "Tag latest: ${TAG_LATEST}"
          echo "Source SHA: $(git rev-parse HEAD)"

      - name: Load deploy config
        run: |
          set -a
          source eliza/packages/app-core/deploy/deploy.defaults.env
          source deploy/deploy.env
          set +a
          {
            echo "APP_ENTRYPOINT=${APP_ENTRYPOINT}"
            echo "APP_PORT=${APP_PORT}"
            echo "APP_API_BIND=${APP_API_BIND}"
            echo "OCI_SOURCE=${OCI_SOURCE}"
            echo "OCI_LICENSES=${OCI_LICENSES}"
            echo "APP_CMD_START<<EOF"
            echo "${APP_CMD_START}"
            echo "EOF"
            echo "OCI_TITLE<<EOF"
            echo "${OCI_TITLE}"
            echo "EOF"
            echo "OCI_DESCRIPTION<<EOF"
            echo "${OCI_DESCRIPTION}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # ── 11. Build UI (vite) ─────────────────────────────────────────────────
      - name: Build UI (vite)
        run: |
          cd apps/app
          bun run build:web
        env:
          MILADY_RELEASE_TAG: ${{ steps.version.outputs.is_release == 'true' && steps.version.outputs.version || '' }}
          VITE_ASSET_BASE_URL: ${{ steps.version.outputs.is_release == 'true' && format('https://raw.githubusercontent.com/milady-ai/milady/{0}/apps/app/public/', steps.version.outputs.version) || '' }}
          NODE_ENV: production

      # ── 12. Override dockerignore to include pre-built dist/ ────────────────
      # The repo's .dockerignore excludes dist/ to keep developer Docker builds clean.
      # For CI, dist/ is pre-built by GHA so we need it in the build context.
      # We use eliza/packages/app-core/deploy/.dockerignore.ci (tracked in the
      # repo) instead of the default.
      - name: Set up CI dockerignore
        run: cp eliza/packages/app-core/deploy/.dockerignore.ci .dockerignore

      # ── 13. Set up Depot CLI ────────────────────────────────────────────────
      # Docker builds run on Depot infrastructure (persistent cache, no GHA
      # docker-daemon fragility). `DEPOT_TOKEN` secret must be set on the repo.
      # Set repo variable DEPOT_ENABLED=false to skip Depot entirely and go
      # straight to the Buildx fallback (e.g. when the Depot account is
      # unavailable).
      - name: Set up Depot CLI
        if: vars.DEPOT_ENABLED != 'false'
        uses: depot/setup-action@v1

      - name: Set up Docker Buildx fallback
        uses: docker/setup-buildx-action@v3

      # ── 14. Login to GHCR ───────────────────────────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        if: ${{ github.event_name == 'push' || inputs.push_image != false }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 13. Docker image metadata ───────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.tag_latest == 'true' }}
            type=raw,value=dev,enable=${{ steps.version.outputs.is_release == 'false' }}

      # ── 14. Build and push (on Depot, with Buildx fallback) ────────────────
      # depot/build-push-action builds on Depot's BuildKit workers (persistent
      # layer cache, no GHA daemon). Push goes directly from Depot to GHCR,
      # sidestepping the GHA → GHCR 403 class of failures on restricted tokens.
      - name: Build and push Docker image with Depot
        id: depot-build
        if: vars.DEPOT_ENABLED != 'false'
        continue-on-error: true
        uses: depot/build-push-action@v1
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          token: ${{ secrets.DEPOT_TOKEN }}
          context: .
          file: eliza/packages/app-core/deploy/Dockerfile.ci
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push_image != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_CORE_DIR=eliza/packages/app-core
            AGENT_DIR=eliza/packages/agent
            APP_DIR=apps/app
            APP_ENTRYPOINT=${{ env.APP_ENTRYPOINT }}
            APP_CMD_START=${{ env.APP_CMD_START }}
            APP_PORT=${{ env.APP_PORT }}
            APP_API_BIND=${{ env.APP_API_BIND }}
            OCI_SOURCE=${{ env.OCI_SOURCE }}
            OCI_TITLE=${{ env.OCI_TITLE }}
            OCI_DESCRIPTION=${{ env.OCI_DESCRIPTION }}
            OCI_LICENSES=${{ env.OCI_LICENSES }}
            VERSION=${{ steps.version.outputs.version }}
            VERSION_CLEAN=${{ steps.version.outputs.version_clean }}
            REVISION=${{ github.sha }}
            MILADY_RELEASE_TAG=${{ steps.version.outputs.is_release == 'true' && steps.version.outputs.version || '' }}
          provenance: false
          buildx-fallback: true

      - name: Build and push Docker image with Buildx fallback
        if: vars.DEPOT_ENABLED == 'false' || steps.depot-build.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: eliza/packages/app-core/deploy/Dockerfile.ci
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push_image != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_CORE_DIR=eliza/packages/app-core
            AGENT_DIR=eliza/packages/agent
            APP_DIR=apps/app
            APP_ENTRYPOINT=${{ env.APP_ENTRYPOINT }}
            APP_CMD_START=${{ env.APP_CMD_START }}
            APP_PORT=${{ env.APP_PORT }}
            APP_API_BIND=${{ env.APP_API_BIND }}
            OCI_SOURCE=${{ env.OCI_SOURCE }}
            OCI_TITLE=${{ env.OCI_TITLE }}
            OCI_DESCRIPTION=${{ env.OCI_DESCRIPTION }}
            OCI_LICENSES=${{ env.OCI_LICENSES }}
            VERSION=${{ steps.version.outputs.version }}
            VERSION_CLEAN=${{ steps.version.outputs.version_clean }}
            REVISION=${{ github.sha }}
            MILADY_RELEASE_TAG=${{ steps.version.outputs.is_release == 'true' && steps.version.outputs.version || '' }}
          provenance: false

      # ── 15. Build summary ───────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🐳 Milady Docker Image"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Registry | \`${{ env.REGISTRY }}\` |"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| Tagged latest | \`${{ steps.version.outputs.tag_latest }}\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Requested SHA | \`${{ inputs.source_sha || github.sha }}\` |"
            echo "| Built SHA | \`$(git rev-parse HEAD)\` |"
            echo ""
            echo "### Pull commands"
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
            if [ "${{ steps.version.outputs.tag_latest }}" = "true" ]; then
              echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
