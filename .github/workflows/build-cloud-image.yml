# =============================================================================
# build-cloud-image.yml — Build the full Milady app image for cloud deploys
# =============================================================================
#
# Triggers:
#   - Push of release tags: v2.0.0-alpha.*, v2.0.*
#   - Reusable workflow call from agent-release.yml for validated releases
#   - Manual dispatch (workflow_dispatch) with optional override
#
# Published to: ghcr.io/milady-ai/milady/agent
#   Tags: :cloud-app
#         :cloud-app-{version}
#
# Build strategy: publish the complete Milady app image (UI + API + runtime)
# for hosted cloud deployments. Subordinate per-agent runtimes use the internal
# eliza/packages/app-core/deploy/Dockerfile.cloud-agent contract instead of this
# user-facing image.
# =============================================================================

name: Build Cloud App Image

on:
  push:
    tags:
      - "v2.0.0-alpha.*"
      - "v2.0.*"
  workflow_call:
    inputs:
      version:
        description: "Version tag to publish (e.g. v2.0.0-alpha.91)"
        required: true
        type: string
      push_image:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true
      source_sha:
        description: "Exact git commit to build"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (e.g. v2.0.0-alpha.91). Defaults to latest tag."
        required: false
        type: string
      push_image:
        description: "Push image to GHCR (uncheck for dry-run)"
        required: false
        type: boolean
        default: true
      source_sha:
        description: "Optional exact git commit to build instead of the dispatched ref"
        required: false
        type: string

concurrency:
  group: build-cloud-image-${{ inputs.version || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: milady-ai/milady/agent
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"
  DEPOT_PROJECT_ID: m89t0f0p08

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build cloud app image
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_sha || github.sha }}
          submodules: false

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache bun store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-store-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-

      - name: Init eliza checkout
        run: |
          if [ ! -f eliza/package.json ]; then
            git clone --depth=1 --branch "${MILADY_ELIZA_BRANCH:-develop}" https://github.com/milady-ai/eliza.git eliza
          fi

      - name: Init cloud image plugin manifests
        run: |
          git -C eliza submodule update --init --depth=1 \
            plugins/plugin-sql \
            plugins/plugin-elizacloud

      - name: Apply Milady eliza CI patches
        run: node scripts/apply-eliza-ci-patches.mjs

      - name: Init non-eliza submodules
        run: |
          node scripts/init-submodules.mjs
          node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts --frozen-lockfile

      - name: Install eliza source dependencies
        run: bun install --cwd eliza --no-frozen-lockfile

      - name: Install published-workspace fallback dependencies
        run: bash scripts/install-published-workspace-fallback-deps.sh

      - name: Run postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build Capacitor plugins
        run: |
          node eliza/packages/app-core/scripts/build-native-plugins.mjs

      - name: Build agent workspace
        run: |
          cd eliza/packages/agent
          bun run build:docker-dist

      - name: Install buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.50.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build @elizaos/core (includes agent-orchestrator)
        run: |
          export PATH="$GITHUB_WORKSPACE/eliza/node_modules/.bin:$GITHUB_WORKSPACE/eliza/packages/schemas/node_modules/.bin:$PATH"
          cd eliza/packages/schemas
          buf dep update && buf generate
          cd ../core
          node ../shared/scripts/generate-keywords.mjs --target ts 2>/dev/null || echo "keyword gen skipped"
          node <<'NODE'
          const fs = require("node:fs");
          const file = "tsconfig.declarations.json";
          const config = JSON.parse(fs.readFileSync(file, "utf8"));
          config.compilerOptions = {
            ...(config.compilerOptions ?? {}),
            ignoreDeprecations: "6.0",
          };
          fs.writeFileSync(file, JSON.stringify(config, null, 2) + "\n");
          NODE
          bun run build:node

      - name: Build runtime (tsdown)
        run: |
          npx tsdown
          echo '{"type":"module"}' > dist/package.json
          node --import tsx eliza/packages/app-core/scripts/write-build-info.ts 2>/dev/null || true

      - name: Inject tailwindcss into eliza/packages/app-core/node_modules
        run: |
          mkdir -p eliza/packages/app-core/node_modules
          if [ ! -d "eliza/packages/app-core/node_modules/tailwindcss" ]; then
            echo "Fetching tailwindcss tarball..."
            TAILWIND_URL=$(npm view tailwindcss dist.tarball 2>/dev/null)
            if [ -n "$TAILWIND_URL" ]; then
              rm -rf /tmp/tw_extract
              mkdir -p /tmp/tw_extract
              curl -sL "$TAILWIND_URL" | tar xz -C /tmp/tw_extract
              mv /tmp/tw_extract/package eliza/packages/app-core/node_modules/tailwindcss
              echo "+ tailwindcss $(node -p "require('./eliza/packages/app-core/node_modules/tailwindcss/package.json').version")"
            else
              echo "WARN: could not resolve tailwindcss tarball URL"
            fi
          else
            echo "tailwindcss already present in app-core/node_modules"
          fi

      - name: Build UI (vite)
        run: |
          cd apps/app
          bun run build:web
        env:
          NODE_ENV: production

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            # Only match release tags (v2.0.5, v2.0.0-alpha.132) — skip dev/experimental tags
            VERSION="$(git tag --sort=-creatordate | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-alpha\.[0-9]+)?$' | head -1)"
            if [ -z "$VERSION" ]; then
              VERSION="$(git tag --sort=-creatordate | grep '^v' | head -1)"
            fi
          fi

          VERSION_CLEAN="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_clean=${VERSION_CLEAN}" >> "$GITHUB_OUTPUT"
          echo "Source SHA: $(git rev-parse HEAD)"

      - name: Load deploy config
        run: |
          set -a
          source eliza/packages/app-core/deploy/deploy.defaults.env
          source deploy/deploy.env
          set +a
          {
            echo "APP_ENTRYPOINT=${APP_ENTRYPOINT}"
            echo "APP_PORT=${APP_PORT}"
            echo "APP_API_BIND=${APP_API_BIND}"
            echo "OCI_SOURCE=${OCI_SOURCE}"
            echo "OCI_LICENSES=${OCI_LICENSES}"
            echo "APP_CMD_START<<EOF"
            echo "${APP_CMD_START}"
            echo "EOF"
            echo "OCI_TITLE<<EOF"
            echo "${OCI_TITLE}"
            echo "EOF"
            echo "OCI_DESCRIPTION<<EOF"
            echo "${OCI_DESCRIPTION}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Stage Dockerfile-expected paths
        # Dockerfile.cloud was authored against the eliza-monorepo layout where
        # patches/, plugins/plugin-selfcontrol/, and scripts/docker-entrypoint.sh
        # all live at repo root. In milady they live at eliza/... and packages/...
        # so we materialize the expected paths into the build context here.
        run: |
          set -eu
          # patches/ — copy from eliza/packages/app-core/patches
          if [ ! -e patches ] && [ -d eliza/packages/app-core/patches ]; then
            cp -R eliza/packages/app-core/patches patches
          fi
          # scripts/docker-entrypoint.sh — copy from eliza/packages/app-core/scripts
          mkdir -p scripts
          if [ ! -e scripts/docker-entrypoint.sh ] && [ -f eliza/packages/app-core/scripts/docker-entrypoint.sh ]; then
            cp eliza/packages/app-core/scripts/docker-entrypoint.sh scripts/docker-entrypoint.sh
            chmod +x scripts/docker-entrypoint.sh
          fi
          # plugins/plugin-selfcontrol — copy from packages/plugin-selfcontrol
          mkdir -p plugins
          if [ ! -e plugins/plugin-selfcontrol ] && [ -d packages/plugin-selfcontrol ]; then
            cp -R packages/plugin-selfcontrol plugins/plugin-selfcontrol
          fi
          # Dockerfile.cloud is shared with the upstream elizaOS layout where
          # the built web app lives at packages/app. Milady's Vite app lives at
          # apps/app, so materialize the expected manifest and dist tree.
          mkdir -p packages/app
          cp apps/app/package.json packages/app/package.json
          rm -rf packages/app/dist
          cp -R apps/app/dist packages/app/dist
          test -f packages/app/package.json
          test -d packages/app/dist
          test -f scripts/cloud-image-prune-deps.mjs
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const dockerfile = "eliza/packages/app-core/deploy/Dockerfile.cloud";
          if (fs.existsSync(dockerfile)) {
            const rawDockerfile = fs.readFileSync(dockerfile, "utf8");
            const nextDockerfile = rawDockerfile.replace(
              "plugin-agent-orchestrator|plugin-cli|plugin-imessage",
              "plugin-agent-orchestrator|plugin-app-control|plugin-cli|plugin-imessage",
            );
            if (nextDockerfile !== rawDockerfile) {
              fs.writeFileSync(dockerfile, nextDockerfile);
            }
          }
          const manifests = [
            "package.json",
            "apps/app/package.json",
            "eliza/packages/agent/package.json",
            "eliza/packages/app-core/package.json",
            "eliza/packages/shared/package.json",
            "eliza/packages/ui/package.json",
            "eliza/packages/app-core/platforms/electrobun/package.json",
            "eliza/packages/app-core/deploy/cloud-agent-template/package.json",
          ];
          const fields = [
            "dependencies",
            "devDependencies",
            "optionalDependencies",
            "peerDependencies",
            "overrides",
          ];
          const unpublished = /^@elizaos\/(app-|capacitor-|plugin-agent-orchestrator|plugin-app-control|plugin-cli|plugin-imessage|plugin-local-ai|plugin-pdf|plugin-wechat|steward-)/;
          for (const manifest of manifests) {
            if (!fs.existsSync(manifest)) continue;
            const pkg = JSON.parse(fs.readFileSync(manifest, "utf8"));
            let changed = false;
            for (const field of fields) {
              const deps = pkg[field];
              if (!deps || typeof deps !== "object" || Array.isArray(deps)) continue;
              for (const name of Object.keys(deps)) {
                if (unpublished.test(name)) {
                  delete deps[name];
                  changed = true;
                }
              }
            }
            if (changed) {
              fs.writeFileSync(manifest, JSON.stringify(pkg, null, 2) + "\n");
            }
          }
          const root = JSON.parse(fs.readFileSync("package.json", "utf8"));
          root.overrides = {
            ...(root.overrides && typeof root.overrides === "object" ? root.overrides : {}),
            "@elizaos/agent": "file:./eliza/packages/agent",
            "@elizaos/app-core": "file:./eliza/packages/app-core",
            "@elizaos/shared": "file:./eliza/packages/shared",
            "@elizaos/ui": "file:./eliza/packages/ui",
          };
          fs.writeFileSync("package.json", JSON.stringify(root, null, 2) + "\n");
          NODE
          if [ ! -f bun.lock ]; then
            git show HEAD:bun.lock > bun.lock
          fi
          test -f bun.lock
          for staged_path in patches scripts/docker-entrypoint.sh plugins/plugin-selfcontrol; do
            if [ -e "$staged_path" ]; then
              find "$staged_path" -maxdepth 2 -print | head -20
            else
              echo "Missing expected staged path: $staged_path"
            fi
          done

      - name: Set up CI dockerignore
        run: |
          cp eliza/packages/app-core/deploy/Dockerfile.cloud.dockerignore .dockerignore
          cat >> .dockerignore <<'EOF'
          !eliza/cloud/
          !eliza/cloud/packages/
          !eliza/cloud/packages/sdk/
          !eliza/cloud/packages/sdk/**
          EOF

      - name: Set up Depot CLI
        if: vars.DEPOT_ENABLED != 'false'
        uses: depot/setup-action@v1

      - name: Set up Docker Buildx fallback
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        if: ${{ github.event_name == 'push' || inputs.push_image != false }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=cloud-app
            type=raw,value=cloud-app-${{ steps.version.outputs.version_clean }}

      - name: Build and push cloud app image
        id: depot-build
        if: vars.DEPOT_ENABLED != 'false'
        continue-on-error: true
        uses: depot/build-push-action@v1
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          token: ${{ secrets.DEPOT_TOKEN }}
          context: .
          file: eliza/packages/app-core/deploy/Dockerfile.cloud
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push_image != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_ENTRYPOINT=${{ env.APP_ENTRYPOINT }}
            APP_CMD_START=${{ env.APP_CMD_START }}
            APP_PORT=${{ env.APP_PORT }}
            APP_API_BIND=${{ env.APP_API_BIND }}
            OCI_SOURCE=${{ env.OCI_SOURCE }}
            OCI_TITLE=${{ env.OCI_TITLE }}
            OCI_DESCRIPTION=${{ env.OCI_DESCRIPTION }}
            OCI_LICENSES=${{ env.OCI_LICENSES }}
            VERSION=${{ steps.version.outputs.version }}
            VERSION_CLEAN=${{ steps.version.outputs.version_clean }}
            REVISION=${{ github.sha }}
          provenance: false

      - name: Build and push cloud app image with Buildx fallback
        if: vars.DEPOT_ENABLED == 'false' || steps.depot-build.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: eliza/packages/app-core/deploy/Dockerfile.cloud
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || inputs.push_image != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_ENTRYPOINT=${{ env.APP_ENTRYPOINT }}
            APP_CMD_START=${{ env.APP_CMD_START }}
            APP_PORT=${{ env.APP_PORT }}
            APP_API_BIND=${{ env.APP_API_BIND }}
            OCI_SOURCE=${{ env.OCI_SOURCE }}
            OCI_TITLE=${{ env.OCI_TITLE }}
            OCI_DESCRIPTION=${{ env.OCI_DESCRIPTION }}
            OCI_LICENSES=${{ env.OCI_LICENSES }}
            VERSION=${{ steps.version.outputs.version }}
            VERSION_CLEAN=${{ steps.version.outputs.version_clean }}
            REVISION=${{ github.sha }}
          provenance: false

      - name: Build summary
        if: always()
        run: |
          {
            echo "## ☁️ Milady Cloud App Image"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Registry | \`${{ env.REGISTRY }}\` |"
            echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| Built SHA | \`$(git rev-parse HEAD)\` |"
            echo ""
            echo "### Pull commands"
            echo '```bash'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cloud-app"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cloud-app-${{ steps.version.outputs.version_clean }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
