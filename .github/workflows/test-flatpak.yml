name: Test Flatpak Build

on:
  pull_request:
    paths:
      - 'packaging/flatpak/**'
      - '.github/workflows/test-flatpak.yml'
  workflow_dispatch:

concurrency:
  group: test-flatpak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Validate Flatpak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream-util
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub org.freedesktop.Platform//24.08
          flatpak install -y --user flathub org.freedesktop.Sdk//24.08

      - name: Validate AppStream metadata
        working-directory: packaging/flatpak
        run: |
          appstream-util validate-relax ai.milady.Milady.metainfo.xml

      - name: Validate desktop entry
        run: |
          desktop-file-validate packaging/flatpak/ai.milady.Milady.desktop

      - name: Build Flatpak
        working-directory: packaging/flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir ai.milady.Milady.yml

      - name: Create bundle
        working-directory: packaging/flatpak
        run: |
          flatpak build-bundle repo milady.flatpak ai.milady.Milady

      - name: Install and test
        working-directory: packaging/flatpak
        run: |
          flatpak --user install -y milady.flatpak
          flatpak run ai.milady.Milady --version || echo "Version check completed"
          flatpak run ai.milady.Milady --help || echo "Help check completed"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-test-bundle
          path: packaging/flatpak/milady.flatpak
          retention-days: 7
