name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  BUN_VERSION: "1.3.10"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # WHY setup-node before bun install: optional deps like @discordjs/opus fall back to node-gyp; Node 22 + colocated cache avoids nodejs.org header download. Engines require >=22.
      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run unit tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  db-check:
    name: Database Security Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install canvas native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run database security and query-guard tests
        run: bun run db:check

  e2e-tests:
    name: E2E Tests (Vitest)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install canvas native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Build
        run: bun run build

      - name: Run E2E tests
        run: >
          bunx vitest run --config vitest.e2e.config.ts
          --exclude test/anvil-contracts.e2e.test.ts
          --exclude test/apps-e2e.e2e.test.ts

  app-startup-e2e:
    name: App Startup E2E (Onboarding)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install canvas native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      # WHY useblacksmith: colocated cache avoids nodejs.org download timeouts on Blacksmith runners.
      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: 22

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Run app startup/onboarding tests
        run: >
          bunx vitest run
          packages/app-core/test/app/startup-chat.e2e.test.ts
          packages/app-core/test/app/startup-onboarding.e2e.test.ts
          packages/app-core/test/app/startup-backend-missing.e2e.test.ts
          packages/app-core/test/app/startup-token-401.e2e.test.ts

  # Desktop build/packaging validation lives in release-electrobun.yml.
  # The old electron-ui-e2e and electron-packaged-dmg-e2e jobs were removed
  # after the Electrobun migration — they were always-skipped on PRs
  # (gated on refs/tags/v) and duplicated work the release workflow does.

  cloud-live-e2e:
    name: Cloud Live E2E (Eliza Cloud)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Check cloud secrets
        id: cloud
        run: |
          if [ -z "${{ secrets.ELIZAOS_CLOUD_API_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloud API key is not configured; skipping cloud live test job."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cloud.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Install canvas native dependencies
        if: steps.cloud.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        if: steps.cloud.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        if: steps.cloud.outputs.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cloud.outputs.enabled == 'true'
        run: |
          for i in 1 2 3 4 5; do
            bun install --frozen-lockfile --ignore-scripts && break
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done

      - name: Run repository postinstall patches
        if: steps.cloud.outputs.enabled == 'true'
        run: bun run postinstall

      - name: Run cloud live test
        if: steps.cloud.outputs.enabled == 'true'
        run: >
          bunx vitest run --config vitest.e2e.config.ts
          test/cloud-providers.e2e.test.ts
        env:
          MILADY_LIVE_TEST: "1"
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}

  validation-e2e:
    name: End-to-End Validation (Issue #6)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install canvas native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Build
        run: bun run build

      - name: Run E2E Validation tests
        run: bunx vitest run --config vitest.e2e.config.ts test/e2e-validation.e2e.test.ts
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  test-status:
    name: All Tests Passed
    if: always()
    needs: [unit-tests, db-check, e2e-tests, app-startup-e2e, cloud-live-e2e, validation-e2e]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check test results
        run: |
          # Note: electron jobs are optional (macOS packaging can have flaky deps)
          if [[ "${{ needs.unit-tests.result }}" == "failure" || \
                "${{ needs.db-check.result }}" == "failure" || \
                "${{ needs.e2e-tests.result }}" == "failure" || \
                "${{ needs.app-startup-e2e.result }}" == "failure" || \
                "${{ needs.cloud-live-e2e.result }}" == "failure" || \
                "${{ needs.validation-e2e.result }}" == "failure" ]]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed"
