name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  BUN_VERSION: "1.3.11"
  NODE_VERSION: "22.20.0"
  NODE_NO_WARNINGS: "1"
  NODE_OPTIONS: "--max-old-space-size=4096"
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"

jobs:
  regression-matrix:
    name: Regression Matrix Contract
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Validate regression matrix contract
        run: bun run test:regression-matrix:pr

  unit-tests:
    name: Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      # WHY setup-node before bun install: optional deps like @discordjs/opus fall back to node-gyp; Node 22 + colocated cache avoids nodejs.org header download. Engines require >=22.
      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      # Proto-generated types are only needed when the repo-local eliza
      # workspace is present. Published-only CI disables that checkout.
      - name: Generate protobuf types
        run: |
          if [ "${MILADY_SKIP_LOCAL_UPSTREAMS:-0}" != "1" ] && [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            npx --yes @bufbuild/buf@1.67.0 generate
          fi

      - name: Run unit tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  db-check:
    name: Database Security Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      # Proto-generated types are only needed when the repo-local eliza
      # workspace is present. Published-only CI disables that checkout.
      - name: Generate protobuf types
        run: |
          if [ "${MILADY_SKIP_LOCAL_UPSTREAMS:-0}" != "1" ] && [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            npx --yes @bufbuild/buf@1.67.0 generate
          fi

      - name: Run database security and query-guard tests
        run: bun run db:check

  e2e-tests:
    name: E2E Tests (Vitest)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores required non-eliza submodules during setup.
          submodules: false

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install
          run-postinstall: "false"

      - name: Build
        run: bun run build

      - name: Run E2E tests
        run: bun run test:e2e

  website-blocker-cross-platform:
    name: Website Blocker Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores the required non-eliza submodules explicitly.
          submodules: false

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            bun install --ignore-scripts && exit 0
            rm -rf node_modules
            echo "Attempt $i failed, retrying in $((i * 15))s..."
            sleep $((i * 15))
          done
          exit 1

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run website blocker unit suites
        run: bun run test:selfcontrol:unit

      - name: Run website blocker E2E suites
        run: bun run test:selfcontrol:e2e

  website-blocker-startup-smoke:
    name: Website Blocker Startup Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Published-only CI restores the required non-eliza submodules explicitly.
          submodules: false

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run website blocker startup smokes
        run: bun run test:selfcontrol:startup

  website-blocker-desktop-smoke:
    name: Website Blocker Desktop Smoke (macOS)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build
        run: bun run build

      - name: Run website blocker desktop smokes
        run: bun run test:live:selfcontrol:desktop

  website-blocker-mobile-android:
    name: Website Blocker Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/app/android/**/*.gradle*', 'apps/app/android/**/gradle-wrapper.properties', 'apps/app/plugins/websiteblocker/android/**/*.kt') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build Android website blocker app
        run: bun run test:selfcontrol:mobile:android

  website-blocker-mobile-ios:
    name: Website Blocker iOS Build
    runs-on: macos-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build iOS website blocker app
        run: bun run test:selfcontrol:mobile:ios

  app-startup-e2e:
    name: App Startup E2E (Onboarding)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # WHY useblacksmith: colocated cache avoids nodejs.org download timeouts on Blacksmith runners.
      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts

      # Proto-generated types are only needed when the repo-local eliza
      # workspace is present. Published-only CI disables that checkout.
      - name: Generate protobuf types
        run: |
          if [ "${MILADY_SKIP_LOCAL_UPSTREAMS:-0}" != "1" ] && [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            npx --yes @bufbuild/buf@1.67.0 generate
          fi

      - name: Run startup E2E contract guard
        run: bun run test:startup:contract

      - name: Run app startup/onboarding tests
        run: bun run test:startup:e2e

  desktop-contract:
    name: Electrobun Desktop Contract
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python (for node-gyp when native prebuilds missing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install canvas native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev libpixman-1-dev librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          npm_config_python: ${{ env.pythonLocation }}/bin/python3

      - name: Run repository postinstall patches
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run Electrobun contract tests
        run: bun run test:desktop:contract

  # Pull requests only validate the release-workflow contract in
  # test-electrobun-release.yml. The full Electrobun packaging/signing matrix
  # runs from release-electrobun.yml for tagged or manually dispatched releases.
  # The old electron-ui-e2e and electron-packaged-dmg-e2e jobs remain removed
  # after the Electrobun migration.

  cloud-live-e2e:
    name: Cloud Live E2E (Eliza Cloud)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Check cloud secrets
        id: cloud
        run: |
          if [ -z "${{ secrets.ELIZAOS_CLOUD_API_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cloud API key is not configured; skipping cloud live test job."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cloud.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup workspace dependencies
        if: steps.cloud.outputs.enabled == 'true'
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: |
            for i in 1 2 3 4 5; do
              bun install --ignore-scripts && break
              echo "Attempt $i failed, retrying in $((i * 15))s..."
              sleep $((i * 15))
            done

      - name: Run cloud live test
        if: steps.cloud.outputs.enabled == 'true'
        run: bun run test:live:cloud
        env:
          MILADY_LIVE_TEST: "1"
          ELIZAOS_CLOUD_API_KEY: ${{ secrets.ELIZAOS_CLOUD_API_KEY }}
          ELIZAOS_CLOUD_BASE_URL: ${{ secrets.ELIZAOS_CLOUD_BASE_URL }}

  validation-e2e:
    name: End-to-End Validation (Issue #6)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts

      - name: Build
        run: bun run build

      - name: Run E2E Validation tests
        run: bun run test:e2e:validation
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  test-status:
    name: All Tests Passed
    if: always()
    needs: [regression-matrix, unit-tests, db-check, e2e-tests, website-blocker-cross-platform, website-blocker-startup-smoke, website-blocker-desktop-smoke, website-blocker-mobile-android, website-blocker-mobile-ios, app-startup-e2e, desktop-contract, cloud-live-e2e, validation-e2e]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check test results
        shell: bash
        run: |
          set -u
          # Gate job: surface which dependency failed (logs are easy to miss otherwise).
          echo "=== Required test job results ==="
          echo "regression-matrix:  ${{ needs.regression-matrix.result }}"
          echo "unit-tests:         ${{ needs.unit-tests.result }}"
          echo "db-check:           ${{ needs.db-check.result }}"
          echo "e2e-tests:          ${{ needs.e2e-tests.result }}"
          echo "website-blocker-cross-platform: ${{ needs.website-blocker-cross-platform.result }}"
          echo "website-blocker-startup-smoke:  ${{ needs.website-blocker-startup-smoke.result }}"
          echo "website-blocker-desktop-smoke:  ${{ needs.website-blocker-desktop-smoke.result }}"
          echo "website-blocker-mobile-android: ${{ needs.website-blocker-mobile-android.result }}"
          echo "website-blocker-mobile-ios:     ${{ needs.website-blocker-mobile-ios.result }}"
          echo "app-startup-e2e:    ${{ needs.app-startup-e2e.result }}"
          echo "desktop-contract:   ${{ needs.desktop-contract.result }}"
          echo "cloud-live-e2e:     ${{ needs.cloud-live-e2e.result }}"
          echo "validation-e2e:     ${{ needs.validation-e2e.result }}"
          echo "==================================="
          bad=0
          for pair in \
            "regression-matrix:${{ needs.regression-matrix.result }}" \
            "unit-tests:${{ needs.unit-tests.result }}" \
            "db-check:${{ needs.db-check.result }}" \
            "e2e-tests:${{ needs.e2e-tests.result }}" \
            "website-blocker-cross-platform:${{ needs.website-blocker-cross-platform.result }}" \
            "website-blocker-startup-smoke:${{ needs.website-blocker-startup-smoke.result }}" \
            "website-blocker-desktop-smoke:${{ needs.website-blocker-desktop-smoke.result }}" \
            "website-blocker-mobile-android:${{ needs.website-blocker-mobile-android.result }}" \
            "website-blocker-mobile-ios:${{ needs.website-blocker-mobile-ios.result }}" \
            "app-startup-e2e:${{ needs.app-startup-e2e.result }}" \
            "desktop-contract:${{ needs.desktop-contract.result }}" \
            "cloud-live-e2e:${{ needs.cloud-live-e2e.result }}" \
            "validation-e2e:${{ needs.validation-e2e.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error title=Test gate::Required job '${name}' finished with '${result}' (expected success)"
              bad=1
            fi
          done
          if [[ "$bad" -ne 0 ]]; then
            echo "One or more required jobs did not succeed; see rows above and the failing job logs."
            exit 1
          fi
          echo "All required test jobs succeeded"
