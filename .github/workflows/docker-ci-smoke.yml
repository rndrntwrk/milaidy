name: Docker CI Smoke

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: docker-ci-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-ci-smoke:
    name: Build production Docker image (+ smoke boot)
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      BUN_VERSION: "1.3.11"
      DOCKER_IMAGE: miladyai/agent:docker-smoke
      SMOKE_TIMEOUT_SEC: "420"
      SMOKE_PORT: "32138"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize eliza submodule
        run: git submodule update --init eliza

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Run Docker CI smoke path
        timeout-minutes: 30
        # Wrap with 'timeout --preserve-status --kill-after' so bash gets
        # SIGTERM 2 minutes before GHA's own kill, giving the script's
        # EXIT trap time to dump logs and remove the container. Without
        # this, GHA's step-level SIGTERM → SIGKILL sequence leaves the
        # subsequent 'Dump container log' step skipped as 'cancelled'.
        run: |
          timeout --preserve-status --kill-after=15s 28m \
            bash eliza/packages/app-core/scripts/docker-ci-smoke.sh --tag gha-${{ github.run_id }}

      # Inline log capture runs on failure (not cancelled).
      - name: Dump container log + inspect (inline)
        if: failure()
        timeout-minutes: 2
        run: |
          echo "::group::Docker containers"
          docker ps -a
          echo "::endgroup::"
          for C in $(docker ps -a --format '{{.Names}}' | grep '^eliza-docker-smoke-' || true); do
            echo "::group::docker logs $C"
            timeout 30 docker logs "$C" 2>&1 || echo "(docker logs timed out)"
            echo "::endgroup::"
            echo "::group::docker inspect $C (state)"
            timeout 15 docker inspect "$C" --format '{{json .State}}' 2>&1 | python3 -m json.tool || true
            echo "::endgroup::"
          done

      - name: Upload container logs + inspect
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-ci-smoke-artifacts-${{ github.run_id }}
          path: |
            .tmp/qa/docker-ci-smoke-*
            /tmp/milady-docker-*.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Summarize Docker smoke result
        if: always()
        run: |
          echo "## Docker CI Smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production Dockerfile: \`eliza/packages/app-core/deploy/Dockerfile.ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Script: \`eliza/packages/app-core/scripts/docker-ci-smoke.sh\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Smoke endpoints: \`/api/health\` then fallback \`/api/status\`" >> "$GITHUB_STEP_SUMMARY"
