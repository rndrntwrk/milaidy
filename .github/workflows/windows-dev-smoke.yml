name: Windows Dev Smoke

on:
  pull_request:
    branches: [develop]
    paths:
      - "eliza/packages/app-core/scripts/**"
      - "apps/app/electrobun/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: windows-dev-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dev-smoke:
    name: Windows smoke (${{ matrix.bun-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ["1.3.10", "canary"]

    steps:
      - name: Enable long paths (Windows)
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: false
          sparse-checkout: |
            /package.json
            /bun.lock
            /bunfig.toml
            /tsconfig.json
            apps/
            packages/
            scripts/
            eliza/apps/
            eliza/packages/app-core/
            eliza/packages/native-plugins/
            eliza/packages/typescript/
            eliza/packages/shared/
            eliza/packages/agent/
            eliza/packages/server/
            eliza/plugins/
          sparse-checkout-cone-mode: false

      - name: Initialize workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Restore eliza workspace paths for script checks
        run: |
          if ((Test-Path ".eliza.ci-disabled") -and -not (Test-Path "eliza")) {
            Move-Item -LiteralPath ".eliza.ci-disabled" -Destination "eliza"
          }

      - name: Verify json5 interop
        run: >
          bun -e "import * as JSON5Module from 'json5';
          const JSON5 = JSON5Module.default ?? JSON5Module;
          if (typeof JSON5.parse !== 'function') throw new Error('JSON5.parse missing');
          console.log('json5 interop ok');"

      - name: Verify bun-version-guard
        run: >
          bun -e "import { getBunVersionAdvisory } from './eliza/packages/app-core/scripts/lib/bun-version-guard.mjs';
          const result = getBunVersionAdvisory();
          console.log('bun-version-guard:', result ?? 'OK (no advisory)');"
