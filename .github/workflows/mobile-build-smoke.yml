name: Mobile Build Smoke Test

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/app/**"
      - "packages/ui/**"
      - "packages/app-core/**"
      - ".github/workflows/mobile-build-smoke.yml"
  workflow_dispatch:

concurrency:
  group: mobile-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"
  MILADY_SKIP_LOCAL_UPSTREAMS: "1"

jobs:
  build-ios:
    name: iOS Simulator Build
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for distutils
        run: pip install setuptools

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Initialize tracked workspace submodules
        run: node scripts/init-submodules.mjs

      - name: Disable repo-local eliza workspace
        run: node scripts/disable-local-eliza-workspace.mjs

      - name: Install dependencies
        run: bun install --ignore-scripts
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Run postinstall (patch deps)
        run: bun run postinstall
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build web assets
        working-directory: apps/app
        run: bun scripts/build.mjs

      - name: Capacitor sync iOS
        working-directory: apps/app
        run: bunx cap sync ios
        env:
          LANG: en_US.UTF-8

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace apps/app/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | tail -20
          echo "iOS simulator build succeeded"

      - name: Verify .app exists
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: App.app not found in DerivedData"
            exit 1
          fi
          echo "Built app at: $APP_PATH"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          if [ "$BUNDLE_ID" != "com.miladyai.milady" ]; then
            echo "ERROR: Unexpected bundle ID: $BUNDLE_ID"
            exit 1
          fi

  build-android:
    name: Android Debug Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts
          install-native-deps: "false"
          run-postinstall: "true"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Build web assets
        working-directory: apps/app
        run: bun scripts/build.mjs

      - name: Capacitor sync Android
        working-directory: apps/app
        run: bunx cap sync android

      - name: Build debug APK
        working-directory: apps/app/android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          APK_PATH="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH")
          echo "Debug APK built: $APK_PATH ($APK_SIZE bytes)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
