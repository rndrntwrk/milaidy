name: Mobile Build Smoke Test

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/app/**"
      - "eliza/packages/app-core/**"
      - ".github/workflows/mobile-build-smoke.yml"
  workflow_dispatch:

concurrency:
  group: mobile-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"

jobs:
  build-ios:
    name: iOS Simulator Build
    runs-on: macos-14
    timeout-minutes: 30
    env:
      MILADY_SKIP_LOCAL_UPSTREAMS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-native-deps: "false"
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          run-postinstall: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for build scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Install app-core package dependencies
        run: bun install --cwd eliza/packages/app-core --ignore-scripts

      - name: Install native plugin package dependencies
        run: bun install --cwd eliza/packages/native-plugins/agent --ignore-scripts

      - name: Run repository postinstall patches
        run: node eliza/packages/app-core/scripts/run-repo-setup.mjs
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build web assets
        working-directory: apps/app
        run: |
          bun scripts/plugin-build.mjs
          bun run build:web

      - name: Prepare CocoaPods trunk repo
        run: bash eliza/packages/app-core/scripts/prepare-ios-cocoapods.sh
        env:
          LANG: en_US.UTF-8

      - name: Capacitor sync iOS
        working-directory: apps/app
        run: bun run cap:sync:ios
        env:
          LANG: en_US.UTF-8

      - name: Build for iOS Simulator
        # No `| tail -20` on the xcodebuild output: swallowing the tail
        # hides the real Swift compile errors (we had a TalkModePlugin
        # compile failure surface as "App.app not found in DerivedData"
        # because the tailed output cut before the error lines). Pipe
        # to `xcbeautify` if it's available for a tidier view, but let
        # the full log through on failure.
        run: |
          set -o pipefail
          if command -v xcbeautify >/dev/null 2>&1; then
            xcodebuild \
              -workspace apps/app/ios/App/App.xcworkspace \
              -scheme App \
              -configuration Debug \
              -destination "generic/platform=iOS Simulator" \
              -sdk iphonesimulator \
              CODE_SIGNING_ALLOWED=NO \
              build 2>&1 | xcbeautify --renderer github-actions
          else
            xcodebuild \
              -workspace apps/app/ios/App/App.xcworkspace \
              -scheme App \
              -configuration Debug \
              -destination "generic/platform=iOS Simulator" \
              -sdk iphonesimulator \
              CODE_SIGNING_ALLOWED=NO \
              build
          fi
          echo "iOS simulator build succeeded"

      - name: Verify .app exists
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: App.app not found in DerivedData"
            exit 1
          fi
          echo "Built app at: $APP_PATH"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          if [ "$BUNDLE_ID" != "com.miladyai.milady" ]; then
            echo "ERROR: Unexpected bundle ID: $BUNDLE_ID"
            exit 1
          fi

  build-android:
    name: Android Debug Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MILADY_SKIP_LOCAL_UPSTREAMS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          disable-local-eliza-workspace: "true"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for build scripts
        run: |
          if [ -d ".eliza.ci-disabled" ] && [ ! -d "eliza" ]; then
            mv .eliza.ci-disabled eliza
          fi

      - name: Install app-core package dependencies
        run: bun install --cwd eliza/packages/app-core --ignore-scripts

      - name: Install native plugin package dependencies
        run: bun install --cwd eliza/packages/native-plugins/agent --ignore-scripts

      - name: Run repository postinstall patches
        run: node eliza/packages/app-core/scripts/run-repo-setup.mjs
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Build web assets
        working-directory: apps/app
        run: |
          bun scripts/plugin-build.mjs
          bun run build:web

      - name: Capacitor sync Android
        working-directory: apps/app
        run: bunx cap sync android

      - name: Build debug APK
        working-directory: apps/app/android
        run: ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          APK_PATH="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH")
          echo "Debug APK built: $APK_PATH ($APK_SIZE bytes)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
