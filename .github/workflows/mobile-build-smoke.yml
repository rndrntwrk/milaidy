name: Mobile Build Smoke Test

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/app/**"
      - "eliza/packages/app-core/**"
      - ".github/workflows/mobile-build-smoke.yml"
  workflow_dispatch:

concurrency:
  group: mobile-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"

jobs:
  build-ios:
    name: iOS Simulator Build
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-native-deps: "false"
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          run-postinstall: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for build scripts
        run: node scripts/restore-local-eliza-workspace.mjs

      - name: Run repository postinstall patches
        run: node eliza/packages/app-core/scripts/run-repo-setup.mjs
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi

      - name: Build iOS simulator app
        run: node --max-old-space-size=8192 eliza/packages/app-core/scripts/run-mobile-build.mjs ios
        env:
          LANG: en_US.UTF-8
          MILADY_IOS_BUILD_DESTINATION: "generic/platform=iOS Simulator"
          MILADY_IOS_BUILD_SDK: "iphonesimulator"
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Verify .app exists
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: App.app not found in DerivedData"
            exit 1
          fi
          echo "Built app at: $APP_PATH"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          # Accept either the Milady brand ID or the upstream elizaOS ID
          # (iOS project in eliza/packages/app-core/platforms/ios currently
          # uses ai.elizaos.app; the brand rename for mobile is tracked
          # separately from the Electrobun/desktop rename).
          case "$BUNDLE_ID" in
            com.miladyai.milady|ai.elizaos.app) ;;
            *)
              echo "ERROR: Unexpected bundle ID: $BUNDLE_ID"
              exit 1
              ;;
          esac

      - name: Verify required Info.plist keys for background HealthKit
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Debug-iphonesimulator/*" | head -1)
          INFO_PLIST="$APP_PATH/Info.plist"
          for key in NSHealthShareUsageDescription BGTaskSchedulerPermittedIdentifiers UIBackgroundModes; do
            if ! /usr/libexec/PlistBuddy -c "Print :$key" "$INFO_PLIST" >/dev/null 2>&1; then
              echo "ERROR: Info.plist missing required key: $key"
              /usr/libexec/PlistBuddy -c "Print" "$INFO_PLIST" | head -80
              exit 1
            fi
          done
          # Confirm the sleep-refresh task identifier is whitelisted so
          # BGTaskScheduler.register actually succeeds on device.
          if ! /usr/libexec/PlistBuddy -c "Print :BGTaskSchedulerPermittedIdentifiers" "$INFO_PLIST" \
            | grep -q "ai.eliza.mobile-signals.sleep-refresh"; then
            echo "ERROR: BGTaskSchedulerPermittedIdentifiers missing ai.eliza.mobile-signals.sleep-refresh"
            exit 1
          fi

      - name: Verify Fastlane config landed in apps/app/ios
        run: |
          for f in apps/app/ios/Gemfile apps/app/ios/fastlane/Fastfile apps/app/ios/fastlane/Appfile apps/app/ios/fastlane/Matchfile; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f missing. overlayIosNativeFiles() should have copied Fastlane config here so CI can call `fastlane beta|release`."
              exit 1
            fi
          done
          echo "Fastlane config present at apps/app/ios/."

  build-android:
    name: Android Debug Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Setup workspace dependencies
        uses: ./.github/actions/setup-bun-workspace
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-command: bun install --ignore-scripts --no-frozen-lockfile
          install-native-deps: "false"
          run-postinstall: "false"
          skip-avatar-clone: "true"
          no-vision-deps: "true"

      - name: Restore eliza workspace paths for build scripts
        run: node scripts/restore-local-eliza-workspace.mjs

      - name: Run repository postinstall patches
        run: node eliza/packages/app-core/scripts/run-repo-setup.mjs
        env:
          SKIP_AVATAR_CLONE: "1"
          MILADY_NO_VISION_DEPS: "1"

      - name: Generate protobuf types
        run: |
          if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -d eliza/packages/typescript/src/types/generated ]; then
            cd eliza/packages/schemas
            node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
            bunx @bufbuild/buf@1.67.0 generate
          fi

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Build Android debug app
        run: node --max-old-space-size=8192 eliza/packages/app-core/scripts/run-mobile-build.mjs android
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Verify APK exists
        run: |
          APK_PATH="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Debug APK not found at $APK_PATH"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH")
          echo "Debug APK built: $APK_PATH ($APK_SIZE bytes)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
