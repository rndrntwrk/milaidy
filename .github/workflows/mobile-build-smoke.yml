name: Mobile Build Smoke Test

on:
  pull_request:
    paths:
      - "apps/app/**"
      - "packages/app-core/**"
      - "packages/ui/**"
      - "packages/shared/**"
      - "packages/agent/src/services/app-manager.ts"
      - "packages/agent/src/services/credential-words.ts"
  workflow_dispatch:

concurrency:
  group: mobile-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"

jobs:
  build-web-assets:
    name: Build Web Assets
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts || bun install --ignore-scripts

      - name: Build web assets
        working-directory: apps/app
        run: bun run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: apps/app/dist
          retention-days: 1

  android-smoke:
    name: Android Build Smoke Test
    needs: build-web-assets
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts || bun install --ignore-scripts

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: apps/app/dist

      - name: Sync Capacitor Android
        working-directory: apps/app
        run: bun run cap:sync:android

      - name: Build debug APK
        working-directory: apps/app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Verify APK
        run: |
          APK_PATH="apps/app/android/app/build/outputs/apk/debug/app-debug.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "ERROR: Debug APK not found"
            ls -la apps/app/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Output dir not found"
            exit 1
          fi
          echo "✅ Android debug APK built successfully"
          echo "APK size: $(du -h "$APK_PATH" | cut -f1)"
          file "$APK_PATH"

  ios-sync-smoke:
    name: iOS Capacitor Sync Smoke Test
    needs: build-web-assets
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts || bun install --ignore-scripts

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: apps/app/dist

      - name: Sync Capacitor iOS
        working-directory: apps/app
        run: bun run cap:sync:ios

      - name: Install CocoaPods
        working-directory: apps/app/ios/App
        run: pod install

      - name: Build iOS (simulator)
        working-directory: apps/app/ios/App
        run: |
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20
          echo "✅ iOS simulator build passed"

  summary:
    name: Mobile Smoke Summary
    needs: [android-smoke, ios-sync-smoke]
    if: always()
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Summary
        run: |
          echo "## Mobile Build Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android debug APK | ${{ needs.android-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS Simulator build | ${{ needs.ios-sync-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
