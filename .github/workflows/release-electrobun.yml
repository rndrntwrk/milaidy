# Build & Release — Electrobun desktop app (signed/notarized on macOS, CEF on Windows/Linux)
# Produces installer artifacts plus platform-prefixed .tar.zst/*-update.json
# update channel files.
#
# Required GitHub Secrets (macOS signing + notarization):
#   CSC_LINK                     – base64-encoded Developer ID Application .p12
#   CSC_KEY_PASSWORD             – password for the .p12 certificate
#   APPLE_ID                     – Apple ID email for notarization
#   APPLE_APP_SPECIFIC_PASSWORD  – app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                – 10-char Apple Developer Team ID
#
# The workflow imports the certificate into a temporary keychain, extracts the
# Developer ID identity string, and passes that to Electrobun as
# ELECTROBUN_DEVELOPER_ID for the final `electrobun build`.
#
# Optional release-host upload secrets:
#   RELEASE_UPLOAD_KEY           – SSH private key for releases@milady.ai
#   RELEASE_HOST_FINGERPRINT     – pinned SSH host key entry for milady.ai
name: Build & Release (Electrobun)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0-alpha.3)"
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-electrobun-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: "true"
  BUN_VERSION: "1.3.10"

jobs:
  prepare:
    name: Prepare Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      env: ${{ steps.version.outputs.env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version + env
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          VERSION="${TAG#v}"
          # canary for pre-release tags, stable for everything else
          if echo "$VERSION" | grep -qE '(alpha|beta|rc|nightly)'; then
            BUILD_ENV="canary"
          else
            BUILD_ENV="stable"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "env=$BUILD_ENV" >> "$GITHUB_OUTPUT"
          echo "Release: $VERSION (tag: $TAG, env: $BUILD_ENV)"

  validate-release:
    name: Validate Release Inputs
    needs: prepare
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-electrobun-validate-${{ hashFiles('bun.lock') }}
          restore-keys: bun-electrobun-validate-

      - name: Install root dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Align version with release tag
        run: node scripts/align-electrobun-version.mjs
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Ensure avatar assets
        run: node scripts/ensure-avatars.mjs

      - name: Build core dist (server bundle)
        run: |
          bunx tsdown
          echo '{"type":"module"}' > dist/package.json
          node --import tsx scripts/write-build-info.ts

      - name: Release readiness checks
        run: bun run release:check

  build:
    name: Build ${{ matrix.platform.name }}
    needs: [prepare, validate-release]
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 150
    defaults:
      run:
        shell: bash -euo pipefail {0}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Electrobun builds for the host architecture only (no universal binary),
          # so we need separate Apple Silicon and Intel macOS jobs.
          - name: macOS (Apple Silicon)
            os: macos
            runner: macos-14
            artifact-name: macos-arm64
          - name: macOS (Intel)
            os: macos
            runner: macos-15-intel
            artifact-name: macos-x64
          - name: Windows
            os: windows
            runner: blacksmith-4vcpu-windows-2025
            artifact-name: windows-x64
          - name: Linux
            os: linux
            runner: ubuntu-latest
            artifact-name: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}


      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-electrobun-${{ matrix.platform.artifact-name }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-electrobun-${{ matrix.platform.artifact-name }}-

      - name: Install root dependencies
        # --ignore-scripts skips native dependency install scripts (e.g. @tensorflow/tfjs-node
        # which has no pre-built binary for Node 22 on Windows and fails to compile).
        # Workspace prepare scripts are NOT suppressed by --ignore-scripts in bun.
        # macOS Intel: keep the x64 invocation explicit in case the runner image
        # ships with dual-arch shims.
        run: |
          if [ "${{ matrix.platform.os }}" = "macos" ] && [ "${{ matrix.platform.artifact-name }}" = "macos-x64" ]; then
            arch -x86_64 bun install --frozen-lockfile --ignore-scripts
          else
            bun install --frozen-lockfile --ignore-scripts
          fi

      - name: Run repository postinstall patches
        run: bun run postinstall

      - name: Cache Whisper models and binaries
        if: matrix.platform.os == 'macos' || matrix.platform.os == 'linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/milady/whisper
            node_modules/whisper-node/lib/whisper.cpp/main
            node_modules/whisper-node/lib/whisper.cpp/build
          key: whisper-${{ matrix.platform.artifact-name }}-${{ hashFiles('apps/app/electrobun/scripts/build-whisper.sh', 'apps/app/electrobun/scripts/build-whisper-universal.sh') }}
          restore-keys: whisper-${{ matrix.platform.artifact-name }}-

      - name: Align version with release tag
        run: node scripts/align-electrobun-version.mjs
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Stage desktop bundle inputs
        run: |
          if [ "${{ matrix.platform.os }}" = "macos" ] && [ "${{ matrix.platform.artifact-name }}" = "macos-x64" ]; then
            MILADY_DESKTOP_COMMAND_PREFIX="arch -x86_64" node scripts/desktop-build.mjs stage --variant=base --build-whisper
          else
            node scripts/desktop-build.mjs stage --variant=base --build-whisper
          fi

      # Import the Developer ID certificate into a temporary keychain.
      # Requires CSC_LINK (base64-encoded .p12) + CSC_KEY_PASSWORD.
      # The signing identity string is extracted and passed to Electrobun as
      # ELECTROBUN_DEVELOPER_ID in the build step below.
      - name: Set up macOS signing keychain
        if: matrix.platform.os == 'macos'
        id: macos-keychain
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::warning::CSC_LINK not set — building unsigned (no codesign/notarize)"
            echo "skip_codesign=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/milady-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Create a short-lived keychain for this build
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          # Add to the keychain search list (preserving login keychain)
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          # Allow codesign to access the key without a password prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Extract identity for Electrobun
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in certificate"
            exit 1
          fi
          echo "Signing identity: $IDENTITY"
          echo "developer_id=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "skip_codesign=" >> "$GITHUB_OUTPUT"

      - name: Sign native macOS effects dylib
        if: matrix.platform.os == 'macos' && steps.macos-keychain.outputs.skip_codesign != '1'
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ steps.macos-keychain.outputs.developer_id }}
        run: |
          DYLIB="apps/app/electrobun/src/libMacWindowEffects.dylib"
          if [ ! -f "$DYLIB" ]; then
            echo "::error::Expected $DYLIB to exist after build:native-effects"
            exit 1
          fi
          codesign --force --timestamp --sign "$ELECTROBUN_DEVELOPER_ID" "$DYLIB"
          codesign --verify --strict --verbose=2 "$DYLIB"

      - name: Install quiet macOS packaging wrappers
        if: matrix.platform.os == 'macos' && steps.macos-keychain.outputs.skip_codesign != '1'
        run: |
          wrapper_dir="$RUNNER_TEMP/milady-notary-bin"
          mkdir -p "$wrapper_dir"
          cp apps/app/electrobun/scripts/hdiutil-wrapper.sh "$wrapper_dir/hdiutil"
          cp apps/app/electrobun/scripts/xcrun-wrapper.sh "$wrapper_dir/xcrun"
          cp apps/app/electrobun/scripts/zip-wrapper.sh "$wrapper_dir/zip"
          chmod +x "$wrapper_dir/hdiutil"
          chmod +x "$wrapper_dir/xcrun"
          chmod +x "$wrapper_dir/zip"
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Cache local electrobun core downloads
        uses: actions/cache@v4
        with:
          path: apps/app/electrobun/node_modules/electrobun/.cache
          key: electrobun-core-${{ matrix.platform.artifact-name }}-${{ hashFiles('apps/app/electrobun/package.json') }}
          restore-keys: electrobun-core-${{ matrix.platform.artifact-name }}-

      - name: Ensure Windows rcedit binary is available for Electrobun
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $electrobunDir = Join-Path $PWD "apps/app/electrobun/node_modules/electrobun"
          $resolvedElectrobunDir = node -e @'
            const fs = require("node:fs");
            const packageDir = process.argv[1];
            try {
              process.stdout.write(fs.realpathSync(packageDir));
            } catch (error) {
              process.stdout.write(packageDir);
            }
          '@ $electrobunDir
          if ($null -eq $resolvedElectrobunDir) {
            $resolvedElectrobunDir = $electrobunDir
          } elseif ($resolvedElectrobunDir -is [array]) {
            $resolvedElectrobunDir = ($resolvedElectrobunDir -join "")
          }
          $resolvedElectrobunDir = "$resolvedElectrobunDir".Trim()
          if ([string]::IsNullOrWhiteSpace($resolvedElectrobunDir)) {
            $resolvedElectrobunDir = $electrobunDir
          }
          Write-Host "Resolved electrobun package dir: $resolvedElectrobunDir"
          $globalNodeModules = Join-Path $env:USERPROFILE ".bun\install\global\node_modules"
          $globalRceditDir = Join-Path $globalNodeModules "rcedit"
          $globalRceditExe = Join-Path $globalRceditDir "bin\rcedit-x64.exe"

          if (-not (Test-Path $globalRceditExe)) {
            Write-Host "Installing global rcedit helper..."
            bun install -g "rcedit@4.0.1"
          }

          $resolvedRceditPackageJson = node -e @'
            const { createRequire } = require("node:module");
            const path = require("node:path");
            const electrobunDir = process.argv[1];
            try {
              const req = createRequire(path.join(electrobunDir, "package.json"));
              process.stdout.write(req.resolve("rcedit/package.json"));
            } catch (error) {
              process.stdout.write("");
            }
          '@ $electrobunDir

          if ($null -eq $resolvedRceditPackageJson) {
            $resolvedRceditPackageJson = ""
          } elseif ($resolvedRceditPackageJson -is [array]) {
            $resolvedRceditPackageJson = ($resolvedRceditPackageJson -join "")
          }

          $resolvedRceditPackageJson = "$resolvedRceditPackageJson".Trim()
          if ([string]::IsNullOrWhiteSpace($resolvedRceditPackageJson)) {
            Write-Warning "Electrobun could not resolve rcedit/package.json; seeding a local copy under the electrobun package."
            $resolvedRceditDir = Join-Path $resolvedElectrobunDir "node_modules\rcedit"
          } else {
            $resolvedRceditDir = Split-Path -Parent $resolvedRceditPackageJson
          }
          $resolvedRceditExe = Join-Path $resolvedRceditDir "bin\rcedit-x64.exe"

          if (-not (Test-Path $resolvedRceditExe)) {
            Write-Warning "Electrobun resolved rcedit without a bundled binary at $resolvedRceditExe; copying known-good package into place."
            $resolvedNodeModulesDir = Split-Path -Parent $resolvedRceditDir
            New-Item -ItemType Directory -Force -Path $resolvedNodeModulesDir | Out-Null
            if (Test-Path $resolvedRceditDir) {
              Remove-Item -Recurse -Force $resolvedRceditDir
            }
            Copy-Item -Recurse -Force $globalRceditDir $resolvedNodeModulesDir
          }

          if (-not (Test-Path $resolvedRceditExe)) {
            Write-Error "rcedit-x64.exe is still missing at $resolvedRceditExe"
            exit 1
          }

          Write-Host "Using rcedit from $resolvedRceditDir"

      # electrobun.cjs downloads its native binary then calls:
      #   execSync(`tar -xzf "${tarballPath}"`, { cwd: cacheDir })
      # GNU tar (found first in PATH on Windows) treats the C: drive letter as
      # user@host, failing with "Cannot connect to C:". We bypass this entirely
      # by pre-downloading the tarball and extracting it with Windows' built-in
      # BSD tar (C:\Windows\System32\tar.exe, full path) before the build runs.
      # electrobun.cjs checks existsSync(cliBinary) first and skips the download.
      - name: Pre-extract electrobun native CLI on Windows
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $electrobunDir = Join-Path $PWD "apps/app/electrobun/node_modules/electrobun"
          $resolvedElectrobunDir = node -e @'
            const fs = require("node:fs");
            const packageDir = process.argv[1];
            try {
              process.stdout.write(fs.realpathSync(packageDir));
            } catch (error) {
              process.stdout.write(packageDir);
            }
          '@ $electrobunDir
          if ($null -eq $resolvedElectrobunDir) {
            $resolvedElectrobunDir = $electrobunDir
          } elseif ($resolvedElectrobunDir -is [array]) {
            $resolvedElectrobunDir = ($resolvedElectrobunDir -join "")
          }
          $resolvedElectrobunDir = "$resolvedElectrobunDir".Trim()
          if ([string]::IsNullOrWhiteSpace($resolvedElectrobunDir)) {
            $resolvedElectrobunDir = $electrobunDir
          }
          Write-Host "Resolved electrobun package dir: $resolvedElectrobunDir"
          $cacheDir     = Join-Path $resolvedElectrobunDir ".cache"
          $binDir       = Join-Path $resolvedElectrobunDir "bin"
          $cliBinary    = Join-Path $cacheDir "electrobun.exe"
          $binBinary    = Join-Path $binDir "electrobun.exe"

          if (Test-Path $binBinary) {
            Write-Host "electrobun CLI already present at $binBinary — skipping download"
            exit 0
          }

          $version      = (Get-Content (Join-Path $resolvedElectrobunDir "package.json") | ConvertFrom-Json).version
          $assetName    = "electrobun-cli-win-x64.tar.gz"
          $releaseApiUrl = "https://api.github.com/repos/blackboardsh/electrobun/releases/tags/v$version"
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "milady-release-electrobun"
          }
          if ($env:GITHUB_TOKEN) {
            $headers.Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          Write-Host "Fetching electrobun release metadata from $releaseApiUrl"
          $release = Invoke-RestMethod -Uri $releaseApiUrl -Headers $headers
          $asset = @($release.assets) | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "Could not find $assetName in electrobun release v$version"
            exit 1
          }
          if (-not $asset.digest -or -not $asset.digest.StartsWith("sha256:")) {
            Write-Error "GitHub release metadata for $assetName is missing a sha256 digest"
            exit 1
          }

          $tarUrl       = $asset.browser_download_url
          $expectedHash = $asset.digest.Substring(7).ToLowerInvariant()
          $tarPath      = Join-Path $cacheDir "electrobun-win-x64.tar.gz"

          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          Write-Host "Downloading electrobun CLI from $tarUrl"
          Invoke-WebRequest -Uri $tarUrl -OutFile $tarPath -UseBasicParsing
          $actualHash = (Get-FileHash -Path $tarPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            Write-Error "electrobun CLI checksum mismatch: expected $expectedHash but got $actualHash"
            exit 1
          }
          Write-Host "Verified electrobun CLI SHA256: $actualHash"

          Write-Host "Extracting with Windows BSD tar..."
          & "C:\Windows\System32\tar.exe" -xzf $tarPath -C $cacheDir
          Remove-Item $tarPath -Force

          if (-not (Test-Path $cliBinary)) {
            Write-Error "electrobun.exe not found in $cacheDir after extraction"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Copy-Item $cliBinary $binBinary
          Write-Host "electrobun CLI ready at $binBinary"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electrobun app
        run: |
          if [ "${{ matrix.platform.os }}" = "macos" ] && [ "${{ matrix.platform.artifact-name }}" = "macos-x64" ]; then
            MILADY_DESKTOP_COMMAND_PREFIX="arch -x86_64" node scripts/desktop-build.mjs package --env=${{ needs.prepare.outputs.env }}
          else
            node scripts/desktop-build.mjs package --env=${{ needs.prepare.outputs.env }}
          fi
        env:
          # Electrobun reads these env vars directly. The workflow derives the
          # signing identity from CSC_LINK/CSC_KEY_PASSWORD during keychain setup
          # and maps the notarization credentials from the standard repo secrets.
          ELECTROBUN_DEVELOPER_ID: ${{ steps.macos-keychain.outputs.developer_id }}
          ELECTROBUN_APPLEID: ${{ secrets.APPLE_ID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          ELECTROBUN_TEAMID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTROBUN_SKIP_CODESIGN: ${{ steps.macos-keychain.outputs.skip_codesign }}
          ELECTROBUN_REAL_HDIUTIL: /usr/bin/hdiutil
          MILADY_ELECTROBUN_NOTARIZE: 0
          ELECTROBUN_REAL_XCRUN: /usr/bin/xcrun
          ELECTROBUN_REAL_ZIP: /usr/bin/zip

      # Inject version.json into the packaged Resources directory.
      # The bun entry getVersionInfo() reads ../Resources/version.json and
      # throws if absent, killing the process before main() runs.
      # Electrobun does not generate this file for us, so write it from the
      # release metadata after the packaged bundle exists.
      - name: Inject version.json into bundle (Windows)
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $version = (Get-Content apps/app/electrobun/package.json | ConvertFrom-Json).version
          $envName = "${{ needs.prepare.outputs.env }}"
          $buildRoot = "apps/app/electrobun/build"

          Get-ChildItem -Path $buildRoot -Recurse -Directory -Filter "Resources" | ForEach-Object {
            $versionJson = @{
              identifier = "com.miladyai.milady"
              channel = $envName
              name = "milady"
              version = $version
            } | ConvertTo-Json -Compress
            $dest = Join-Path $_.FullName "version.json"
            Write-Host "Writing $dest"
            Set-Content -Path $dest -Value $versionJson -Encoding utf8
          }

      - name: Inject version.json into bundle (macOS / Linux)
        if: matrix.platform.os != 'windows'
        run: |
          VERSION="$(node -p "require('./apps/app/electrobun/package.json').version")"
          ENV_NAME="${{ needs.prepare.outputs.env }}"
          find apps/app/electrobun/build -type d -name "Resources" | while read -r res_dir; do
            dest="$res_dir/version.json"
            printf '{"identifier":"com.miladyai.milady","channel":"%s","name":"milady","version":"%s"}' \
              "$ENV_NAME" "$VERSION" > "$dest"
            echo "Wrote $dest"
          done

      - name: List build output
        run: |
          echo "=== Electrobun artifacts ==="
          find apps/app/electrobun/artifacts -type f 2>/dev/null | sort || echo "(no artifacts directory)"

      - name: Stage standard macOS release app
        if: matrix.platform.os == 'macos'
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ steps.macos-keychain.outputs.developer_id }}
          ELECTROBUN_APPLEID: ${{ secrets.APPLE_ID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          ELECTROBUN_TEAMID: ${{ secrets.APPLE_TEAM_ID }}
          ELECTROBUN_SKIP_CODESIGN: ${{ steps.macos-keychain.outputs.skip_codesign }}
        run: bash apps/app/electrobun/scripts/stage-macos-release-artifacts.sh

      - name: Sign Windows executables
        if: matrix.platform.os == 'windows'
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
          WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}
        shell: pwsh
        run: pwsh -File apps/app/electrobun/scripts/sign-windows.ps1 -ArtifactsDir (Join-Path $PWD "apps/app/electrobun/artifacts") -BuildDir (Join-Path $PWD "apps/app/electrobun/build")

      - name: Install Inno Setup 6.7.1
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          winget install --exact --id JRSoftware.InnoSetup --version 6.7.1 --accept-package-agreements --accept-source-agreements --disable-interactivity

          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            Write-Error "ISCC.exe not found after installing Inno Setup 6.7.1"
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "MILADY_INNO_SETUP_COMPILER=$iscc"
          Write-Host "Using ISCC compiler: $iscc"

      - name: Build Inno Setup installer
        if: matrix.platform.os == 'windows'
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
          WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          pwsh -File packaging/inno/build-inno.ps1 `
            -BuildDir (Join-Path $PWD "apps/app/electrobun/build") `
            -OutputDir (Join-Path $PWD "apps/app/electrobun/artifacts") `
            -Version "${{ needs.prepare.outputs.version }}" `
            -Channel "${{ needs.prepare.outputs.env }}"

      - name: Verify Windows public installer looks complete
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "apps/app/electrobun/artifacts" -File -Filter "Milady-Setup-*.exe" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            Write-Error "No public Windows installer found in apps/app/electrobun/artifacts"
            exit 1
          }

          $minimumBytes = 50MB
          if ($installer.Length -lt $minimumBytes) {
            Write-Error "Installer is too small to be a standalone Windows package: $($installer.FullName) ($($installer.Length) bytes)"
            exit 1
          }

          Write-Host "Verified standalone Windows installer: $($installer.Name)"
          Write-Host "Installer size: $([math]::Round($installer.Length / 1MB, 1)) MB"

      - name: Cache Windows embedding model
        if: matrix.platform.os == 'windows'
        uses: actions/cache@v4
        with:
          path: ~/.eliza/models
          key: embedding-model-nomic-embed-text-v1.5-Q4_K_S

      - name: Seed Windows embedding model cache
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $modelsDir = Join-Path $env:USERPROFILE ".eliza\models"
          $modelName = "nomic-embed-text-v1.5.Q4_K_S.gguf"
          $modelRepo = "nomic-ai/nomic-embed-text-v1.5-GGUF"
          $modelPath = Join-Path $modelsDir $modelName

          if (-not (Test-Path $modelPath)) {
            New-Item -ItemType Directory -Force -Path $modelsDir | Out-Null
            $url = "https://huggingface.co/$modelRepo/resolve/main/$modelName"
            Write-Host "Downloading Windows embedding model cache seed: $url"
            Invoke-WebRequest -Uri $url -OutFile $modelPath
          }

          Write-Host "Windows embedding model cache ready: $modelPath"

      - name: Smoke test packaged Windows app
        if: matrix.platform.os == 'windows'
        shell: pwsh
        env:
          # agent.ts sets MILADY_DISABLE_LOCAL_EMBEDDINGS=1 on Windows
          # automatically; we also set it here so the ENTIRE process tree
          # (including the PowerShell parent and any subprocesses) inherits it.
          MILADY_DISABLE_LOCAL_EMBEDDINGS: "1"
          # The runtime requires at least one AI provider plugin to fully
          # initialize — without it, startApiServer() can fail before
          # server.listen() and the health endpoint never becomes reachable.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MILADY_WINDOWS_SMOKE_REQUIRE_INSTALLER: "1"
          MILADY_TEST_WINDOWS_INSTALL_DIR: ${{ runner.temp }}\milady-windows-installed
          MILADY_TEST_WINDOWS_LAUNCHER_DIR: ${{ runner.temp }}\milady-windows-ui-launcher
          MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE: ${{ runner.temp }}\milady-windows-ui-launcher.txt
        run: |
          Remove-Item $env:MILADY_TEST_WINDOWS_INSTALL_DIR -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $env:MILADY_TEST_WINDOWS_LAUNCHER_DIR -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $env:MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE -Force -ErrorAction SilentlyContinue

          pwsh -File apps/app/electrobun/scripts/smoke-test-windows.ps1

          if (-not (Test-Path $env:MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE)) {
            Write-Error "Smoke test did not emit a reusable Windows launcher path."
            exit 1
          }

          $launcherPath = (Get-Content $env:MILADY_TEST_WINDOWS_LAUNCHER_PATH_FILE -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($launcherPath) -or -not (Test-Path $launcherPath)) {
            Write-Error "Reusable Windows launcher path is invalid: $launcherPath"
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "MILADY_TEST_WINDOWS_LAUNCHER_PATH=$launcherPath"
          Write-Host "Reusing packaged Windows launcher for Playwright: $launcherPath"

      - name: Run Windows packaged renderer bootstrap check
        if: matrix.platform.os == 'windows'
        run: |
          cd apps/app
          bunx playwright test --config playwright.electrobun.packaged.config.ts test/electrobun-packaged/electrobun-windows-startup.e2e.spec.ts

      - name: Upload Windows Playwright UI diagnostics
        if: failure() && matrix.platform.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-windows-ui-playwright-diagnostics
          path: apps/app/test-results/**
          if-no-files-found: warn
          retention-days: 14

      - name: Verify Windows code signature
        if: matrix.platform.os == 'windows' && env.WINDOWS_SIGN_CERT_BASE64 != ''
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object { [version]($_.FullName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*', '$1') } -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          $artifactsDir = Join-Path $PWD "apps/app/electrobun/artifacts"
          $signed = 0
          $failed = 0

          Get-ChildItem -Path $artifactsDir -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Verifying: $($_.FullName)"
            & $signtool verify /pa /v $_.FullName
            if ($LASTEXITCODE -eq 0) {
              $signed++
            } else {
              Write-Host "::error::Signature verification failed: $($_.Name)"
              $failed++
            }
          }

          Write-Host "Verification complete: $signed signed, $failed failed"
          if ($failed -gt 0) {
            exit 1
          }

      - name: Build MSIX package
        if: matrix.platform.os == 'windows'
        env:
          WINDOWS_SIGN_CERT_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
          WINDOWS_SIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGN_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          pwsh -File packaging/msix/build-msix.ps1 `
            -BuildDir (Join-Path $PWD "apps/app/electrobun/build") `
            -OutputDir (Join-Path $PWD "apps/app/electrobun/artifacts") `
            -Version "${{ needs.prepare.outputs.version }}"

      - name: Verify macOS signature and notarization
        if: matrix.platform.os == 'macos'
        run: |
          retry_stapler_validate() {
            local target="$1"
            local attempts="${2:-5}"
            local delay_seconds="${3:-15}"
            local attempt
            for ((attempt = 1; attempt <= attempts; attempt += 1)); do
              if xcrun stapler validate "$target"; then
                return 0
              fi
              if [ "$attempt" -lt "$attempts" ]; then
                echo "::warning::stapler validate failed for $target (attempt $attempt/$attempts); retrying..."
                sleep "$((delay_seconds * attempt))"
              fi
            done
            return 1
          }

          apps=()
          while IFS= read -r app; do
            apps+=("$app")
          done < <(find apps/app/electrobun/artifacts -maxdepth 1 -type d -name "*.app" | sort)
          mounted_volume=""
          if [ "${#apps[@]}" -eq 0 ]; then
            dmgs=(apps/app/electrobun/artifacts/*.dmg)
            if [ "${#dmgs[@]}" -eq 0 ]; then
              echo "::warning::No .app bundle or .dmg found — skipping codesign check"
              exit 0
            fi
            dmg="${dmgs[0]}"
            echo "No .app bundle found in artifacts; mounting DMG: $dmg"
            mount_line=""
            for attempt in 1 2 3 4 5; do
              attach_output="$(hdiutil attach -nobrowse -readonly "$dmg" 2>&1)" && \
                mount_line="$(printf '%s\n' "$attach_output" | awk '/\/Volumes\// { print substr($0, index($0, "/Volumes/")); exit }')" && \
                [ -n "$mount_line" ] && [ -d "$mount_line" ] && break
              echo "::warning::DMG attach attempt $attempt/5 failed"
              if [ -n "${attach_output:-}" ]; then
                printf '%s\n' "$attach_output"
              fi
              mount_line=""
              sleep 2
            done
            if [ -z "$mount_line" ]; then
              echo "::error::Failed to determine mounted DMG volume"
              exit 1
            fi
            mounted_volume="$mount_line"
            trap 'if [ -n "$mounted_volume" ] && [ -d "$mounted_volume" ]; then hdiutil detach "$mounted_volume" >/dev/null 2>&1 || true; fi' EXIT
            apps=()
            while IFS= read -r app; do
              apps+=("$app")
            done < <(find "$mounted_volume" -maxdepth 1 -type d -name "*.app" | sort)
            if [ "${#apps[@]}" -eq 0 ]; then
              echo "::error::No .app bundle found inside mounted DMG"
              exit 1
            fi
          fi
          for app in "${apps[@]}"; do
            echo "Verifying: $app"
            codesign --verify --deep --strict --verbose=2 "$app"
            info="$(codesign -dv --verbose=4 "$app" 2>&1 || true)"
            echo "$info" | grep -q "Authority=Developer ID Application" || {
              echo "::error::Missing Developer ID Application signature on $app"
              exit 1
            }
            spctl -a -vv --type exec "$app"
            retry_stapler_validate "$app" 3 10 || echo "::warning::Stapler validation failed (may be expected for .app; DMG stapling is the norm)"
          done
          found_dmg=0
          while IFS= read -r dmg; do
            [[ -z "$dmg" ]] && continue
            found_dmg=1
            echo "Verifying installer: $dmg"
            dmg_info="$(codesign -dv --verbose=4 "$dmg" 2>&1 || true)"
            echo "$dmg_info"
            echo "$dmg_info" | grep -q "Authority=Developer ID Application" || {
              echo "::error::Missing Developer ID Application signature on $dmg"
              exit 1
            }
            retry_stapler_validate "$dmg"
          done < <(find apps/app/electrobun/artifacts -maxdepth 1 -type f -name "*.dmg" | sort)
          if [ "$found_dmg" -eq 0 ]; then
            echo "::error::No DMG found in apps/app/electrobun/artifacts"
            exit 1
          fi

      - name: Smoke test packaged macOS app
        if: matrix.platform.os == 'macos'
        env:
          SMOKE_DIAGNOSTICS_DIR: ${{ runner.temp }}/milady-smoke-diagnostics
        run: |
          STARTUP_TIMEOUT=420 \
          LIVENESS_TIMEOUT=10 \
          SKIP_BUILD=1 \
          SKIP_SIGNATURE_CHECK=1 \
          bash apps/app/electrobun/scripts/smoke-test.sh

      - name: Collect Windows smoke diagnostics
        if: failure() && matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $diagnosticsDir = Join-Path $PWD "apps/app/electrobun/artifacts/windows-smoke-diagnostics"
          $startupLog = Join-Path $env:APPDATA "Milady\\milady-startup.log"
          $wrapperRoot = Join-Path $env:LOCALAPPDATA "com.miladyai.milady"

          Remove-Item $diagnosticsDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $diagnosticsDir | Out-Null

          if (Test-Path $startupLog) {
            Copy-Item $startupLog -Destination (Join-Path $diagnosticsDir "milady-startup.log") -Force
          } else {
            Write-Warning "Windows startup log not found at $startupLog"
          }

          if (Test-Path $wrapperRoot) {
            Get-ChildItem -Path $wrapperRoot -Recurse -File -Filter "wrapper-diagnostics.json" -ErrorAction SilentlyContinue |
              ForEach-Object {
                $relativePath = $_.FullName.Substring($wrapperRoot.Length).TrimStart('\\')
                $destination = Join-Path $diagnosticsDir $relativePath
                $destinationParent = Split-Path -Parent $destination
                New-Item -ItemType Directory -Force -Path $destinationParent | Out-Null
                Copy-Item $_.FullName -Destination $destination -Force
              }
          } else {
            Write-Warning "Wrapper diagnostics root not found at $wrapperRoot"
          }

      - name: Upload Windows smoke diagnostics
        if: failure() && matrix.platform.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact-name }}-smoke-diagnostics
          path: apps/app/electrobun/artifacts/windows-smoke-diagnostics/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS smoke diagnostics
        if: failure() && matrix.platform.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact-name }}-smoke-diagnostics
          path: |
            ${{ runner.temp }}/milady-smoke-diagnostics/**
            apps/app/electrobun/build/**/wrapper-diagnostics.json
          if-no-files-found: warn
          retention-days: 14

      - name: Compress Windows artifacts before upload
        if: matrix.platform.os == 'windows'
        shell: pwsh
        run: |
          $artifactsDir = Join-Path $PWD "apps/app/electrobun/artifacts"
          $exeFiles = Get-ChildItem -Path $artifactsDir -Filter "*.exe"
          foreach ($exe in $exeFiles) {
            $zipPath = $exe.FullName + ".zip"
            Write-Host "Compressing $($exe.Name) -> $($exe.Name).zip"
            Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -CompressionLevel Optimal
            Remove-Item $exe.FullName -Force
            $originalMB = [math]::Round($exe.Length / 1MB, 1)
            $compressedMB = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
            Write-Host "Compressed: ${originalMB}MB -> ${compressedMB}MB"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact-name }}
          path: |
            apps/app/electrobun/artifacts/*.dmg
            apps/app/electrobun/artifacts/*.tar.zst
            apps/app/electrobun/artifacts/*.exe
            apps/app/electrobun/artifacts/*.exe.zip
            apps/app/electrobun/artifacts/*.tar.gz
            apps/app/electrobun/artifacts/*-update.json
            apps/app/electrobun/artifacts/*.patch
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload MSIX artifact
        if: matrix.platform.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-${{ matrix.platform.artifact-name }}-msix
          path: apps/app/electrobun/artifacts/*.msix
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6

  release:
    name: Create Release
    needs: [prepare, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: electrobun-*
          merge-multiple: false

      - name: List artifacts
        run: find release-artifacts -type f | sort 2>/dev/null || echo "No artifacts"

      - name: Collect public release files
        run: |
          mkdir -p release-files
          # Public GitHub releases should expose end-user installables, not the
          # updater transport files. Windows publishes the standalone Inno Setup
          # installer, not the raw Electrobun bootstrap stub.
          find release-artifacts -type f \( \
            -name "*.dmg" -o \
            -name "Milady-Setup-*.exe.zip" -o \
            -name "*Setup*.tar.gz" -o \
            -name "*.msix" \
          \) -exec cp {} release-files/ \; 2>/dev/null || true

          # Decompress Windows .exe.zip back to .exe for end-user downloads
          # (zip was only used for inter-job artifact transfer to avoid SAS token timeout)
          for f in release-files/*.exe.zip; do
            [ -f "$f" ] || continue
            echo "Decompressing $f"
            cd release-files && unzip -o "$(basename "$f")" && rm "$(basename "$f")" && cd ..
          done

          echo "=== Public release files ==="
          ls -lh release-files/ 2>/dev/null || echo "None"

      - name: Collect update channel files
        run: |
          mkdir -p update-channel
          find release-artifacts -type f \( \
            -name "*.tar.zst" -o \
            -name "*.patch" -o \
            -name "*-update.json" \
          \) -exec cp {} update-channel/ \; 2>/dev/null || true
          echo "=== Update channel files ==="
          ls -lh update-channel/ 2>/dev/null || echo "None"

      - name: Generate checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Milady ${{ needs.prepare.outputs.tag }}
          draft: ${{ inputs.draft || false }}
          prerelease: ${{ contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') || contains(needs.prepare.outputs.version, 'nightly') }}
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload platform-prefixed update manifests + tarballs to
      # milady.ai/releases/ so the Electrobun updater can discover them via the
      # flat baseUrl contract in electrobun.config.ts:
      #   ${baseUrl}/${platformPrefix}-update.json
      #   ${baseUrl}/${platformPrefix}-${tarballFileName}
      # Requires RELEASE_UPLOAD_KEY secret (SSH private key for releases server).
      # Skipped for draft releases — test/preview builds must not pollute the production update channel.
      - name: Upload update channel files to milady.ai/releases/
        if: ${{ !inputs.draft }}
        env:
          RELEASE_UPLOAD_KEY: ${{ secrets.RELEASE_UPLOAD_KEY }}
          RELEASE_HOST_FINGERPRINT: ${{ secrets.RELEASE_HOST_FINGERPRINT }}
        run: |
          if [ -z "$RELEASE_UPLOAD_KEY" ]; then
            echo "No RELEASE_UPLOAD_KEY secret — skipping upload"
            exit 0
          fi
          echo "$RELEASE_UPLOAD_KEY" > /tmp/release_key
          chmod 600 /tmp/release_key
          # Pin the host fingerprint from the RELEASE_HOST_FINGERPRINT secret so SSH
          # verifies the server identity without disabling host-key checking.
          # To rotate: run `ssh-keyscan -H milady.ai` and update the secret.
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$RELEASE_HOST_FINGERPRINT" >> ~/.ssh/known_hosts
          # Electrobun resolves update metadata and tarballs at the flat
          # release root, keyed by platform prefix, not inside version folders.
          rsync -av --delete-after \
            -e "ssh -i /tmp/release_key" \
            update-channel/ \
            releases@milady.ai:/var/www/releases/
          rm -f /tmp/release_key
