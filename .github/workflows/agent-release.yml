# Agent Release: build-first release pipeline.
#
# Flow: evaluate → trust gate → version → build & validate → tag → publish release
# Builds are verified BEFORE any tag or release is created.
#
# Triggers:
#   - PR merged to develop: auto-evaluates if enough changes warrant a release
#   - `release-ready` label on issue: immediate release
#   - workflow_dispatch: manual release with optional stable/version override
#
# Trust-gated: only org members or legendary/trusted contributors (75+).
name: Agent Release

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      stable:
        description: "Create a stable release (not alpha)"
        required: false
        type: boolean
        default: false
      version_override:
        description: "Explicit version (e.g. 2.0.0-alpha.126). Leave empty for auto-bump."
        required: false
        type: string

concurrency:
  group: agent-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  issues: write
  packages: write

env:
  BUN_VERSION: "1.3.10"

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Evaluate: only on PR merge — decide if changes warrant a release
  # ────────────────────────────────────────────────────────────────────
  evaluate:
    name: Evaluate release need
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.eval.outputs.should_release }}
      reason: ${{ steps.eval.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate changes since last release
        id: eval
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=No prior release tag found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest release: $LATEST_TAG"
          COMMIT_COUNT=$(git rev-list --count "${LATEST_TAG}..HEAD")
          CHANGED_FILES=$(git diff --name-only "$LATEST_TAG"..HEAD)
          SRC_CHANGES=$(echo "$CHANGED_FILES" | grep -cE '^(packages/|apps/|scripts/)' || true)
          DOC_ONLY=$([ "$SRC_CHANGES" -eq 0 ] && echo true || echo false)
          HAS_ELECTROBUN=$(echo "$CHANGED_FILES" | grep -cE '^apps/app/electrobun/' || true)

          echo "Commits: $COMMIT_COUNT | Src files: $SRC_CHANGES | Doc-only: $DOC_ONLY | Electrobun: $HAS_ELECTROBUN"

          if [ "$DOC_ONLY" = "true" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=Doc-only changes since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -lt 5 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=Only $COMMIT_COUNT commits since $LATEST_TAG (threshold: 5)" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_ELECTROBUN" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=Electrobun changes ($HAS_ELECTROBUN files), $COMMIT_COUNT commits since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$SRC_CHANGES" -ge 10 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=$SRC_CHANGES source files, $COMMIT_COUNT commits since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -ge 15 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=$COMMIT_COUNT commits accumulated since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=$COMMIT_COUNT commits, $SRC_CHANGES src files — below thresholds" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────
  # 2. Trust gate
  # ────────────────────────────────────────────────────────────────────
  gate:
    name: Trust gate
    if: >-
      always() && (
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'issues' && github.event.label.name == 'release-ready') ||
        (needs.evaluate.result == 'success' && needs.evaluate.outputs.should_release == 'true')
      )
    needs: [evaluate]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Checkout (for trust-scoring.cjs)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          fetch-depth: 1

      - name: Check trust eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { computeTrustScore, DEFAULT_CONFIG, createContributorState, expandState } = require('./.github/trust-scoring.cjs');
            const actor = context.actor;

            // Org member bypass
            let isOrgMember = false;
            try {
              const { status } = await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner, username: actor,
              });
              isOrgMember = status === 204 || status === 302;
            } catch (e) { /* not a member */ }

            if (isOrgMember) {
              core.info(`${actor} is org member — allowed`);
              core.setOutput('allowed', 'true');
              return;
            }

            let trustTier = 'untested';
            let trustScore = DEFAULT_CONFIG.initialScore;
            try {
              const { data: fileData } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/contributor-trust.json', ref: 'develop',
              });
              const allStates = JSON.parse(Buffer.from(fileData.content, 'base64').toString());
              if (allStates[actor]) {
                const state = expandState(allStates[actor]);
                const result = computeTrustScore(state, DEFAULT_CONFIG);
                trustTier = result.tier;
                trustScore = result.score;
              }
            } catch (e) {
              core.info(`Trust data unavailable: ${e.message}`);
            }

            if (['legendary', 'trusted'].includes(trustTier)) {
              core.info(`${actor}: trust ${trustScore}/100 (${trustTier}) — allowed`);
              core.setOutput('allowed', 'true');
              return;
            }

            core.setOutput('allowed', 'false');
            if (context.payload.issue) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.issue.number, name: 'release-ready',
                });
              } catch (e) { /* ok */ }
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `⚠️ **Release not authorized** — @${actor} trust tier \`${trustTier}\` (${trustScore}/100). Need org member or trusted+ (75+).`,
              });
            }

  # ────────────────────────────────────────────────────────────────────
  # 3. Resolve version (no tag yet — just compute the next version)
  # ────────────────────────────────────────────────────────────────────
  version:
    name: Resolve version
    needs: [evaluate, gate]
    if: always() && needs.gate.result == 'success' && needs.gate.outputs.allowed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        env:
          STABLE: ${{ github.event.inputs.stable || 'false' }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override || '' }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
          elif [ "$STABLE" = "true" ]; then
            LATEST=$(git tag --sort=-creatordate | grep '^v' | head -1)
            VERSION=$(echo "$LATEST" | sed 's/-alpha\.[0-9]*//' | sed 's/^v//')
          else
            LATEST=$(git tag --sort=-creatordate | grep '^v.*-alpha\.' | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="2.0.0-alpha.1"
            else
              PREFIX=$(echo "$LATEST" | sed 's/\.[0-9]*$/\./' | sed 's/^v//')
              NUM=$(echo "$LATEST" | grep -oE '[0-9]+$')
              VERSION="${PREFIX}$((NUM + 1))"
            fi
          fi

          PRERELEASE=$( [ "$STABLE" = "true" ] && echo false || echo true )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Next release: v$VERSION (prerelease=$PRERELEASE)"

  # ────────────────────────────────────────────────────────────────────
  # 4. Build & validate — everything must pass before we tag
  # ────────────────────────────────────────────────────────────────────
  build-check:
    name: Build & typecheck
    needs: [version]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - name: Build
        run: bunx tsdown && printf '{"type":"module"}\n' > dist/package.json && node --import tsx scripts/write-build-info.ts
      - name: Typecheck
        run: bun run check
      - name: Release contract
        run: bun run release:check

  build-test:
    name: Unit tests
    needs: [version]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - name: Run tests
        run: bun run test

  build-electrobun-validate:
    name: Electrobun drift tests
    needs: [version]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - name: Run electrobun drift tests
        run: |
          bunx vitest run \
            scripts/electrobun-release-workflow-drift.test.ts \
            scripts/electrobun-test-workflow-drift.test.ts \
            scripts/whisper-build-script-drift.test.ts \
            scripts/release-check.test.ts
      - name: Build dist prerequisites
        run: bunx tsdown && printf '{"type":"module"}\n' > dist/package.json && node --import tsx scripts/write-build-info.ts
      - name: Release contract checks
        run: bun run release:check

  build-docker-validate:
    name: Docker build smoke
    needs: [version]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun-workspace
      - name: Docker build smoke test
        run: |
          if [ -f scripts/docker-ci-smoke.sh ]; then
            bash scripts/docker-ci-smoke.sh
          else
            echo "Docker smoke script not found — skipping"
          fi
        env:
          SMOKE_TIMEOUT_SEC: "300"

  # ────────────────────────────────────────────────────────────────────
  # 5. All green → create tag and publish release
  # ────────────────────────────────────────────────────────────────────
  publish:
    name: Tag & publish release
    needs: [version, build-check, build-test, build-electrobun-validate, build-docker-validate]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
          EVAL_REASON: ${{ needs.evaluate.outputs.reason || 'Manual trigger' }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG;
            const prerelease = process.env.PRERELEASE === 'true';
            const reason = process.env.EVAL_REASON;

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: [
                `## ${tag}`,
                '',
                prerelease ? '⚠️ Pre-release (alpha)' : '✅ Stable release',
                '',
                `**Reason:** ${reason}`,
                '',
                '### Build verification',
                '- ✅ Typecheck passed',
                '- ✅ Unit tests passed',
                '- ✅ Electrobun drift tests passed',
                '- ✅ Release contract checks passed',
                '- ✅ Docker build smoke passed',
                '',
                '### Release pipelines (triggered by this release)',
                '- [ ] Electrobun desktop (macOS ARM, macOS Intel, Windows, Linux)',
                '- [ ] npm publish',
                '- [ ] Docker image push',
                '- [ ] Android AAB → Play Store',
                '- [ ] iOS → App Store',
                '- [ ] macOS → App Store',
                '- [ ] Snap',
                '- [ ] Flatpak',
                '- [ ] Debian/APT',
                '- [ ] Homebrew',
                '- [ ] Homepage deploy',
                '',
                `Triggered by @${context.actor}`,
              ].join('\n'),
              prerelease,
              draft: false,
            });

            core.info(`Created release: ${release.html_url}`);

            // Close the trigger issue if label-triggered
            if (context.payload.issue) {
              const issue = context.payload.issue.number;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue,
                body: `🚀 **Release ${tag} published**\n\n${release.html_url}\n\nAll builds passed verification. Release pipelines triggered.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue,
                state: 'closed', state_reason: 'completed',
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: 'release-ready',
                });
              } catch (e) { /* ok */ }
            }
