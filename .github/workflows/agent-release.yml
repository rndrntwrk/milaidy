# Agent Release: build-first release pipeline.
#
# Flow: evaluate → gate → version → FULL BUILD MATRIX → tag → publish
# Real builds run BEFORE any tag or release. Only tags if builds succeed.
#
# Triggers:
#   - PR merged to develop: auto-evaluates if enough changes warrant a release
#   - `release-ready` label on issue: immediate release
#   - workflow_dispatch: manual release with optional stable/version override
#
# Trust-gated: only org members or legendary/trusted contributors (75+).
name: Agent Release

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      stable:
        description: "Create a stable release (not alpha)"
        required: false
        type: boolean
        default: false
      version_override:
        description: "Explicit version (e.g. 2.0.0-alpha.126). Leave empty for auto-bump."
        required: false
        type: string

concurrency:
  group: agent-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  issues: write
  packages: write

env:
  BUN_VERSION: "1.3.10"

jobs:
  # ── 1. Evaluate (PR merge only) ───────────────────────────────────
  evaluate:
    name: Evaluate release need
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.eval.outputs.should_release }}
      reason: ${{ steps.eval.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Evaluate changes since last release
        id: eval
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=No prior release tag found" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMIT_COUNT=$(git rev-list --count "${LATEST_TAG}..HEAD")
          CHANGED_FILES=$(git diff --name-only "$LATEST_TAG"..HEAD)
          SRC_CHANGES=$(echo "$CHANGED_FILES" | grep -cE '^(packages/|apps/|scripts/)' || true)
          DOC_ONLY=$([ "$SRC_CHANGES" -eq 0 ] && echo true || echo false)
          HAS_ELECTROBUN=$(echo "$CHANGED_FILES" | grep -cE '^apps/app/electrobun/' || true)

          if [ "$DOC_ONLY" = "true" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=Doc-only changes since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -lt 5 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=Only $COMMIT_COUNT commits since $LATEST_TAG (threshold: 5)" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_ELECTROBUN" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=Electrobun changes ($HAS_ELECTROBUN files), $COMMIT_COUNT commits since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$SRC_CHANGES" -ge 10 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=$SRC_CHANGES source files, $COMMIT_COUNT commits since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -ge 15 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "reason=$COMMIT_COUNT commits accumulated since $LATEST_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "reason=$COMMIT_COUNT commits, $SRC_CHANGES src files — below thresholds" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Trust gate ──────────────────────────────────────────────────
  gate:
    name: Trust gate
    if: always() && ((github.event_name == 'workflow_dispatch') || (github.event_name == 'issues' && github.event.label.name == 'release-ready') || (needs.evaluate.result == 'success' && needs.evaluate.outputs.should_release == 'true'))
    needs: [evaluate]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          fetch-depth: 1
      - name: Check trust eligibility
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { computeTrustScore, DEFAULT_CONFIG, createContributorState, expandState } = require('./.github/trust-scoring.cjs');
            const actor = context.actor;
            let isOrgMember = false;
            try {
              const { status } = await github.rest.orgs.checkMembershipForUser({ org: context.repo.owner, username: actor });
              isOrgMember = status === 204 || status === 302;
            } catch (e) { /* not a member */ }
            if (isOrgMember) { core.setOutput('allowed', 'true'); return; }

            let trustTier = 'untested', trustScore = DEFAULT_CONFIG.initialScore;
            try {
              const { data: fileData } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/contributor-trust.json', ref: 'develop',
              });
              const allStates = JSON.parse(Buffer.from(fileData.content, 'base64').toString());
              if (allStates[actor]) {
                const state = expandState(allStates[actor]);
                const result = computeTrustScore(state, DEFAULT_CONFIG);
                trustTier = result.tier; trustScore = result.score;
              }
            } catch (e) { core.info(`Trust data unavailable: ${e.message}`); }

            if (['legendary', 'trusted'].includes(trustTier)) {
              core.setOutput('allowed', 'true'); return;
            }
            core.setOutput('allowed', 'false');
            if (context.payload.issue) {
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number, name: 'release-ready' }); } catch (e) {}
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number, body: `⚠️ **Release not authorized** — @${actor} trust \`${trustTier}\` (${trustScore}/100). Need org member or trusted+ (75+).` });
            }

  # ── 3. Resolve version (no tag yet) ───────────────────────────────
  version:
    name: Resolve version
    needs: [evaluate, gate]
    if: always() && needs.gate.result == 'success' && needs.gate.outputs.allowed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: ver
        env:
          STABLE: ${{ github.event.inputs.stable || 'false' }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override || '' }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
          elif [ "$STABLE" = "true" ]; then
            LATEST=$(git tag --sort=-creatordate | grep '^v' | head -1)
            VERSION=$(echo "$LATEST" | sed 's/-alpha\.[0-9]*//' | sed 's/^v//')
          else
            LATEST=$(git tag --sort=-creatordate | grep '^v.*-alpha\.' | head -1)
            if [ -z "$LATEST" ]; then VERSION="2.0.0-alpha.1"
            else
              PREFIX=$(echo "$LATEST" | sed 's/\.[0-9]*$/\./' | sed 's/^v//')
              NUM=$(echo "$LATEST" | grep -oE '[0-9]+$')
              VERSION="${PREFIX}$((NUM + 1))"
            fi
          fi
          PRERELEASE=$( [ "$STABLE" = "true" ] && echo false || echo true )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Next: v$VERSION (prerelease=$PRERELEASE)"

  # ── 4. FULL BUILD MATRIX (blocking — must all pass) ────────────────
  #
  # These call the REAL release workflows with publish disabled.
  # Same runners, same matrix, same build steps — just no upload/push.

  build-electrobun:
    name: Electrobun full matrix
    needs: [version]
    uses: ./.github/workflows/release-electrobun.yml
    with:
      tag: ${{ needs.version.outputs.tag }}
      draft: true
      publish_release: false
      publish_docker: false
    secrets: inherit

  build-docker:
    name: Docker image build
    needs: [version]
    uses: ./.github/workflows/build-docker.yml
    with:
      version: ${{ needs.version.outputs.tag }}
      push_image: false
      source_sha: ${{ github.sha }}
    secrets: inherit

  build-npm:
    name: npm package build
    needs: [version]
    uses: ./.github/workflows/reusable-npm-publish.yml
    with:
      version: ${{ needs.version.outputs.version }}
      dist_tag: next
      run_validation: true
    secrets: inherit

  # ── 5. Electrobun + Docker must pass. npm is nice-to-have. ──────────
  publish:
    name: Tag & publish release
    needs: [version, build-electrobun, build-docker, build-npm]
    if: always() && needs.build-electrobun.result == 'success' && needs.build-docker.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG — all builds verified"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag }}
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
          EVAL_REASON: ${{ needs.evaluate.outputs.reason || 'Manual trigger' }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG;
            const prerelease = process.env.PRERELEASE === 'true';
            const reason = process.env.EVAL_REASON;

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: [
                `## ${tag}`,
                '',
                prerelease ? '⚠️ Pre-release (alpha)' : '✅ Stable release',
                '',
                `**Reason:** ${reason}`,
                '',
                '### Pre-release verification (all passed)',
                '- ✅ Electrobun desktop — full matrix (macOS ARM, macOS Intel, Windows, Linux)',
                '- ✅ Docker image — built successfully',
                '- ✅ npm package — built and validated',
                '',
                '### Publishing pipelines (triggered by this release)',
                '- [ ] Electrobun artifacts upload + updater channel',
                '- [ ] npm publish to registry',
                '- [ ] Docker push to GHCR',
                '- [ ] Android AAB → Play Store',
                '- [ ] iOS → App Store',
                '- [ ] macOS → App Store',
                '- [ ] Snap / Flatpak / Debian',
                '- [ ] Homebrew tap update',
                '- [ ] Homepage deploy',
                '',
                `Triggered by @${context.actor}`,
              ].join('\n'),
              prerelease,
              draft: false,
            });

            core.info(`Created release: ${release.html_url}`);

            if (context.payload.issue) {
              const issue = context.payload.issue.number;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue,
                body: `🚀 **Release ${tag} published** — all builds verified\n\n${release.html_url}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, state: 'closed', state_reason: 'completed',
              });
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: 'release-ready',
                });
              } catch (e) { /* ok */ }
            }

  # ── 6. On ANY failure — open an issue with diagnostics ─────────────
  report-failure:
    name: Report build failures
    needs: [version, build-electrobun, build-docker, build-npm, publish]
    if: always() && (needs.build-electrobun.result == 'failure' || needs.build-docker.result == 'failure' || needs.build-npm.result == 'failure' || needs.publish.result == 'failure')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag || 'unknown' }}
          ELECTROBUN_RESULT: ${{ needs.build-electrobun.result }}
          DOCKER_RESULT: ${{ needs.build-docker.result }}
          NPM_RESULT: ${{ needs.build-npm.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
        with:
          script: |
            const tag = process.env.TAG;
            const results = {
              'Electrobun full matrix': process.env.ELECTROBUN_RESULT,
              'Docker image build': process.env.DOCKER_RESULT,
              'npm package build': process.env.NPM_RESULT,
              'Tag & publish': process.env.PUBLISH_RESULT,
            };

            const lines = Object.entries(results).map(([name, result]) => {
              const icon = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⏭️';
              return `| ${name} | ${icon} ${result} |`;
            });

            const failed = Object.entries(results)
              .filter(([, r]) => r === 'failure')
              .map(([n]) => n);

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              `## Release build failure — ${tag}`,
              '',
              `**Run:** ${runUrl}`,
              `**Triggered by:** @${context.actor}`,
              '',
              '### Build results',
              '| Step | Result |',
              '|------|--------|',
              ...lines,
              '',
              `### Failed: ${failed.join(', ')}`,
              '',
              'Investigate the failed jobs in the run linked above.',
              'The release tag was **NOT** created — no artifacts were published.',
              '',
              'Once fixed, re-trigger with `workflow_dispatch` or the `release-ready` label.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Release ${tag} failed: ${failed.join(', ')}`,
              body,
              labels: ['release-tracker', 'bug'],
            });

  # ── 7. On warnings (partial skip) — open advisory issue ───────────
  report-warnings:
    name: Report skipped builds
    needs: [version, build-electrobun, build-docker, build-npm, publish]
    if: always() && needs.publish.result == 'success' && (needs.build-electrobun.result == 'skipped' || needs.build-docker.result == 'skipped' || needs.build-npm.result == 'skipped')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      issues: write
    steps:
      - name: Open warning issue
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag || 'unknown' }}
          ELECTROBUN_RESULT: ${{ needs.build-electrobun.result }}
          DOCKER_RESULT: ${{ needs.build-docker.result }}
          NPM_RESULT: ${{ needs.build-npm.result }}
        with:
          script: |
            const tag = process.env.TAG;
            const results = {
              'Electrobun': process.env.ELECTROBUN_RESULT,
              'Docker': process.env.DOCKER_RESULT,
              'npm': process.env.NPM_RESULT,
            };

            const skipped = Object.entries(results)
              .filter(([, r]) => r === 'skipped')
              .map(([n]) => n);

            if (skipped.length === 0) return;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Release ${tag} — ${skipped.join(', ')} builds were skipped`,
              body: [
                `## Release ${tag} published with warnings`,
                '',
                `**Run:** ${runUrl}`,
                '',
                `The following builds were skipped: **${skipped.join(', ')}**`,
                '',
                'The release was published but these artifacts may be missing.',
                'Investigate and re-run the individual workflows if needed.',
              ].join('\n'),
              labels: ['release-tracker'],
            });

