# Agent Release: build-first release pipeline.
#
# Flow: decide (evaluate + trust) → version → FULL BUILD MATRIX → tag → publish
# Builds are verified BEFORE any tag or release is created.
#
# Triggers:
#   - PR merged to develop: auto-evaluates if enough changes warrant a release
#   - `release-ready` label on issue: immediate release
#   - workflow_dispatch: manual release with optional stable/version override
#
# Trust-gated: only org members or legendary/trusted contributors (75+).
name: Agent Release

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
    branches: [develop]
  workflow_dispatch:
    inputs:
      stable:
        description: "Create a stable release (not alpha)"
        required: false
        type: boolean
        default: false
      version_override:
        description: "Explicit version (e.g. 2.0.0-alpha.126). Leave empty for auto-bump."
        required: false
        type: string

concurrency:
  group: agent-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  issues: write
  packages: write

env:
  BUN_VERSION: "1.3.10"

jobs:
  # ── 1. Single decision gate — combines evaluation + trust check ────
  # No skipped ancestors — this job always runs and outputs proceed=true/false.
  decide:
    name: Evaluate & authorize
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
    outputs:
      proceed: ${{ steps.decision.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decision
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            const actor = context.actor;

            // ── Step 1: Should we release? ──────────────────────────
            let shouldRelease = false;
            let reason = '';

            if (event === 'workflow_dispatch' || (event === 'issues' && context.payload.label?.name === 'release-ready')) {
              shouldRelease = true;
              reason = event === 'workflow_dispatch' ? 'Manual dispatch' : 'release-ready label';
            } else if (event === 'pull_request' && context.payload.pull_request?.merged) {
              // Evaluate changes since last tag
              const { execSync } = require('child_process');
              const latestTag = execSync('git tag --sort=-creatordate | grep "^v" | head -1').toString().trim();
              if (!latestTag) {
                shouldRelease = true;
                reason = 'No prior release tag';
              } else {
                const commitCount = parseInt(execSync(`git rev-list --count ${latestTag}..HEAD`).toString().trim(), 10);
                const changedFiles = execSync(`git diff --name-only ${latestTag}..HEAD`).toString().trim().split('\n').filter(Boolean);
                const srcChanges = changedFiles.filter(f => /^(packages\/|apps\/|scripts\/)/.test(f)).length;
                const hasElectrobun = changedFiles.filter(f => f.startsWith('apps/app/electrobun/')).length;
                const docOnly = srcChanges === 0;

                if (docOnly) { reason = `Doc-only since ${latestTag}`; }
                else if (commitCount < 5) { reason = `${commitCount} commits since ${latestTag} (need 5)`; }
                else if (hasElectrobun > 0) { shouldRelease = true; reason = `Electrobun changes (${hasElectrobun} files), ${commitCount} commits since ${latestTag}`; }
                else if (srcChanges >= 10) { shouldRelease = true; reason = `${srcChanges} src files, ${commitCount} commits since ${latestTag}`; }
                else if (commitCount >= 15) { shouldRelease = true; reason = `${commitCount} commits since ${latestTag}`; }
                else { reason = `${commitCount} commits, ${srcChanges} src files — below thresholds`; }
              }
            } else {
              reason = 'Event not applicable';
            }

            core.info(`Should release: ${shouldRelease} — ${reason}`);
            if (!shouldRelease) {
              core.setOutput('proceed', 'false');
              return;
            }

            // ── Step 2: Trust check ─────────────────────────────────
            const { computeTrustScore, DEFAULT_CONFIG, expandState } = require('./.github/trust-scoring.cjs');

            let isOrgMember = false;
            try {
              const { status } = await github.rest.orgs.checkMembershipForUser({ org: context.repo.owner, username: actor });
              isOrgMember = status === 204 || status === 302;
            } catch (e) {}

            let allowed = isOrgMember;
            if (!allowed) {
              let trustTier = 'untested', trustScore = DEFAULT_CONFIG.initialScore;
              try {
                const { data: fileData } = await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: '.github/contributor-trust.json', ref: 'develop',
                });
                const allStates = JSON.parse(Buffer.from(fileData.content, 'base64').toString());
                if (allStates[actor]) {
                  const state = expandState(allStates[actor]);
                  const result = computeTrustScore(state, DEFAULT_CONFIG);
                  trustTier = result.tier;
                  trustScore = result.score;
                }
              } catch (e) { core.info(`Trust data unavailable: ${e.message}`); }

              allowed = ['legendary', 'trusted'].includes(trustTier);
              if (!allowed && context.payload.issue) {
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number, name: 'release-ready' }); } catch (e) {}
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number, body: `⚠️ **Release not authorized** — @${actor} trust \`${trustTier}\` (${trustScore}/100). Need org member or trusted+ (75+).` });
              }
            }

            core.info(`Trust: allowed=${allowed} (org=${isOrgMember})`);
            core.setOutput('proceed', allowed ? 'true' : 'false');

  # ── 2. Resolve version ─────────────────────────────────────────────
  version:
    name: Resolve version
    needs: [decide]
    if: needs.decide.outputs.proceed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: ver
        env:
          STABLE: ${{ github.event.inputs.stable || 'false' }}
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override || '' }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
          elif [ "$STABLE" = "true" ]; then
            LATEST=$(git tag --sort=-creatordate | grep '^v' | head -1)
            VERSION=$(echo "$LATEST" | sed 's/-alpha\.[0-9]*//' | sed 's/^v//')
          else
            LATEST=$(git tag --sort=-creatordate | grep '^v.*-alpha\.' | head -1)
            if [ -z "$LATEST" ]; then VERSION="2.0.0-alpha.1"
            else
              PREFIX=$(echo "$LATEST" | sed 's/\.[0-9]*$/\./' | sed 's/^v//')
              NUM=$(echo "$LATEST" | grep -oE '[0-9]+$')
              VERSION="${PREFIX}$((NUM + 1))"
            fi
          fi
          PRERELEASE=$( [ "$STABLE" = "true" ] && echo false || echo true )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Next: v$VERSION (prerelease=$PRERELEASE)"

  # ── 3. FULL BUILD MATRIX (blocking — electrobun + docker required) ─
  build-electrobun:
    name: Electrobun full matrix
    needs: [version]
    uses: ./.github/workflows/release-electrobun.yml
    with:
      tag: ${{ needs.version.outputs.tag }}
      draft: true
      publish_release: false
      publish_docker: false
    secrets: inherit

  build-docker:
    name: Docker image build
    needs: [version]
    uses: ./.github/workflows/build-docker.yml
    with:
      version: ${{ needs.version.outputs.tag }}
      push_image: false
      source_sha: ${{ github.sha }}
    secrets: inherit

  build-npm:
    name: npm package build
    needs: [version]
    uses: ./.github/workflows/reusable-npm-publish.yml
    with:
      version: ${{ needs.version.outputs.version }}
      dist_tag: next
      run_validation: true
    secrets: inherit

  # ── 4. Electrobun + Docker green → tag and publish ─────────────────
  publish:
    name: Tag & publish release
    needs: [version, build-electrobun, build-docker, build-npm]
    if: always() && needs.build-electrobun.result == 'success' && needs.build-docker.result == 'success'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG — all builds verified"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag }}
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
          NPM_RESULT: ${{ needs.build-npm.result }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG;
            const prerelease = process.env.PRERELEASE === 'true';
            const npmOk = process.env.NPM_RESULT === 'success';

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: [
                `## ${tag}`,
                '',
                prerelease ? '⚠️ Pre-release (alpha)' : '✅ Stable release',
                '',
                '### Pre-release verification',
                '- ✅ Electrobun desktop — full matrix (macOS ARM, macOS Intel, Windows, Linux)',
                '- ✅ Docker image — built successfully',
                npmOk ? '- ✅ npm package — built and validated' : '- ⚠️ npm package — build failed (non-blocking)',
                '',
                '### Publishing pipelines (triggered by this release)',
                '- [ ] Electrobun artifacts upload + updater channel',
                '- [ ] npm publish',
                '- [ ] Docker push to GHCR',
                '- [ ] Android / iOS / macOS App Store',
                '- [ ] Snap / Flatpak / Debian',
                '- [ ] Homebrew / Homepage',
                '',
                `Triggered by @${context.actor}`,
              ].join('\n'),
              prerelease,
              draft: false,
            });

            core.info(`Created release: ${release.html_url}`);

            if (context.payload.issue) {
              const issue = context.payload.issue.number;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue,
                body: `🚀 **Release ${tag} published**\n\n${release.html_url}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, state: 'closed', state_reason: 'completed',
              });
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue, name: 'release-ready' }); } catch (e) {}
            }

  # ── 5. On failure — open issue with diagnostics ────────────────────
  report-failure:
    name: Report build failures
    needs: [version, build-electrobun, build-docker, build-npm, publish]
    if: always() && (needs.build-electrobun.result == 'failure' || needs.build-docker.result == 'failure' || needs.publish.result == 'failure')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag || 'unknown' }}
          ELECTROBUN: ${{ needs.build-electrobun.result }}
          DOCKER: ${{ needs.build-docker.result }}
          NPM: ${{ needs.build-npm.result }}
          PUBLISH: ${{ needs.publish.result }}
        with:
          script: |
            const tag = process.env.TAG;
            const results = { Electrobun: process.env.ELECTROBUN, Docker: process.env.DOCKER, npm: process.env.NPM, Publish: process.env.PUBLISH };
            const lines = Object.entries(results).map(([n, r]) => `| ${n} | ${r === 'success' ? '✅' : r === 'failure' ? '❌' : '⏭️'} ${r} |`);
            const failed = Object.entries(results).filter(([,r]) => r === 'failure').map(([n]) => n);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `❌ Release ${tag} failed: ${failed.join(', ')}`,
              body: `## Release build failure — ${tag}\n\n**Run:** ${runUrl}\n**By:** @${context.actor}\n\n| Step | Result |\n|------|--------|\n${lines.join('\n')}\n\nTag was **NOT** created. Re-trigger after fixing.`,
              labels: ['release-tracker', 'bug'],
            });

  # ── 6. On npm failure with successful release — warning issue ──────
  report-npm-warning:
    name: Report npm build warning
    needs: [version, build-npm, publish]
    if: always() && needs.publish.result == 'success' && needs.build-npm.result == 'failure'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      issues: write
    steps:
      - name: Open warning issue
        uses: actions/github-script@v7
        env:
          TAG: ${{ needs.version.outputs.tag || 'unknown' }}
        with:
          script: |
            const tag = process.env.TAG;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `⚠️ Release ${tag} — npm build failed (non-blocking)`,
              body: `## Release ${tag} published with npm warning\n\n**Run:** ${runUrl}\n\nElectrobun and Docker passed, but npm package build failed.\nThe npm publish pipeline may fail downstream. Investigate and fix.`,
              labels: ['release-tracker'],
            });
