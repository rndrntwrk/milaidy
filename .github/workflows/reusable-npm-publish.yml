name: Reusable npm publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      dist_tag:
        required: true
        type: string
      run_postinstall:
        required: false
        type: boolean
        default: false
      run_validation:
        required: false
        type: boolean
        default: true
    secrets:
      NPM_TOKEN:
        required: true

jobs:
  publish:
    name: Publish to npm (${{ inputs.dist_tag }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          check-latest: false
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run repository postinstall patches
        if: inputs.run_postinstall
        run: bun run postinstall

      - name: Set version in package.json
        run: node scripts/set-package-version.mjs
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Build
        run: |
          bunx tsdown
          node --import tsx scripts/write-build-info.ts
          echo '{"type":"module"}' > dist/package.json

      - name: Validate package
        if: inputs.run_validation
        run: |
          PACK_OUTPUT=$(npm pack --dry-run 2>&1)
          echo "$PACK_OUTPUT"
          for required in "milady.mjs" "dist/index.js" "package.json"; do
            if ! echo "$PACK_OUTPUT" | grep -q "$required"; then
              echo "::error::Required file '$required' missing from package contents"
              exit 1
            fi
          done

      - name: Publish
        run: npm publish --tag ${{ inputs.dist_tag }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
