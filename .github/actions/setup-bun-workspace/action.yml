name: "Setup Bun Workspace"
description: "Install Bun workspace dependencies and optional postinstall patches for CI jobs."

inputs:
  bun-version:
    description: "Bun version to install"
    required: false
    default: "1.3.13"
  python-version:
    description: "Python version for node-gyp fallbacks"
    required: false
    default: "3.12"
  install-command:
    description: "Dependency install command"
    required: false
    default: "bun install --frozen-lockfile --ignore-scripts"
  install-native-deps:
    description: "Whether to install native apt dependencies"
    required: false
    default: "true"
  run-postinstall:
    description: "Whether to run the repo postinstall step explicitly"
    required: false
    default: "true"
  skip-avatar-clone:
    description: "Set SKIP_AVATAR_CLONE=1 for postinstall"
    required: false
    default: "false"
  no-vision-deps:
    description: "Set MILADY_NO_VISION_DEPS=1 for postinstall"
    required: false
    default: "false"
  disable-local-eliza-workspace:
    description: "Disable repo-local eliza workspace in CI when local upstreams are skipped"
    required: false
    default: "false"
  skip-local-upstreams-postinstall:
    description: "Set MILADY_SKIP_LOCAL_UPSTREAMS=1 only while running repository postinstall patches"
    required: false
    default: "false"
  prepare-local-eliza-runtime:
    description: "Install repo-local eliza dependencies needed by jobs that execute local eliza scripts after published-only setup"
    required: false
    default: "false"
  preserve-android-sdk:
    description: "Keep the preinstalled Android SDK on Linux runners for Android packaging jobs"
    required: false
    default: "false"
  skip-cloud-submodule:
    description: "Skip the nested eliza/cloud submodule and remove its workspace entry for jobs that do not need cloud source"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Free disk space (Linux)
      if: runner.os == 'Linux'
      shell: bash
      # ~/.bun/install/cache has grown past 2.9 GB; combined with apt-installed
      # native deps the default ubuntu-latest runner exhausts disk during cache
      # extraction. Drop unused preinstalled toolchains to reclaim ~25 GB.
      run: |
        df -h /
        if [ "${{ inputs.preserve-android-sdk }}" != "true" ]; then
          sudo rm -rf /usr/local/lib/android
        fi
        sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
        df -h /

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install setuptools for distutils (Python 3.12+)
      shell: bash
      run: pip install setuptools

    - name: Install native dependencies
      if: ${{ inputs.install-native-deps == 'true' }}
      shell: bash
      run: |
        # Some CI runners intermittently fail reaching Ubuntu mirrors over IPv6.
        # Force IPv4 and retry apt commands to make CI setup resilient.
        APT_ARGS=(-o Acquire::ForceIPv4=true -o Acquire::Retries=5 -o Acquire::http::Timeout=30)
        for attempt in 1 2 3; do
          if [ "$attempt" -gt 1 ]; then
            sudo dpkg --configure -a || true
            sudo apt-get "${APT_ARGS[@]}" -f install -y --fix-missing || true
          fi
          if sudo apt-get "${APT_ARGS[@]}" update && \
             sudo apt-get "${APT_ARGS[@]}" install -y --fix-missing \
               build-essential libcairo2-dev libpango1.0-dev libjpeg-dev \
               libgif-dev libpixman-1-dev librsvg2-dev protobuf-compiler; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "apt install failed after ${attempt} attempts"
            exit 1
          fi
          sleep $((attempt * 10))
        done

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun install
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - name: Initialize tracked workspace submodules
      shell: bash
      run: node scripts/init-submodules.mjs
      env:
        MILADY_SKIP_LOCAL_UPSTREAMS: ${{ inputs.disable-local-eliza-workspace == 'true' && '1' || '' }}
        MILADY_SKIP_CLOUD_SUBMODULE: ${{ inputs.skip-cloud-submodule == 'true' && '1' || '' }}

    - name: Initialize local eliza workspace
      if: ${{ inputs.disable-local-eliza-workspace != 'true' }}
      shell: bash
      run: |
        # Some workflows export MILADY_SKIP_LOCAL_UPSTREAMS globally even when
        # they immediately restore eliza/ and run repo-local scripts. Clear the
        # skip flags here so the full eliza checkout (including nested plugins)
        # is available to Bun.
        MILADY_SKIP_LOCAL_UPSTREAMS= ELIZA_SKIP_LOCAL_UPSTREAMS= node scripts/init-submodules.mjs
      env:
        MILADY_SKIP_CLOUD_SUBMODULE: ${{ inputs.skip-cloud-submodule == 'true' && '1' || '' }}

    # Some review jobs still execute local eliza runtime scripts after the
    # published-only install rewrite. Hydrate eliza only for those jobs; normal
    # published-only CI resolves @elizaos/* versions from npm dist-tags.
    - name: Shallow-init eliza submodule for version resolution
      if: ${{ inputs.disable-local-eliza-workspace == 'true' && inputs.prepare-local-eliza-runtime == 'true' }}
      shell: bash
      run: |
        if [ ! -f eliza/package.json ]; then
          git clone --depth=1 --branch "${MILADY_ELIZA_BRANCH:-develop}" https://github.com/elizaOS/eliza.git eliza
        fi

    - name: Apply elizaOS source CI patches
      shell: bash
      run: |
        if [ -f scripts/apply-eliza-ci-patches.mjs ]; then
          node scripts/apply-eliza-ci-patches.mjs
        else
          echo "Skipping Milady eliza CI patches: scripts/apply-eliza-ci-patches.mjs not present"
        fi

    # IMPORTANT: This mode is for published-only CI jobs. Do not enable it for
    # jobs that execute repo-local paths under eliza/ after dependency setup.
    - name: Disable repo-local eliza workspace
      if: ${{ inputs.disable-local-eliza-workspace == 'true' }}
      shell: bash
      # Jobs that rewrite the workspace graph under MILADY_SKIP_LOCAL_UPSTREAMS=1 must also override install-command to --no-frozen-lockfile because this step regenerates bun.lock for the rewritten workspace shape.
      run: node scripts/disable-local-eliza-workspace.mjs
      env:
        MILADY_SKIP_LOCAL_UPSTREAMS: "1"

    - name: Validate published-only install mode
      if: ${{ inputs.disable-local-eliza-workspace == 'true' }}
      shell: bash
      env:
        INSTALL_COMMAND: ${{ inputs.install-command }}
      run: |
        if [[ "$INSTALL_COMMAND" != *"--no-frozen-lockfile"* ]]; then
          echo "::error::disable-local-eliza-workspace requires an install-command with --no-frozen-lockfile because the workspace rewrite regenerates bun.lock."
          exit 1
        fi

    - name: Repair known eliza patch files
      shell: bash
      run: |
        if grep -Eq "export .*repairKnownElizaPatchFiles" scripts/disable-local-eliza-workspace.mjs; then
          node --input-type=module <<'NODE'
          import { repairKnownElizaPatchFiles } from "./scripts/disable-local-eliza-workspace.mjs";

          repairKnownElizaPatchFiles();
        NODE
        else
          echo "Skipping known eliza patch repair: repairKnownElizaPatchFiles export not present"
        fi

    - name: Ensure nested cloud workspace is hydrated
      if: ${{ inputs.disable-local-eliza-workspace != 'true' && inputs.skip-cloud-submodule != 'true' }}
      shell: bash
      run: |
        if [ ! -d eliza ]; then
          echo "eliza checkout absent; skipping nested cloud submodule init"
          exit 0
        fi
        if ! git -C eliza rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          echo "eliza/ is not a git worktree; skipping cloud hydration."
          exit 0
        fi
        git -C eliza submodule update --init cloud
        test -d eliza/cloud/packages/sdk
        test -d eliza/cloud/packages/billing

    # eliza/cloud/package.json declares Steward packages under
    # `.external/steward/packages/*` as workspaces. Bun resolves the cloud
    # workspace graph as soon as it walks into `eliza/cloud/packages/sdk` (a
    # workspace member of milady root and of eliza). Without these dirs on
    # disk, `bun install` aborts with "Workspace not found
    # .external/steward/packages/api". Pre-create minimal stub package.json
    # files so workspace validation passes in CI jobs that only need install
    # and type/build verification.
    - name: Stub Steward workspace dirs for nested cloud workspace
      if: ${{ hashFiles('eliza/cloud/package.json') != '' }}
      shell: bash
      run: |
        for p in api auth db policy-engine redis shared vault webhooks; do
          d="eliza/cloud/.external/steward/packages/$p"
          if [ ! -f "$d/package.json" ]; then
            mkdir -p "$d"
            printf '{"name":"@stwd/%s","version":"0.0.0","private":true}\n' "$p" > "$d/package.json"
          fi
        done

    - name: Install dependencies
      shell: bash
      run: |
        clean_bun_install_cache() {
          node --input-type=module <<'NODE'
        import fs from "node:fs";
        import os from "node:os";
        import path from "node:path";

        const candidates = [
          path.join(os.homedir(), ".bun", "install", "cache"),
          process.env.BUN_INSTALL
            ? path.join(process.env.BUN_INSTALL, "install", "cache")
            : null,
          process.env.LOCALAPPDATA
            ? path.join(process.env.LOCALAPPDATA, "bun", "install", "cache")
            : null,
          process.env.XDG_CACHE_HOME
            ? path.join(process.env.XDG_CACHE_HOME, "bun", "install", "cache")
            : null,
        ].filter(Boolean);

        for (const cacheDir of new Set(candidates)) {
          fs.rmSync(cacheDir, { recursive: true, force: true });
          console.log(`Removed Bun install cache: ${cacheDir}`);
        }
        NODE
        }

        for attempt in 1 2; do
          if ${{ inputs.install-command }}; then
            exit 0
          fi
          if [ "$attempt" -eq 2 ]; then
            exit 1
          fi
          echo "Dependency install failed; retrying once after cleaning Bun install caches."
          clean_bun_install_cache
          sleep 5
        done
      env:
        npm_config_python: ${{ env.pythonLocation }}/bin/python3

    - name: Generate local eliza protobuf types
      if: ${{ inputs.prepare-local-eliza-runtime == 'true' }}
      shell: bash
      run: |
        if [ -d eliza/packages/schemas ] && [ -f eliza/packages/schemas/buf.gen.yaml ] && [ ! -f eliza/packages/core/src/types/generated/eliza/v1/agent_pb.ts ]; then
          cd eliza/packages/schemas
          node node_modules/@bufbuild/buf/install.js 2>/dev/null || true
          bunx @bufbuild/buf@1.67.0 generate
        fi

    - name: Install published-workspace fallback dependencies
      if: ${{ inputs.disable-local-eliza-workspace == 'true' }}
      shell: bash
      run: |
        if [ -f scripts/install-published-workspace-fallback-deps.sh ]; then
          bash scripts/install-published-workspace-fallback-deps.sh
        else
          echo "Skipping published-workspace fallback dependencies: helper script not present"
        fi

    - name: Build local eliza CI override packages
      if: ${{ inputs.disable-local-eliza-workspace == 'true' }}
      shell: bash
      run: |
        if [ -f scripts/build-local-eliza-ci-overrides.mjs ]; then
          node scripts/build-local-eliza-ci-overrides.mjs
        else
          echo "Skipping local eliza CI override build: helper script not present"
        fi

    - name: Run repository postinstall patches
      if: ${{ inputs.run-postinstall == 'true' }}
      shell: bash
      run: bun run postinstall
      env:
        SKIP_AVATAR_CLONE: ${{ inputs.skip-avatar-clone == 'true' && '1' || '' }}
        MILADY_NO_VISION_DEPS: ${{ inputs.no-vision-deps == 'true' && '1' || '' }}
        MILADY_SKIP_LOCAL_UPSTREAMS: ${{ (inputs.disable-local-eliza-workspace == 'true' || inputs.skip-local-upstreams-postinstall == 'true') && '1' || '' }}

    - name: Install local eliza runtime dependencies
      if: ${{ inputs.prepare-local-eliza-runtime == 'true' && inputs.disable-local-eliza-workspace == 'true' }}
      shell: bash
      run: |
        bun install --cwd eliza --no-frozen-lockfile --ignore-scripts

    - name: Generate local eliza keyword data
      if: ${{ inputs.prepare-local-eliza-runtime == 'true' && inputs.disable-local-eliza-workspace == 'true' }}
      shell: bash
      run: |
        if [ -f eliza/packages/shared/scripts/generate-keywords.mjs ]; then
          cd eliza
          node packages/shared/scripts/generate-keywords.mjs --target ts
        fi
