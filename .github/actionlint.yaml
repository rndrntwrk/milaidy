# actionlint configuration
# https://github.com/rhysd/actionlint/blob/main/docs/config.md

# Most jobs run on GitHub-hosted runners (ubuntu-24.04 / ubuntu-24.04-arm /
# windows-2025). The labels below are self-hosted runner labels we use:
#   kvm — Linux x86_64 host with /dev/kvm available, used for the
#         Cuttlefish/AOSP build (.github/workflows/miladyos-cuttlefish.yml).
#   milady-e2e-macos — macOS host with iMessage / BlueBubbles set up
#                      for live e2e cleanup (.github/workflows/e2e-orphan-sweeper.yml).

self-hosted-runner:
  labels:
    - kvm
    - milady-e2e-macos

paths:
  .github/workflows/release.yml:
    ignore:
      # Optional signing secrets — linter cannot verify repo secrets exist
      - "Context access might be invalid:.+"
